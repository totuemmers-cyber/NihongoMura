    function showObjectTooltip(obj) {
        // Map object types to vocab IDs
        const typeToVocab = {
            house: 'house', teahouse: 'tea', market: 'money', well: 'water',
            bridge: 'bridge', pagoda: 'pagoda', gate: 'door', bamboo: 'bamboo',
            garden: 'garden', kitchen: 'food', workshop: 'book', fish_pond: 'fish',
            shrine: 'home', lantern_post: 'lantern', rice_paddy: 'rice',
            river: 'river', dock: 'boat', lotus_pond: 'lotus', flower: 'flower',
            willow: 'tree',
            school: 'student', medicine_hut: 'medicine', stable: 'horse',
            tea_terrace: 'tea', viewpoint: 'mountain'
        };
        const vocabId = typeToVocab[obj.type] || obj.type;
        const vocabEntry = vocab[vocabId];
        if (vocabEntry) {
            objectTooltip = {
                obj: obj,
                japaneseWord: vocabEntry.kanji + ' (' + vocabEntry.kana + ')',
                germanWord: obj.label,
                timer: 180,
                maxTimer: 180
            };
            sfx('speak');
        } else {
            objectTooltip = {
                obj: obj,
                japaneseWord: '???',
                germanWord: obj.label,
                timer: 180,
                maxTimer: 180
            };
        }
    }

    function updateObjectTooltip(dt) {
        if (objectTooltip) {
            objectTooltip.timer -= dt;
            if (objectTooltip.timer <= 0) objectTooltip = null;
        }
    }

    function drawObjectTooltip(ctx) {
        if (!objectTooltip) return;
        const obj = objectTooltip.obj;
        const x = obj.x * canvasScale;
        const y = (obj.y - obj.h / 2 - 25) * canvasScale;
        const s = canvasScale;
        const alpha = objectTooltip.timer < 40 ? objectTooltip.timer / 40 :
                      objectTooltip.timer > objectTooltip.maxTimer - 20 ? (objectTooltip.maxTimer - objectTooltip.timer) / 20 : 1;

        ctx.save();
        ctx.globalAlpha = alpha;

        // Highlight circle
        const pulse = Math.sin(gameTick * 0.1) * 0.2 + 0.8;
        ctx.strokeStyle = `rgba(200,169,110,${pulse})`;
        ctx.lineWidth = 2 * s;
        ctx.beginPath();
        ctx.arc(obj.x * s, obj.y * s, (Math.max(obj.w, obj.h) / 2 + 8) * s, 0, Math.PI * 2);
        ctx.stroke();

        // Text
        const japaneseText = objectTooltip.japaneseWord.charAt(0).toUpperCase() + objectTooltip.japaneseWord.slice(1);
        const germanText = `(${objectTooltip.germanWord})`;
        ctx.font = `bold ${Math.round(12 * s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
        const tw1 = ctx.measureText(japaneseText).width;
        ctx.font = `${Math.round(10 * s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
        const tw2 = ctx.measureText(germanText).width;
        const totalW = Math.max(tw1, tw2);
        const pad = 8 * s;
        const bw = totalW + pad * 2;
        const bh = 32 * s;
        const bx = x - bw / 2;
        const by = y - bh;

        // Background
        ctx.fillStyle = 'rgba(20,18,12,0.9)';
        roundRect(ctx, bx, by, bw, bh, 4 * s);
        ctx.fill();
        ctx.strokeStyle = '#d4a030';
        ctx.lineWidth = s;
        roundRect(ctx, bx, by, bw, bh, 4 * s);
        ctx.stroke();

        // Pointer
        ctx.beginPath();
        ctx.moveTo(x - 4*s, by + bh);
        ctx.lineTo(x, by + bh + 5*s);
        ctx.lineTo(x + 4*s, by + bh);
        ctx.fillStyle = 'rgba(20,18,12,0.9)';
        ctx.fill();

        // Japanese word
        ctx.font = `bold ${Math.round(12 * s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
        ctx.fillStyle = '#d4a030';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(japaneseText, x, by + 10 * s);

        // German
        ctx.font = `${Math.round(10 * s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
        ctx.fillStyle = '#8a7e6a';
        ctx.fillText(germanText, x, by + 23 * s);

        ctx.restore();
    }

    // ============================================================
    //  QUIZ SYSTEM
    // ============================================================
    const QUIZ_DURATION = 5000;   // ms real time
    const QUIZ_RESULT_SHOW = 1500; // ms
    const QUIZ_COOLDOWN_MIN = 1800;
    const QUIZ_COOLDOWN_MAX = 3600;

    function canTriggerQuiz() {
        return !quizActive && quizCooldown <= 0 && persons[1].knownWords.size >= 3 && gameSpeed > 0;
    }

    function triggerQuiz() {
        const learner = persons[1];
        const knownIds = [...learner.knownWords];
        const targetId = randEl(knownIds);
        const targetVocab = vocab[targetId];

        // 1 correct + 2 wrong
        const options = [{ word: targetVocab.kanji + ' (' + targetVocab.kana + ')', correct: true }];
        const otherIds = Object.keys(vocab).filter(id => id !== targetId);
        for (let i = 0; i < 2 && otherIds.length > 0; i++) {
            const idx = randInt(0, otherIds.length - 1);
            const wrongId = otherIds.splice(idx, 1)[0];
            options.push({ word: vocab[wrongId].kanji + ' (' + vocab[wrongId].kana + ')', correct: false });
        }
        // Shuffle
        for (let i = options.length - 1; i > 0; i--) {
            const j = randInt(0, i);
            [options[i], options[j]] = [options[j], options[i]];
        }

        // Find related world object
        let highlightObj = null;
        const relatedObj = worldObjects.find(o => o.type === targetId || o.id.startsWith(targetId));
        if (relatedObj) highlightObj = relatedObj;

        quizData = { germanWord: targetVocab.de, conceptId: targetId, options, highlightObj };
        quizActive = true;
        quizTimer = QUIZ_DURATION;
        quizResult = null;
        quizOptionRects = [];
    }

    function updateQuiz(dt, rawDt) {
        if (quizCooldown > 0) quizCooldown -= dt;
        if (canTriggerQuiz() && Math.random() < 0.001 * dt) triggerQuiz();

        if (quizActive && quizResult === null) {
            quizTimer -= rawDt;
            if (quizTimer <= 0) dismissQuiz();
        }
        if (quizResult) {
            quizResultTimer -= rawDt;
            if (quizResultTimer <= 0) {
                quizActive = false;
                quizResult = null;
                quizData = null;
                quizCooldown = randFloat(QUIZ_COOLDOWN_MIN, QUIZ_COOLDOWN_MAX);
            }
        }
        if (learnerFreezeTimer > 0) learnerFreezeTimer -= rawDt;
    }

    function dismissQuiz() {
        quizActive = false;
        quizResult = null;
        quizData = null;
        quizCooldown = randFloat(QUIZ_COOLDOWN_MIN, QUIZ_COOLDOWN_MAX);
    }

    function answerQuiz(optionIndex) {
        if (!quizActive || quizResult !== null) return;
        const option = quizData.options[optionIndex];
        if (option.correct) {
            quizResult = 'correct';
            persons[1].hunger = 100;
            persons[1].thirst = 100;
            persons[1].energy = 100;
            sfx('learn');
            addLog(`Quiz richtig! ${persons[1].name} fuehlt sich grossartig!`, 'learn');
        } else {
            quizResult = 'wrong';
            learnerFreezeTimer = 5000;
            sfx('craft');
            addLog(`Quiz falsch! ${persons[1].name} ist verwirrt.`, 'speak');
        }
        quizResultTimer = QUIZ_RESULT_SHOW;
    }

    function drawQuiz(ctx) {
        if (!quizActive || !quizData) return;
        const s = canvasScale;

        // Highlight related object
        if (quizData.highlightObj && quizResult === null) {
            const obj = quizData.highlightObj;
            const pulse = Math.sin(gameTick * 0.1) * 0.3 + 0.7;
            ctx.save();
            ctx.strokeStyle = `rgba(255,220,80,${pulse * 0.8})`;
            ctx.lineWidth = 2.5 * s;
            ctx.setLineDash([4*s, 3*s]);
            ctx.beginPath();
            ctx.arc(obj.x*s, obj.y*s, (Math.max(obj.w, obj.h)/2 + 12)*s, 0, Math.PI*2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        // Measure option text to determine panel width
        const optFont = `${Math.round(11*s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
        ctx.save();
        ctx.font = optFont;
        const optCount = quizData.options.length;
        const minOptW = 60 * s;
        const padding = 16 * s; // horizontal padding inside each button
        let maxTextW = 0;
        for (let i = 0; i < optCount; i++) {
            const tw = ctx.measureText(quizData.options[i].word).width;
            if (tw > maxTextW) maxTextW = tw;
        }
        ctx.restore();
        const optW = Math.max(minOptW, maxTextW + padding);
        const gap = 6 * s;
        const panelPad = 20 * s; // left+right panel padding
        const neededW = optCount * optW + (optCount - 1) * gap + panelPad;
        const panelW = Math.max(280 * s, neededW);

        // Panel at bottom center
        const panelH = (quizResult ? 50 : 100) * s;
        const panelX = (WORLD_W * s - panelW) / 2;
        const panelY = WORLD_H * s - panelH - 15 * s;

        ctx.save();

        // Background
        ctx.fillStyle = 'rgba(20,18,12,0.9)';
        roundRect(ctx, panelX, panelY, panelW, panelH, 8*s);
        ctx.fill();
        ctx.strokeStyle = quizResult === 'correct' ? '#6a8a5a' : quizResult === 'wrong' ? '#a05a4a' : '#d4a030';
        ctx.lineWidth = 2 * s;
        roundRect(ctx, panelX, panelY, panelW, panelH, 8*s);
        ctx.stroke();

        const cx = panelX + panelW / 2;

        if (quizResult) {
            ctx.font = `bold ${Math.round(14*s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = quizResult === 'correct' ? '#6aee6a' : '#ee6a6a';
            ctx.fillText(quizResult === 'correct' ? 'Richtig!' : 'Falsch!', cx, panelY + panelH / 2);
        } else {
            // Timer bar
            const timerPct = Math.max(0, quizTimer / QUIZ_DURATION);
            const barY = panelY + 8*s;
            const barH = 4*s;
            const barW = panelW - 20*s;
            const barX = panelX + 10*s;
            ctx.fillStyle = '#2a2420';
            roundRect(ctx, barX, barY, barW, barH, 2*s);
            ctx.fill();
            ctx.fillStyle = timerPct > 0.3 ? '#d4a030' : '#a05a4a';
            if (barW * timerPct > 0) {
                roundRect(ctx, barX, barY, barW * timerPct, barH, 2*s);
                ctx.fill();
            }

            // Question
            ctx.font = `bold ${Math.round(13*s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#e0d8c0';
            ctx.fillText(`"${quizData.germanWord}" = ?`, cx, panelY + 28*s);

            // Options — centered within panel
            quizOptionRects = [];
            const optY = panelY + 48*s;
            const totalOptsW = optCount * optW + (optCount - 1) * gap;
            const optsStartX = panelX + (panelW - totalOptsW) / 2;
            const optH = 48*s;

            for (let i = 0; i < optCount; i++) {
                const ox = optsStartX + i * (optW + gap);
                const oy = optY;
                quizOptionRects.push({ x: ox, y: oy, w: optW, h: optH });

                ctx.fillStyle = '#2a2420';
                roundRect(ctx, ox, oy, optW, optH, 4*s);
                ctx.fill();
                ctx.strokeStyle = '#4a3e30';
                ctx.lineWidth = s;
                roundRect(ctx, ox, oy, optW, optH, 4*s);
                ctx.stroke();

                ctx.font = optFont;
                ctx.fillStyle = '#d4a030';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(quizData.options[i].word, ox + optW/2, oy + optH/2);
            }
        }
        ctx.restore();
    }

    function drawFreezeIndicator(ctx, person) {
        if (learnerFreezeTimer <= 0) return;
        const x = person.x * canvasScale;
        const y = (person.y - 20) * canvasScale;
        const s = canvasScale;
        const t = gameTick * 0.08;

        ctx.save();
        ctx.fillStyle = '#e8d040';
        ctx.font = `bold ${Math.round(10*s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
        ctx.textAlign = 'center';
        for (let i = 0; i < 3; i++) {
            const angle = t + i * (Math.PI * 2 / 3);
            ctx.fillText('*', x + Math.cos(angle)*14*s, y + Math.sin(angle)*7*s);
        }
        ctx.restore();
    }

    // ============================================================
    //  CANVAS CLICK HANDLER
    // ============================================================
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const clickCSSX = (e.clientX || e.pageX) - rect.left;
        const clickCSSY = (e.clientY || e.pageY) - rect.top;

        // Check quiz options first
        if (quizActive && quizResult === null && quizOptionRects.length > 0) {
            for (let i = 0; i < quizOptionRects.length; i++) {
                const r = quizOptionRects[i];
                if (clickCSSX >= r.x && clickCSSX <= r.x + r.w && clickCSSY >= r.y && clickCSSY <= r.y + r.h) {
                    answerQuiz(i);
                    return;
                }
            }
        }

        // Check world objects
        const clickWorldX = clickCSSX / canvasScale;
        const clickWorldY = clickCSSY / canvasScale;
        for (const obj of worldObjects) {
            const dx = clickWorldX - obj.x;
            const dy = clickWorldY - obj.y;
            const hitRadius = Math.max(obj.w, obj.h) / 2 + 10;
            if (dx * dx + dy * dy < hitRadius * hitRadius) {
                showObjectTooltip(obj);
                return;
            }
        }
    }

    // ============================================================
    //  COMMAND SYSTEM — player gives orders to the learner
    // ============================================================
    let commandFeedbackTimer = 0;

    // Normalize romaji for fuzzy matching (long vowels, macrons)
    function normalizeRomaji(str) {
        return str.toLowerCase()
            .replace(/ō/g,'ou').replace(/ū/g,'uu').replace(/ā/g,'aa')
            .replace(/ē/g,'ee').replace(/ī/g,'ii')
            .replace(/ou/g,'o').replace(/uu/g,'u') // also collapse for matching
            .replace(/shi/g,'si').replace(/chi/g,'ti').replace(/tsu/g,'tu')
            .replace(/fu/g,'hu').replace(/ji/g,'zi');
    }

    // Parse input into matching vocab concept IDs
    function parseCommandInput(input) {
        const learner = persons[1];
        const raw = input.trim();
        if (!raw) return [];
        const lower = raw.toLowerCase();
        const normalized = normalizeRomaji(raw);

        const matched = [];
        // Try matching each known word against input
        for (const cid of learner.knownWords) {
            const v = vocab[cid];
            if (!v || v.type === 'particle') continue;
            // Match by kanji substring
            if (raw.includes(v.kanji)) { matched.push({ cid, score: 3 }); continue; }
            // Match by kana (hiragana) substring
            if (raw.includes(v.kana)) { matched.push({ cid, score: 3 }); continue; }
            // Match by romaji
            const vRomaji = (v.romaji || '').toLowerCase();
            const vNorm = normalizeRomaji(vRomaji);
            if (lower.includes(vRomaji) || normalized.includes(vNorm)) { matched.push({ cid, score: 2 }); continue; }
            // Match by German
            if (lower.includes(v.de.toLowerCase())) { matched.push({ cid, score: 1 }); continue; }
        }
        // Sort by score (best matches first), deduplicate
        matched.sort((a, b) => b.score - a.score);
        const seen = new Set();
        return matched.filter(m => { if (seen.has(m.cid)) return false; seen.add(m.cid); return true; }).map(m => m.cid);
    }

    // Find the best ACTION_DEFS match for a set of concept IDs
    function findActionForConcepts(conceptIds) {
        if (conceptIds.length === 0) return null;
        const cidSet = new Set(conceptIds);
        let bestAction = null, bestScore = 0;

        for (const action of ACTION_DEFS) {
            // Skip need-only actions (sleep, urgent eat/drink)
            if (action.priority === 'need' && !action.id.includes('eat') && !action.id.includes('drink')) continue;

            // Score by how many template words or visibleConcepts overlap
            let score = 0;
            if (action.templates) {
                for (const tmpl of action.templates) {
                    let tmplScore = 0;
                    for (const cid of tmpl) { if (cidSet.has(cid)) tmplScore++; }
                    score = Math.max(score, tmplScore);
                }
            }
            if (action.visibleConcepts) {
                let visScore = 0;
                for (const cid of action.visibleConcepts) { if (cidSet.has(cid)) visScore++; }
                score = Math.max(score, visScore * 0.5); // visibleConcepts are weaker matches
            }
            if (score > bestScore) { bestScore = score; bestAction = action; }
        }
        return bestScore >= 1 ? bestAction : null;
    }

    function submitCommand() {
        const inputEl = document.getElementById('command-input');
        const raw = inputEl.value.trim();
        if (!raw || persons.length < 2) return;

        // Help command
        const lower = raw.toLowerCase();
        if (lower === 'hilfe' || lower === 'help' || lower === '?') {
            showCommandFeedback('Gelernte Wörter eingeben (Pinyin oder Hanzi). Beispiele: "chi fan", "he cha", "kan shu"');
            addLog('Hilfe: Gelernte Wörter als Befehle eingeben (Pinyin oder Hanzi).', 'speak');
            inputEl.value = '';
            return;
        }

        const learner = persons[1];

        // Check learner has learned words
        if (learner.knownWords.size < 3) {
            showCommandFeedback('Noch zu wenige Wörter gelernt...');
            return;
        }

        // Parse input
        const conceptIds = parseCommandInput(raw);
        if (conceptIds.length === 0) {
            showCommandFeedback('Nicht verstanden — nur gelernte Wörter verwenden!');
            return;
        }

        // Find matching action
        const action = findActionForConcepts(conceptIds);
        if (!action) {
            // Show what was understood but no action found
            const understood = conceptIds.slice(0, 3).map(c => vocab[c] ? vocab[c].kanji : c).join('');
            showCommandFeedback(`Verstanden: "${understood}" — aber was soll ich tun?`);
            // Learner shows confused response
            const confBubble = new SpeechBubble(learner, '...?', [], true);
            speechBubbles.push(confBubble);
            return;
        }

        // Execute: force learner to do this action
        learner.state = 'moving';
        learner.followMode = 'returning';
        learner.currentAction = { ...action, _isCommand: true };
        learner.activityDe = action.activityDe;

        // Find target location
        let tx, ty;
        if (action.target) {
            const obj = findClosestObjectFrom(learner, action.target);
            if (obj) {
                tx = obj.x + randFloat(-10, 10);
                ty = obj.y + randFloat(-10, 10);
            } else {
                tx = learner.x; ty = learner.y;
            }
        } else {
            tx = learner.x + randFloat(-20, 20);
            ty = learner.y + randFloat(-15, 15);
        }
        tx = Math.max(30, Math.min(WORLD_W - 30, tx));
        ty = Math.max(30, Math.min(WORLD_H - 30, ty));
        setTargetWithPath(learner, tx, ty);

        // Learner acknowledges — build German sentence from the matched action
        const ackSentence = buildSentence(action);
        const ackResult = buildGermanResponse(ackSentence.words, learner);
        const responseText = ackResult.anyKnown ? ackResult.text : 'Ja!';
        setTimeout(() => {
            const ackBubble = new SpeechBubble(learner, responseText, [], true);
            speechBubbles.push(ackBubble);
            sfx('respond');
            addLog(`${learner.name} fuehrt Befehl aus: ${action.activityDe}`, 'learn');
        }, 300);

        // Show feedback
        const cmdHanzi = conceptIds.slice(0, 4).map(c => vocab[c] ? vocab[c].kanji : '').join('');
        showCommandFeedback(`→ ${cmdHanzi} → ${action.activityDe}`);
        inputEl.value = '';
    }

    function showCommandFeedback(text) {
        let fb = document.getElementById('command-feedback');
        if (!fb) {
            fb = document.createElement('div');
            fb.id = 'command-feedback';
            const cmdBar = document.getElementById('command-bar');
            cmdBar.parentNode.insertBefore(fb, cmdBar.nextSibling);
        }
        fb.textContent = text;
        fb.classList.add('visible');
        commandFeedbackTimer = 4000;
    }

    // Handle learner arriving at command target
    function handleLearnerCommandArrival(learner) {
        if (!learner.currentAction || !learner.currentAction._isCommand) return false;
        const action = learner.currentAction;

        // Apply effects
        if (action.effects) {
            if (action.effects.hunger) learner.hunger = Math.min(100, learner.hunger + action.effects.hunger);
            if (action.effects.thirst) learner.thirst = Math.min(100, learner.thirst + action.effects.thirst);
            if (action.effects.energy) learner.energy = Math.min(100, learner.energy + action.effects.energy);
        }

        // Show action speech bubble (using the action's template, with grammar)
        const sentence = buildSentence(action);
        const actBubble = new SpeechBubble(learner, sentence.kanjiText, sentence.words, true);
        speechBubbles.push(actBubble);
        sfxForAction(action.id);

        // Enter acting state briefly
        learner.state = 'acting';
        learner.actionTimer = Math.min(action.duration || 120, 180);
        learner.activityDe = action.activityDe;

        // Glow target object
        if (action.target) {
            const glowObj = worldObjects.find(o => o.type === action.target &&
                Math.sqrt((o.x - learner.x) ** 2 + (o.y - learner.y) ** 2) < 80);
            if (glowObj) activeObjectGlow = { objId: glowObj.id, timer: 180, maxTimer: 180 };
        }

        return true;
    }

    // ============================================================
    //  SAVE / LOAD SYSTEM (localStorage)
    // ============================================================
    const SAVE_KEY = 'nihongomura_save';
    const AUTOSAVE_INTERVAL = 60000; // 60 seconds

    function buildSaveData() {
        return {
            version: 2,
            time: { gameDay, gameHour, gameMinute, gameTick },
            persons: persons.map(p => ({
                name: p.name, role: p.role, color: p.color,
                geschick: p.geschick, neugier: p.neugier,
                geselligkeit: p.geselligkeit, wahrnehmung: p.wahrnehmung,
                x: p.x, y: p.y, facing: p.facing,
                hunger: p.hunger, thirst: p.thirst, energy: p.energy,
                knownWords: [...p.knownWords],
                wordHistory: p.wordHistory.slice(),
                relationships: { ...p.relationships },
                skinTone: p.skinTone, hairColor: p.hairColor, clothColor: p.clothColor,
                actionHistory: p.actionHistory.slice(),
                followMode: p.followMode,
            })),
            npcs: npcs.map(n => ({
                name: n.name, x: n.x, y: n.y, speed: n.speed, facing: n.facing,
                relationships: { ...n.relationships },
                skinTone: n.skinTone, hairColor: n.hairColor, clothColor: n.clothColor, color: n.color,
                affinities: n.affinities,
            })),
            campProgress: { ...campProgress },
            campMilestonesHit: [...campMilestonesHit],
            proverbMilestonesHit: [...proverbMilestonesHit],
            discoveredTypes: [...discoveredTypes],
            weather: { currentWeather, weatherIntensity },
            storytellingCooldownDay: storytelling.cooldownDay,
            eventLog: eventLog.slice(0, 50),
            vocabHistory: vocabHistory,
            yojijukugoTriggered: [...yojijukugoTriggered],
        };
    }

    function saveGame() {
        try {
            localStorage.setItem(SAVE_KEY, JSON.stringify(buildSaveData()));
            return true;
        } catch (e) {
            console.warn('Save failed:', e);
            addLog('Speichern fehlgeschlagen!', 'speak');
            return false;
        }
    }

    function loadSaveData() {
        try {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return null;
            const data = JSON.parse(raw);
            if (!data || !data.version || !data.persons || data.persons.length < 2) return null;
            return data;
        } catch (e) {
            console.warn('Load failed:', e);
            return null;
        }
    }

    function applySaveData(data) {
        const clampNum = (v, min, max, fallback) => {
            const n = Number(v);
            return Number.isFinite(n) ? Math.max(min, Math.min(max, n)) : fallback;
        };
        const safeStr = (v, fallback) => typeof v === 'string' ? v : fallback;

        // Time
        gameDay = clampNum(data.time.gameDay, 0, 99999, 1);
        gameHour = clampNum(data.time.gameHour, 0, 23, 6);
        gameMinute = clampNum(data.time.gameMinute, 0, 59, 0);
        gameTick = clampNum(data.time.gameTick, 0, Infinity, 0);

        // Persons
        persons = [];
        for (const pd of data.persons) {
            const p = new Person(safeStr(pd.name, 'Person'), safeStr(pd.role, 'speaker'), safeStr(pd.color, '#aa7a4a'));
            p.geschick = clampNum(pd.geschick, 1, 10, 5);
            p.neugier = clampNum(pd.neugier, 1, 10, 5);
            p.geselligkeit = clampNum(pd.geselligkeit, 1, 10, 5);
            p.wahrnehmung = clampNum(pd.wahrnehmung, 1, 10, 5);
            p.x = clampNum(pd.x, 0, WORLD_W, 400);
            p.y = clampNum(pd.y, 0, WORLD_H, 300);
            p.targetX = p.x; p.targetY = p.y;
            p.facing = clampNum(pd.facing, -Math.PI, Math.PI, 0);
            p.hunger = clampNum(pd.hunger, 0, 100, 70);
            p.thirst = clampNum(pd.thirst, 0, 100, 70);
            p.energy = clampNum(pd.energy, 0, 100, 70);
            const validWords = (pd.knownWords || []).filter(w => typeof w === 'string' && w in vocab);
            p.knownWords = new Set(validWords);
            p.wordHistory = Array.isArray(pd.wordHistory) ? pd.wordHistory : [];
            p.relationships = (pd.relationships && typeof pd.relationships === 'object') ? pd.relationships : {};
            p.skinTone = safeStr(pd.skinTone, p.skinTone);
            p.hairColor = safeStr(pd.hairColor, p.hairColor);
            p.clothColor = safeStr(pd.clothColor, p.clothColor);
            p.actionHistory = Array.isArray(pd.actionHistory) ? pd.actionHistory : [];
            p.followMode = safeStr(pd.followMode, 'following');
            persons.push(p);
        }

        // NPCs
        npcs = [];
        for (const nd of data.npcs) {
            const n = new NPC(safeStr(nd.name, 'NPC'));
            n.x = clampNum(nd.x, 0, WORLD_W, 400);
            n.y = clampNum(nd.y, 0, WORLD_H, 300);
            n.targetX = n.x; n.targetY = n.y;
            n.speed = clampNum(nd.speed, 0.1, 2.0, 0.6);
            n.facing = clampNum(nd.facing, -Math.PI, Math.PI, 0);
            n.relationships = (nd.relationships && typeof nd.relationships === 'object') ? nd.relationships : {};
            n.skinTone = safeStr(nd.skinTone, n.skinTone);
            n.hairColor = safeStr(nd.hairColor, n.hairColor);
            n.clothColor = safeStr(nd.clothColor, n.clothColor);
            n.color = safeStr(nd.color, n.color);
            if (nd.affinities && typeof nd.affinities === 'object') n.affinities = nd.affinities;
            npcs.push(n);
        }

        // Camp
        campProgress = (data.campProgress && typeof data.campProgress === 'object') ? data.campProgress : {};
        campMilestonesHit = new Set(data.campMilestonesHit || []);
        campDecorations = [];
        for (const m of CAMP_MILESTONES) {
            if (campMilestonesHit.has(m.id)) {
                campDecorations.push({ id: m.id, x: m.x, y: m.y });
            }
        }

        // Proverbs & discoveries
        proverbMilestonesHit = new Set(data.proverbMilestonesHit || []);
        discoveredTypes = new Set(data.discoveredTypes || []);

        // Weather
        if (data.weather) {
            currentWeather = safeStr(data.weather.currentWeather, 'clear');
            weatherIntensity = clampNum(data.weather.weatherIntensity, 0, 1, 0);
            targetWeatherIntensity = weatherIntensity;
        }

        // Storytelling
        storytelling.cooldownDay = clampNum(data.storytellingCooldownDay, -1, 99999, -1);

        // Event log
        eventLog = Array.isArray(data.eventLog) ? data.eventLog : [];
        vocabHistory = Array.isArray(data.vocabHistory) ? data.vocabHistory : [];
        yojijukugoTriggered = new Set(data.yojijukugoTriggered || []);
    }

    function deleteSave() {
        localStorage.removeItem(SAVE_KEY);
    }

    let _autosaveId = null;
    function setupAutosave() {
        if (_autosaveId) clearInterval(_autosaveId);
        _autosaveId = setInterval(() => {
            if (gameSpeed > 0) saveGame();
        }, AUTOSAVE_INTERVAL);
        window.addEventListener('beforeunload', saveGame);
    }

    function manualSave() {
        if (saveGame()) {
            addLog('Spielstand gespeichert.', 'speak');
            const btn = document.getElementById('btn-save');
            btn.style.borderColor = '#6a8a5a';
            setTimeout(() => { btn.style.borderColor = ''; }, 800);
        }
    }

    function newGame() {
        if (!confirm('Neues Spiel starten? Der aktuelle Fortschritt geht verloren.')) return;
        // Remove beforeunload listener so autosave doesn't re-save during reload
        window.removeEventListener('beforeunload', saveGame);
        deleteSave();
        location.reload();
    }

    // ============================================================
    //  INITIALIZATION
    // ============================================================
    function init() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d', { alpha: false });

        // Build static vocabulary
        vocab = buildVocab();

        // Create world objects
        worldObjects = OBJECT_DEFS.map(d => ({ ...d }));

        // Cache frequently-looked-up objects
        cachedTeahouse = worldObjects.find(o => o.type === 'teahouse') || null;
        cachedBuildingObjects = worldObjects.filter(o => BUILDING_TYPES.includes(o.type));

        // Try to load saved game
        const saveData = loadSaveData();
        if (saveData) {
            applySaveData(saveData);
            addLog('Spielstand geladen.', 'speak');
        } else {
            // Create fresh game
            const speakerPool = [...SPEAKER_NAMES];
            const learnerPool = [...LEARNER_NAMES];
            const npcPool = [...NPC_NAMES];
            const name1 = speakerPool.splice(randInt(0, speakerPool.length - 1), 1)[0];
            const name2 = learnerPool.splice(randInt(0, learnerPool.length - 1), 1)[0];

            const p1 = new Person(name1, 'speaker', '#5a8aaa');
            const p2 = new Person(name2, 'learner', '#aa7a4a');

            if (p2.geschick < p1.geschick) {
                p2.geschick = randInt(p1.geschick, 10);
            }

            persons = [p1, p2];

            const npcCount = randInt(2, 5);
            for (let i = 0; i < npcCount; i++) {
                const npcName = npcPool.splice(randInt(0, npcPool.length - 1), 1)[0];
                npcs.push(new NPC(npcName));
            }

            addLog(`${p1.name} (Einheimischer) — Ges:${p1.geschick} Neu:${p1.neugier} Soz:${p1.geselligkeit} Wah:${p1.wahrnehmung}`, 'speak');
            addLog(`${p2.name} (Reisender) — Ges:${p2.geschick} Neu:${p2.neugier} Soz:${p2.geselligkeit} Wah:${p2.wahrnehmung}`, 'learn');
            addLog(`${npcCount} weitere Stadtbewohner sind anwesend.`, 'speak');
            addLog('Willkommen in Longmen! Die Simulation beginnt...', 'speak');
        }

        // Spawn initial wildlife
        spawnWildlife();

        // Initialize discovery timer
        discoveryTimer = randFloat(5000, 12000);

        // Initial panel render
        renderCharPanel('char1-panel', persons[0]);
        renderCharPanel('char2-panel', persons[1]);
        renderVocabPanel();
        renderLog();

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Canvas click handler (objects + quiz)
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchend', function(e) {
            if (e.changedTouches && e.changedTouches.length === 1) {
                const touch = e.changedTouches[0];
                handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY });
            }
        });

        // Start autosave
        setupAutosave();

        // Start game loop
        requestAnimationFrame(gameLoop);
    }

    function resizeCanvas() {
        const wrap = document.getElementById('canvas-wrap');
        const rect = wrap.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        canvasScale = Math.min(rect.width / WORLD_W, rect.height / WORLD_H);
    }

    function togglePanel() {
        const panel = document.getElementById('panel');
        panel.classList.toggle('open');
        const btn = document.getElementById('panel-toggle');
        btn.textContent = panel.classList.contains('open') ? 'x' : 'i';
    }

    // ============================================================
    //  GAME LOOP
    // ============================================================
    let lastTime = 0;
    let uiTimer = 0;

    function gameLoop(timestamp) {
        requestAnimationFrame(gameLoop); // schedule next frame first, so exceptions don't kill the loop
        const rawDt = lastTime ? (timestamp - lastTime) : 16;
        lastTime = timestamp;

        const dt = (rawDt / TICK_MS) * gameSpeed;

        gameTick += rawDt / TICK_MS;

        if (gameSpeed > 0) {
            // Update game time
            gameMinute += dt * 0.12;
            if (gameMinute >= 60) {
                gameMinute -= 60;
                gameHour++;
                if (gameHour >= 24) {
                    gameHour = 0;
                    gameDay++;
                }
            }

            // Update persons
            for (const p of persons) p.update(dt);
            // Update person moods periodically
            if (Math.floor(gameTick) % 30 === 0) { for (const p of persons) p.mood = getMood(p); }

            // Update AI
            updateSpeakerAI(dt);
            updateLearnerAI(dt);

            // Update NPCs
            updateNPCs(dt);

            // Soft safety net: nudge characters out if stuck inside obstacles
            const allMovers = [...persons, ...npcs];
            for (const c of allMovers) {
                // River: push toward nearest bank decisively
                if (isInRiver(c.x) && Math.abs(c.y - BRIDGE.y) > BRIDGE.halfH + 15) {
                    const pushDir = c.x < BRIDGE.x ? -1 : 1;
                    c.x += pushDir * 2.5 * dt;
                    // Snap out if close to edge to prevent oscillation
                    if (pushDir < 0 && c.x > RIVER_LEFT && c.x < RIVER_LEFT + 8) c.x = RIVER_LEFT - 5;
                    if (pushDir > 0 && c.x < RIVER_RIGHT && c.x > RIVER_RIGHT - 8) c.x = RIVER_RIGHT + 5;
                }
            }

            // Update wildlife
            updateWildlife(dt);

            // Update relationships
            updateRelationships(dt);

            // Update storytelling
            updateStorytelling(dt);

            // Update discoveries
            updateDiscoveries(dt);

            // Update speech bubbles
            speechBubbles = speechBubbles.filter(b => b.update(dt));

            // Update learn flashes and calligraphy overlays
            learnFlashes = learnFlashes.filter(f => f.update(dt));
            calligraphyOverlays = calligraphyOverlays.filter(c => c.update(dt));
            // Advance queue when current calligraphy finishes
            if (calligraphyOverlays.length === 0 && calligraphyQueue.length > 0) {
                _advanceCalligraphyQueue();
            }
            if (proverbOverlay && !proverbOverlay.update(dt)) proverbOverlay = null;

            // Update weather, atmospheric effects, boat, micro-events & NPC interactions
            updateWeather(dt);
            updateAtmospheric(dt);
            updateMicroEvents(dt);
            updateNpcInteractions(dt);

            // Check chengyu triggers (every ~100 ticks)
            if (Math.floor(gameTick) % 100 === 0) { checkYojijukugoTriggers(); checkFestival(); }
            if (yojijukugoOverlay && !yojijukugoOverlay.update(dt)) yojijukugoOverlay = null;
            updateFestivalParticles(dt);

            // Update object tooltip
            updateObjectTooltip(dt);

            // Update object label glow
            if (activeObjectGlow) {
                activeObjectGlow.timer -= dt;
                if (activeObjectGlow.timer <= 0) activeObjectGlow = null;
            }
        }

        // Update quiz (uses rawDt for real-time timers)
        if (gameSpeed > 0) {
            updateQuiz(dt, rawDt);
        }

        // Render
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
        drawTerrain(ctx);

        // Y-sorted scene drawing — build draw list, sort by depth
        const drawList = [];
        for (const obj of worldObjects) {
            const isGround = GROUND_TYPES.includes(obj.type) || obj.type === 'bridge';
            drawList.push({ sortY: isGround ? -1e6 : obj.y + (VISUAL_BOTTOM[obj.type] || obj.h / 2), type: 'obj', ref: obj });
        }
        for (const d of campDecorations) drawList.push({ sortY: d.y + 8, type: 'camp', ref: d });
        for (const disc of discoveries) {
            if (!disc.found) drawList.push({ sortY: disc.y, type: 'disc', ref: disc });
        }
        for (const a of wildlife) drawList.push({ sortY: a.y, type: 'wild', ref: a });
        for (const npc of npcs) drawList.push({ sortY: npc.y, type: 'char', ref: npc });
        for (const p of persons) drawList.push({ sortY: p.y, type: 'char', ref: p });
        drawList.sort((a, b) => a.sortY - b.sortY);
        for (const item of drawList) {
            switch (item.type) {
                case 'obj': drawObject(ctx, item.ref); break;
                case 'camp': drawCampDecoration(ctx, item.ref); break;
                case 'disc': drawDiscovery(ctx, item.ref); break;
                case 'wild': drawWildAnimal(ctx, item.ref); break;
                case 'char': drawPerson(ctx, item.ref); break;
            }
        }
        drawFreezeIndicator(ctx, persons[1]);
        drawRelationshipIndicators(ctx);
        for (const f of learnFlashes) f.draw(ctx);
        drawMicroEventEffects(ctx);
        for (const b of npcBubbles) b.draw(ctx);
        for (const b of speechBubbles) b.draw(ctx);

        // Draw hearing range circle around speaker (subtle)
        ctx.beginPath();
        ctx.arc(persons[0].x * canvasScale, persons[0].y * canvasScale, persons[1].hearingRange * canvasScale, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(100,140,180,0.12)';
        ctx.lineWidth = canvasScale;
        ctx.setLineDash([4 * canvasScale, 4 * canvasScale]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Day/night overlay
        drawDayNightOverlay(ctx);

        // Atmospheric effects (under weather)
        drawAtmosphericEffects(ctx);

        // Weather effects (on top of scene)
        drawWeatherEffects(ctx);

        // Festival effects
        drawFestivalEffects(ctx);

        // Calligraphy overlays (on top of weather/scene)
        for (const c of calligraphyOverlays) c.draw(ctx);
        if (proverbOverlay) proverbOverlay.draw(ctx);
        if (yojijukugoOverlay) yojijukugoOverlay.draw(ctx);

        // Object tooltip (UI layer, always visible)
        drawObjectTooltip(ctx);

        // Quiz (UI layer, always visible)
        drawQuiz(ctx);

        // UI updates (throttled)
        // Fade command feedback
        if (commandFeedbackTimer > 0) {
            commandFeedbackTimer -= rawDt;
            if (commandFeedbackTimer <= 0) {
                const fb = document.getElementById('command-feedback');
                if (fb) fb.classList.remove('visible');
            }
        }

        uiTimer += rawDt;
        if (uiTimer > 250) {
            uiTimer = 0;
            renderCharPanel('char1-panel', persons[0]);
            renderCharPanel('char2-panel', persons[1]);
            renderVocabPanel();
            updateTimeDisplay();
        }

    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (e.key === ' ') { setSpeed(gameSpeed === 0 ? 1 : 0); e.preventDefault(); }
        if (e.key === '1') setSpeed(1);
        if (e.key === '2') setSpeed(2);
        if (e.key === '3') setSpeed(3);
        if (e.key === 'm' || e.key === 'M') toggleSound();
    });

    // iOS: prevent pinch-zoom, double-tap zoom, and bounce scrolling
    document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', e => {
        // Allow scrolling inside panel and scrollable lists
        const t = e.target;
        if (t.closest('#panel') || t.closest('.vocab-list') || t.closest('#event-log')) return;
        e.preventDefault();
    }, { passive: false });

    // Handle orientation change on iOS
    window.addEventListener('orientationchange', () => {
        setTimeout(resizeCanvas, 100);
        setTimeout(resizeCanvas, 300);
    });

    // Handle iOS visual viewport resize (keyboard, etc.)
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', resizeCanvas);
    }

    // Start
    init();
    </script>
</body>
</html>
