        return null;
    }

    // Check if a position is blocked (river without bridge, or building)
    function isBlocked(x, y, targetType) {
        // River check (allow on bridge with generous corridor)
        if (isInRiver(x) && Math.abs(y - BRIDGE.y) > BRIDGE.halfH + 25) {
            return true;
        }
        // Building check
        if (isInsideBuilding(x, y, targetType)) {
            return true;
        }
        return false;
    }

    // Steer around obstacles: try original direction, then alternate angles
    // Always returns a direction — never leaves the character stuck
    function steerAroundObstacles(x, y, dirX, dirY, step, targetType) {
        // Try original direction first
        if (!isBlocked(x + dirX * step, y + dirY * step, targetType)) {
            return { dx: dirX, dy: dirY };
        }
        // Try increasingly wider angles
        const baseAngle = Math.atan2(dirY, dirX);
        const offsets = [0.4, -0.4, 0.8, -0.8, 1.2, -1.2, 1.6, -1.6, 2.2, -2.2, 2.8, -2.8];
        for (const off of offsets) {
            const angle = baseAngle + off;
            const sdx = Math.cos(angle);
            const sdy = Math.sin(angle);
            if (!isBlocked(x + sdx * step, y + sdy * step, targetType)) {
                return { dx: sdx, dy: sdy };
            }
        }
        // All angles blocked: move in original direction anyway (prevents freezing)
        return { dx: dirX, dy: dirY };
    }

    // Check if a line segment from (x1,y1) to (x2,y2) intersects a rectangle
    function lineIntersectsRect(x1, y1, x2, y2, rx, ry, rw, rh) {
        const hw = rw / 2 + 4, hh = rh / 2 + 4; // small margin
        const left = rx - hw, right = rx + hw, top = ry - hh, bot = ry + hh;
        // Liang-Barsky clipping
        const dx = x2 - x1, dy = y2 - y1;
        let tMin = 0, tMax = 1;
        const edges = [
            { p: -dx, q: x1 - left },
            { p: dx,  q: right - x1 },
            { p: -dy, q: y1 - top },
            { p: dy,  q: bot - y1 },
        ];
        for (const { p, q } of edges) {
            if (Math.abs(p) < 0.001) {
                if (q < 0) return false;
            } else {
                const t = q / p;
                if (p < 0) { if (t > tMin) tMin = t; }
                else       { if (t < tMax) tMax = t; }
                if (tMin > tMax) return false;
            }
        }
        return true;
    }

    // Plan waypoints around buildings that lie in the path
    function planBuildingWaypoints(fromX, fromY, toX, toY, targetType) {
        const waypoints = [];
        for (const obj of worldObjects) {
            if (!BUILDING_TYPES.includes(obj.type)) continue;
            if (targetType && obj.type === targetType) continue;
            if (!lineIntersectsRect(fromX, fromY, toX, toY, obj.x, obj.y, obj.w, obj.h)) continue;
            // Route around this building - pick the corner closest to the straight line
            const hw = obj.w / 2 + 10, hh = obj.h / 2 + 10;
            const corners = [
                { x: obj.x - hw, y: obj.y - hh },
                { x: obj.x + hw, y: obj.y - hh },
                { x: obj.x - hw, y: obj.y + hh },
                { x: obj.x + hw, y: obj.y + hh },
            ];
            // Pick the corner that results in shortest total detour and isn't itself blocked
            let bestCorner = null, bestDist = Infinity;
            for (const c of corners) {
                // Skip corners that land in the river or another building
                if (isInRiver(c.x)) continue;
                if (c.x < 20 || c.x > WORLD_W - 20 || c.y < 20 || c.y > WORLD_H - 20) continue;
                const d = Math.sqrt((fromX - c.x) ** 2 + (fromY - c.y) ** 2)
                        + Math.sqrt((toX - c.x) ** 2 + (toY - c.y) ** 2);
                if (d < bestDist) { bestDist = d; bestCorner = c; }
            }
            if (bestCorner) {
                waypoints.push({ x: bestCorner.x, y: bestCorner.y, _dist: Math.sqrt((fromX - bestCorner.x) ** 2 + (fromY - bestCorner.y) ** 2) });
            }
        }
        // Sort by distance from start
        waypoints.sort((a, b) => a._dist - b._dist);
        return waypoints;
    }

    // Set target with automatic river-crossing and building-avoidance waypoints
    function entityDistTo(entity, ox, oy) {
        return Math.sqrt((entity.x - ox) ** 2 + (entity.y - oy) ** 2);
    }

    function moveEntityToward(entity, tx, ty, dt, speed, speedMul, stuckThreshold, targetType) {
        // Navigate through waypoints first
        let goalX = tx, goalY = ty;
        if (entity.waypoints && entity.waypoints.length > 0) {
            goalX = entity.waypoints[0].x;
            goalY = entity.waypoints[0].y;
        }
        const dx = goalX - entity.x;
        const dy = goalY - entity.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 8 && entity.waypoints && entity.waypoints.length > 0) {
            entity.waypoints.shift();
            entity.stuckTimer = 0;
            entity.steerFrames = 0;
            return false;
        }
        if (dist < 3 && (!entity.waypoints || entity.waypoints.length === 0)) {
            entity.stuckTimer = 0;
            entity.steerFrames = 0;
            return true;
        }
        // Stuck detection: if barely moved, skip waypoint or give up
        const movedDist = Math.sqrt((entity.x - entity.lastMoveX) ** 2 + (entity.y - entity.lastMoveY) ** 2);
        entity.stuckTimer += dt;
        if (entity.stuckTimer > stuckThreshold) {
            entity.stuckTimer = 0;
            if (movedDist < 5) {
                entity.steerFrames = 0;
                if (entity.waypoints && entity.waypoints.length > 0) {
                    entity.waypoints.shift();
                } else {
                    return true; // give up, treat as arrived
                }
            }
            entity.lastMoveX = entity.x;
            entity.lastMoveY = entity.y;
        }
        const spd = speed * dt * speedMul;
        const step = Math.min(spd, dist);
        const dirX = dx / dist, dirY = dy / dist;
        // Use cached steer direction if still active, otherwise recalculate
        if (entity.steerFrames > 0) {
            entity.steerFrames -= dt;
            if (!isBlocked(entity.x + entity.steerDx * step, entity.y + entity.steerDy * step, targetType)) {
                entity.x += entity.steerDx * step;
                entity.y += entity.steerDy * step;
                entity.facing = Math.atan2(entity.steerDy, entity.steerDx);
                return dist < 8 && (!entity.waypoints || entity.waypoints.length === 0);
            }
            entity.steerFrames = 0;
        }
        const steer = steerAroundObstacles(entity.x, entity.y, dirX, dirY, step, targetType);
        if (Math.abs(steer.dx - dirX) > 0.1 || Math.abs(steer.dy - dirY) > 0.1) {
            entity.steerDx = steer.dx;
            entity.steerDy = steer.dy;
            entity.steerFrames = 20;
        }
        entity.x += steer.dx * step;
        entity.y += steer.dy * step;
        entity.facing = Math.atan2(steer.dy, steer.dx);
        return dist < 8 && (!entity.waypoints || entity.waypoints.length === 0);
    }

    function setTargetWithPath(character, tx, ty) {
        // Clamp target out of the river to prevent characters from targeting positions inside it
        tx = clampOutOfRiver(tx);
        character.targetX = tx;
        character.targetY = ty;
        // Determine what type of building the character is going to (so we don't avoid it)
        let targetType = null;
        if (character.currentAction) {
            const act = ACTION_DEFS.find(a => a.id === character.currentAction.id);
            if (act) targetType = act.target;
            if (character.currentAction.target && typeof character.currentAction.target === 'string') {
                targetType = character.currentAction.target;
            }
        }
        // River waypoints
        const riverWP = planWaypoints(character.x, character.y, tx, ty);
        // Building waypoints for non-river segments
        const buildingWP = planBuildingWaypoints(character.x, character.y, tx, ty, targetType);
        // Merge: building waypoints first (sorted by distance), then river waypoints
        const allWP = [];
        if (riverWP) {
            // Insert building waypoints that come before the first river waypoint
            const riverStartDist = Math.sqrt((character.x - riverWP[0].x) ** 2 + (character.y - riverWP[0].y) ** 2);
            for (const bw of buildingWP) {
                if (bw._dist < riverStartDist) allWP.push(bw);
            }
            allWP.push(...riverWP);
            // Insert building waypoints after river crossing
            for (const bw of planBuildingWaypoints(riverWP[riverWP.length - 1].x, riverWP[riverWP.length - 1].y, tx, ty, targetType)) {
                allWP.push(bw);
            }
        } else {
            allWP.push(...buildingWP);
        }
        character.waypoints = allWP;
        // Reset stuck tracking so new movement starts fresh
        character.stuckTimer = 0;
        character.lastMoveX = character.x;
        character.lastMoveY = character.y;
    }

    // Ensure positions don't land inside the river
    function clampOutOfRiver(x) {
        if (x > RIVER_LEFT && x < BRIDGE.x) return RIVER_LEFT - 10;
        if (x >= BRIDGE.x && x < RIVER_RIGHT) return RIVER_RIGHT + 10;
        return x;
    }

    let activeFestival = null;

    function checkFestival() {
        const dayInCycle = ((gameDay - 1) % 40) + 1;
        const prev = activeFestival;
        activeFestival = FESTIVALS.find(f => f.dayInCycle === dayInCycle) || null;
        if (activeFestival && activeFestival !== prev) {
            addLog(`🎌 ${activeFestival.name} (${activeFestival.de}) beginnt!`, 'speak');
            festivalParticles = [];
        }
        if (!activeFestival) festivalParticles = [];
    }

    function updateFestivalParticles(dt) {
        if (!activeFestival) return;
        const maxP = 20;
        // Spawn festival-specific particles
        if (festivalParticles.length < maxP && Math.random() < 0.03 * dt) {
            if (activeFestival.id === 'hanami') {
                // Falling cherry blossom petals
                festivalParticles.push({
                    type: 'sakura', x: randFloat(50, WORLD_W - 50), y: -10,
                    vx: randFloat(-0.3, 0.3), vy: randFloat(0.2, 0.5),
                    size: randFloat(2, 5), rot: randFloat(0, Math.PI * 2), rotSpeed: randFloat(-0.02, 0.02),
                    life: randFloat(400, 700)
                });
            } else if (activeFestival.id === 'tanabata') {
                // Tanzaku paper strips swaying
                festivalParticles.push({
                    type: 'tanzaku', x: randFloat(50, WORLD_W - 50), y: randFloat(20, 60),
                    phase: randFloat(0, Math.PI * 2), size: randFloat(3, 6),
                    color: randEl(['#e84040','#4080e8','#40c040','#e8c040','#c040c0']),
                    life: randFloat(300, 600), maxLife: 0
                });
                festivalParticles[festivalParticles.length - 1].maxLife = festivalParticles[festivalParticles.length - 1].life;
            } else if (activeFestival.id === 'tsukimi') {
                // Glowing moon orbs
                festivalParticles.push({
                    type: 'moonorb', x: randFloat(50, WORLD_W - 50), y: randFloat(20, 80),
                    phase: randFloat(0, Math.PI * 2), size: randFloat(2, 4),
                    life: randFloat(200, 400), maxLife: 0
                });
                festivalParticles[festivalParticles.length - 1].maxLife = festivalParticles[festivalParticles.length - 1].life;
            }
        }
        // Update particles
        for (const p of festivalParticles) {
            p.life -= dt;
            p.x += (p.vx || 0) * dt;
            p.y += (p.vy || 0) * dt;
            if (p.type === 'sakura') { p.vx += Math.sin(gameTick * 0.01 + p.x * 0.05) * 0.003 * dt; p.rot += p.rotSpeed * dt; }
            if (p.type === 'tanzaku') p.vx = Math.sin(gameTick * 0.008 + p.phase) * 0.05;
        }
        festivalParticles = festivalParticles.filter(p => p.life > 0 && p.y > -30 && p.y < WORLD_H + 30);
    }

    function drawFestivalEffects(ctx) {
        if (!activeFestival || festivalParticles.length === 0) return;
        const s = canvasScale;
        ctx.save();
        for (const p of festivalParticles) {
            if (p.type === 'sakura') {
                // Cherry blossom petal
                const a = Math.min(1, p.life / 60);
                ctx.save();
                ctx.translate(p.x*s, p.y*s);
                ctx.rotate(p.rot);
                ctx.globalAlpha = a * 0.8;
                ctx.fillStyle = `rgba(255,180,200,0.9)`;
                ctx.beginPath();
                ctx.ellipse(0, 0, p.size*0.6*s, p.size*0.3*s, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = `rgba(255,220,230,0.6)`;
                ctx.beginPath();
                ctx.ellipse(p.size*0.2*s, 0, p.size*0.3*s, p.size*0.2*s, 0.3, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
                ctx.globalAlpha = 1;
            } else if (p.type === 'tanzaku') {
                // Tanabata paper strip
                const fadeIn = Math.min(1, (p.maxLife - p.life) / 40);
                const fadeOut = Math.min(1, p.life / 40);
                const a = fadeIn * fadeOut;
                ctx.globalAlpha = a * 0.7;
                ctx.fillStyle = p.color;
                const sway = Math.sin(gameTick * 0.01 + p.phase) * 3;
                ctx.fillRect((p.x + sway)*s, p.y*s, p.size*0.3*s, p.size*2*s);
                ctx.globalAlpha = 1;
            } else if (p.type === 'moonorb') {
                const fadeIn = Math.min(1, (p.maxLife - p.life) / 40);
                const fadeOut = Math.min(1, p.life / 40);
                const a = fadeIn * fadeOut * (0.3 + Math.sin(p.phase + gameTick * 0.02) * 0.15);
                ctx.fillStyle = `rgba(255,230,180,${a})`;
                ctx.beginPath();
                ctx.arc((p.x + Math.sin(gameTick*0.008 + p.phase)*15)*s, p.y*s, p.size*s, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // Festival banner at top
        if (activeFestival) {
            const bannerAlpha = 0.6 + Math.sin(gameTick * 0.03) * 0.1;
            const cw = canvas.width / dpr;
            ctx.globalAlpha = bannerAlpha;
            ctx.font = `bold ${Math.round(10*s)}px 'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif`;
            ctx.fillStyle = '#d4a030';
            ctx.textAlign = 'right';
            ctx.fillText(`${activeFestival.name} ${activeFestival.romaji}`, cw - 10*s, 14*s);
            ctx.globalAlpha = 1;
        }
        ctx.restore();
    }

    class YojijukugoCloud {
        constructor(yoji) {
            this.chars = yoji.chars;
            this.kana = yoji.kana;
            this.de = yoji.de;
            this.life = 300;
            this.maxLife = 300;
        }
        update(dt) {
            this.life -= dt;
            return this.life > 0;
        }
        draw(ctx) {
            const cw = canvas.width / dpr;
            const s = canvasScale;
            const fadeIn = Math.min(1, (this.maxLife - this.life) / 40);
            const fadeOut = Math.min(1, this.life / 40);
            const alpha = fadeIn * fadeOut;
            const cy = 50 * s + Math.sin(gameTick * 0.015) * 4 * s;
            ctx.save();
            ctx.globalAlpha = alpha;
            // Cloud background
            ctx.fillStyle = 'rgba(30,25,15,0.6)';
            const tw = this.chars.length * 18 * s + 40 * s;
            const cx = cw / 2;
            ctx.beginPath();
            ctx.ellipse(cx, cy, tw / 2, 22 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            // Gold border
            ctx.strokeStyle = `rgba(180,130,40,${alpha * 0.5})`;
            ctx.lineWidth = 1 * s;
            ctx.stroke();
            // Characters
            ctx.font = `bold ${Math.round(16*s)}px 'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif`;
            ctx.fillStyle = '#e8d080';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.chars, cx, cy - 3 * s);
            // Kana + German
            ctx.font = `${Math.round(8*s)}px 'Courier New','Noto Sans JP',monospace`;
            ctx.fillStyle = '#a09070';
            ctx.fillText(this.kana + ' — ' + this.de, cx, cy + 12 * s);
            ctx.restore();
        }
    }

    // ============================================================
    //  PERSON CLASS
    // ============================================================
    class Person {
        constructor(name, role, color) {
            this.name = name;
            this.role = role; // 'speaker' or 'learner'
            this.color = color;

            // Random attributes 1-10
            this.geschick = randInt(1, 10);      // Dexterity: movement speed + action speed
            this.neugier = randInt(1, 10);       // Curiosity: wander tendency + action variety
            this.geselligkeit = randInt(1, 10);  // Sociability: social actions + staying close
            this.wahrnehmung = randInt(1, 10);   // Perception: hearing range + learn chance

            // Appearance — Edo period Japanese / German traveler
            const skinTones = ['#e8c8a0','#d4b088','#e0c098','#dab890','#e8d0a8','#d0a880'];
            const hairColors = ['#1a1008','#0a0a08','#1a1a10','#2a1a10'];
            const clothColors_s = ['#4a6a8a','#6a3030','#3a5a3a','#8a6a30']; // Japanese robes
            const clothColors_l = ['#6a5a40','#5a4a30','#7a6a50']; // German traveler clothing
            this.skinTone = randEl(skinTones);
            this.hairColor = randEl(hairColors);
            this.clothColor = randEl(role === 'speaker' ? clothColors_s : clothColors_l);

            // Position
            this.x = role === 'speaker' ? 400 : 440;
            this.y = role === 'speaker' ? 300 : 320;
            this.targetX = this.x;
            this.targetY = this.y;
            this.facing = 0; // angle

            // Needs (0-100, 100 = full)
            this.hunger = 70 + randInt(0, 30);
            this.thirst = 70 + randInt(0, 30);
            this.energy = 60 + randInt(0, 40);

            // State
            this.state = 'idle'; // idle, moving, acting, speaking
            this.currentAction = null;
            this.actionTimer = 0;
            this.idleTimer = randInt(30, 120);
            this.activityDe = 'Untätig';

            // Spaced repetition: track action history for variety
            this.actionHistory = []; // recent action IDs (newest first)
            this.actionHistoryMax = 12; // remember last N actions

            // Learner follow behavior
            this.followMode = 'following'; // 'following', 'wandering', 'returning'
            this.wanderTimer = 0;
            this.followTimer = randInt(300, 800);  // time before considering a wander
            this.returnUrgency = 0;

            // Learning (only for learner)
            this.knownWords = new Set();
            this.wordHistory = []; // for UI display order

            // Relationships (name → score 0-100)
            this.relationships = {};

            // Mood (computed periodically)
            this.mood = null;

            // Waypoint navigation
            this.waypoints = [];
            this.stuckTimer = 0;
            this.lastMoveX = this.x;
            this.lastMoveY = this.y;
            // Steer memory: keep a chosen avoidance direction for several frames to prevent jitter
            this.steerDx = 0;
            this.steerDy = 0;
            this.steerFrames = 0;
        }

        get moveSpeed() {
            return 0.6 + this.geschick * 0.18;
        }

        get needDecayRate() {
            // Higher geschick = slightly slower decay (skilled people are more efficient)
            return 0.005 / (0.5 + this.geschick * 0.06);
        }

        get learnChance() {
            // Perception is the primary driver of learning ability (reduced by 1/3)
            return (this.wahrnehmung * 0.08 + 0.05) * 0.667;
        }

        get hearingRange() {
            // Perception affects how far the learner can hear the speaker
            return 120 + this.wahrnehmung * 12;
        }

        get wanderChance() {
            // Curiosity drives how often the learner wanders off
            return 0.04 + this.neugier * 0.016;
        }

        get socialWeight() {
            // Sociability affects social action preference (0.5 - 2.0 range)
            return 0.5 + this.geselligkeit * 0.15;
        }

        update(dt) {
            // Decay needs
            this.hunger -= this.needDecayRate * dt;
            this.thirst -= this.needDecayRate * dt * 1.2;
            if (this.state === 'acting' && this.currentAction && this.currentAction.id !== 'sleep_house') {
                this.energy -= this.needDecayRate * dt * 0.8;
            } else if (this.state === 'idle') {
                this.energy += 0.003 * dt;
            }
            this.hunger = Math.max(0, Math.min(100, this.hunger));
            this.thirst = Math.max(0, Math.min(100, this.thirst));
            this.energy = Math.max(0, Math.min(100, this.energy));
        }

        distTo(ox, oy) {
            return entityDistTo(this, ox, oy);
        }

        moveToward(tx, ty, dt) {
            let tType = null;
            if (this.currentAction) {
                if (this.currentAction.target && typeof this.currentAction.target === 'string') tType = this.currentAction.target;
                else { const a = ACTION_DEFS.find(a => a.id === this.currentAction.id); if (a) tType = a.target; }
            }
            return moveEntityToward(this, tx, ty, dt, this.moveSpeed, 0.4, 80, tType);
        }
    }
