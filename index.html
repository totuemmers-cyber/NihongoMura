    // Relationship change flash indicators
    let relChangeFlashes = [];

    function updateNPCs(dt) {
        for (const npc of npcs) {
            // Update watching timer
            if (npc.watchTimer > 0) {
                npc.watchTimer -= dt;
                if (npc.watchTarget) npc.facing = Math.atan2(npc.watchTarget.y - npc.y, npc.watchTarget.x - npc.x);
                if (npc.watchTimer <= 0) { npc.watchTarget = null; }
            }

            // Update mood periodically
            if (Math.floor(gameTick) % 30 === 0) npc.mood = getMood(npc);

            switch (npc.state) {
                case 'idle':
                    npc.idleTimer -= dt;
                    npc.activityDe = 'Untätig';

                    // Glance toward high-rel character nearby (~0.1% per tick)
                    if (Math.random() < 0.001 * dt) {
                        const allChars = [...persons, ...npcs];
                        for (const c of allChars) {
                            if (c === npc) continue;
                            if ((npc.relationships[c.name] || 0) >= 30 && npc.distTo(c.x, c.y) < 100) {
                                npc.facing = Math.atan2(c.y - npc.y, c.x - npc.x);
                                break;
                            }
                        }
                    }

                    if (npc.idleTimer <= 0) {
                        // Decide: wander or try to chat
                        const chatChance = 0.35;
                        let startedChat = false;

                        if (Math.random() < chatChance) {
                            // Find another NPC nearby to chat with (weighted by relationship)
                            const candidates = npcs.filter(other =>
                                other !== npc &&
                                other.state === 'idle' &&
                                npc.distTo(other.x, other.y) < 120
                            );
                            let partner = null;
                            if (candidates.length > 0) {
                                const weights = candidates.map(c => 1 + (npc.relationships[c.name] || 0) * 0.05);
                                const total = weights.reduce((s, w) => s + w, 0);
                                let r = Math.random() * total;
                                for (let ci = 0; ci < candidates.length; ci++) {
                                    r -= weights[ci];
                                    if (r <= 0) { partner = candidates[ci]; break; }
                                }
                                if (!partner) partner = candidates[candidates.length - 1];
                            }
                            if (partner) {
                                npc.state = 'chatting';
                                npc.chatTimer = randFloat(80, 200);
                                npc.chatPartner = partner;
                                partner.state = 'chatting';
                                partner.chatTimer = npc.chatTimer;
                                partner.chatPartner = npc;
                                npc.activityDe = 'Redet';
                                partner.activityDe = 'Redet';

                                // Face each other
                                npc.facing = Math.atan2(partner.y - npc.y, partner.x - npc.x);
                                partner.facing = Math.atan2(npc.y - partner.y, npc.x - partner.x);

                                // First bubble — contextual
                                const text = npcContextualChatter(npc, partner);
                                npcBubbles.push(new SpeechBubble(npc, text, [], false));
                                // Boost relationship
                                const oldRel = npc.relationships[partner.name] || 0;
                                npc.relationships[partner.name] = Math.min(100, oldRel + 3);
                                partner.relationships[npc.name] = Math.min(100, (partner.relationships[npc.name] || 0) + 3);
                                if (oldRel < 97) relChangeFlashes.push({ x: (npc.x + partner.x)/2, y: Math.min(npc.y, partner.y) - 20, text: '+', timer: 60, color: 'rgba(120,220,120,' });
                                startedChat = true;
                            }
                        }

                        if (!startedChat) {
                            // 40% chance: routine target, 60%: random wander
                            if (Math.random() < 0.4 && npc.affinities) {
                                const target = getRoutineTarget(npc);
                                if (target) {
                                    npc.state = 'moving';
                                    setTargetWithPath(npc, Math.max(40, Math.min(WORLD_W - 40, target.x)), Math.max(40, Math.min(WORLD_H - 40, target.y)));
                                    npc.activityDe = 'Geht zum Ziel';
                                } else {
                                    npc.state = 'moving';
                                    setTargetWithPath(npc, Math.max(40, Math.min(WORLD_W - 40, npc.x + randFloat(-120, 120))), Math.max(40, Math.min(WORLD_H - 40, npc.y + randFloat(-120, 120))));
                                    npc.activityDe = 'Geht umher';
                                }
                            } else {
                                npc.state = 'moving';
                                setTargetWithPath(npc, Math.max(40, Math.min(WORLD_W - 40, npc.x + randFloat(-120, 120))), Math.max(40, Math.min(WORLD_H - 40, npc.y + randFloat(-120, 120))));
                                npc.activityDe = 'Geht umher';
                            }
                        }
                    }
                    break;

                case 'moving':
                    if (npc.moveToward(npc.targetX, npc.targetY, dt)) {
                        npc.state = 'idle';
                        npc.idleTimer = randFloat(80, 400);
                    }
                    break;

                case 'chatting':
                    npc.chatTimer -= dt;
                    // Alternating contextual bubbles while chatting
                    if (Math.random() < 0.003 * dt) {
                        // Alternate: sometimes the partner responds instead
                        const speaker = (npc.chatPartner && Math.random() < 0.5) ? npc.chatPartner : npc;
                        const listener = speaker === npc ? npc.chatPartner : npc;
                        const text = npcContextualChatter(speaker, listener);
                        npcBubbles.push(new SpeechBubble(speaker, text, [], false));
                    }
                    if (npc.chatTimer <= 0) {
                        npc.state = 'idle';
                        npc.idleTimer = randFloat(100, 350);
                        npc.chatPartner = null;
                        // Wander away after chat
                        if (Math.random() < 0.5) {
                            npc.state = 'moving';
                            setTargetWithPath(npc, Math.max(40, Math.min(WORLD_W - 40, npc.x + randFloat(-100, 100))), Math.max(40, Math.min(WORLD_H - 40, npc.y + randFloat(-100, 100))));
                        }
                    }
                    break;
            }
        }

        // Update NPC bubbles
        npcBubbles = npcBubbles.filter(b => b.update(dt));
    }

    // ============================================================
    //  EMERGENT RELATIONSHIPS
    // ============================================================
    function updateRelationships(dt) {
        const allChars = [...persons, ...npcs];
        const fire = cachedTeahouse;

        // Near-teahouse bonding: characters near the same fire grow closer
        if (fire) {
            const nearFire = allChars.filter(c => {
                const d = Math.sqrt((c.x - fire.x) ** 2 + (c.y - fire.y) ** 2);
                return d < 60;
            });
            for (let i = 0; i < nearFire.length; i++) {
                for (let j = i + 1; j < nearFire.length; j++) {
                    const a = nearFire[i], b = nearFire[j];
                    const aName = a.name, bName = b.name;
                    a.relationships[bName] = Math.min(100, (a.relationships[bName] || 0) + 0.3 * dt * 0.016);
                    b.relationships[aName] = Math.min(100, (b.relationships[aName] || 0) + 0.3 * dt * 0.016);
                }
            }
        }

        // NPC follow behavior: NPCs with high relationship to speaker occasionally drift toward them
        const speaker = persons[0];
        for (const npc of npcs) {
            const rel = npc.relationships[speaker.name] || 0;
            if (rel > 50 && npc.state === 'idle' && Math.random() < 0.0003 * dt * (rel / 100)) {
                npc.state = 'moving';
                setTargetWithPath(npc, Math.max(40, Math.min(WORLD_W - 40, speaker.x + randFloat(-40, 40))), Math.max(40, Math.min(WORLD_H - 40, speaker.y + randFloat(-40, 40))));
                npc.activityDe = 'Folgt ' + speaker.name;
            }
        }

        // Learner return speed influenced by relationship
        const learner = persons[1];
        const relToSpeaker = learner.relationships[speaker.name] || 0;
        if (learner.followMode === 'returning' && relToSpeaker > 40) {
            // Slightly faster return (processed in learner AI via relationship boost)
        }
    }

    function boostRelationshipsNearby(actor, amount) {
        const allChars = [...persons, ...npcs];
        for (const c of allChars) {
            if (c === actor) continue;
            const d = Math.sqrt((c.x - actor.x) ** 2 + (c.y - actor.y) ** 2);
            if (d < 80) {
                actor.relationships[c.name] = Math.min(100, (actor.relationships[c.name] || 0) + amount);
                c.relationships[actor.name] = Math.min(100, (c.relationships[actor.name] || 0) + amount * 0.5);
            }
        }
    }

    function drawRelationshipIndicators(ctx) {
        const allChars = [...persons, ...npcs];
        const s = canvasScale;
        for (let i = 0; i < allChars.length; i++) {
            for (let j = i + 1; j < allChars.length; j++) {
                const a = allChars[i], b = allChars[j];
                const rel = Math.max(a.relationships[b.name] || 0, b.relationships[a.name] || 0);
                if (rel < 50) continue;
                const d = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
                if (d > 100) continue;
                const ax = a.x * s, ay = (a.y - 5) * s;
                const bx = b.x * s, by = (b.y - 5) * s;

                ctx.save();
                if (rel >= 90) {
                    // Tier 4: Golden pulsing line + sparkles
                    const pulse = 0.3 + Math.sin(gameTick * 0.06) * 0.15;
                    ctx.strokeStyle = `rgba(255,210,80,${pulse})`;
                    ctx.lineWidth = s * 2.5;
                    ctx.setLineDash([]);
                    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
                    // Sparkle particles along line
                    for (let t = 0.2; t <= 0.8; t += 0.3) {
                        const sx = ax + (bx - ax) * t + Math.sin(gameTick * 0.1 + t * 20) * 4 * s;
                        const sy = ay + (by - ay) * t + Math.cos(gameTick * 0.13 + t * 15) * 3 * s;
                        ctx.beginPath();
                        ctx.arc(sx, sy, 1.5 * s, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,240,150,${pulse})`;
                        ctx.fill();
                    }
                } else if (rel >= 70) {
                    // Tier 3: Brighter golden line with subtle pulse
                    const alpha = 0.2 + Math.sin(gameTick * 0.04) * 0.08;
                    ctx.strokeStyle = `rgba(255,220,120,${alpha})`;
                    ctx.lineWidth = s * 2;
                    ctx.setLineDash([]);
                    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
                } else {
                    // Tier 2 (rel 50+): Faint dashed line
                    const alpha = Math.min(0.18, (rel - 50) / 200);
                    ctx.strokeStyle = `rgba(255,220,120,${alpha})`;
                    ctx.lineWidth = s * 1.5;
                    ctx.setLineDash([3 * s, 4 * s]);
                    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
                }
                ctx.setLineDash([]);
                ctx.restore();
            }
        }

        // Draw relationship change flashes (+/-)
        for (let i = relChangeFlashes.length - 1; i >= 0; i--) {
            const f = relChangeFlashes[i];
            f.timer -= 1;
            const alpha = Math.min(1, f.timer / 30);
            const rise = (60 - f.timer) * 0.3 * s;
            ctx.save();
            ctx.font = `bold ${Math.round(12*s)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillStyle = f.color + alpha + ')';
            ctx.fillText(f.text, f.x * s, (f.y * s) - rise);
            ctx.restore();
            if (f.timer <= 0) relChangeFlashes.splice(i, 1);
        }
    }

    // ============================================================
    //  WEATHER & DAY/NIGHT SYSTEM
    // ============================================================
    function getSeason() {
        const seasonIdx = Math.floor((gameDay - 1) / 10) % 4;
        return ['spring', 'summer', 'autumn', 'winter'][seasonIdx];
    }

    function getWeatherPool() {
        switch(getSeason()) {
            case 'spring': return ['clear','clear','rain','rain','wind','fog'];
            case 'summer': return ['clear','clear','clear','clear','rain'];
            case 'autumn': return ['clear','rain','rain','wind','wind','fog'];
            case 'winter': return ['clear','snow','snow','snow','wind','fog'];
            default: return ['clear'];
        }
    }

    function changeWeather() {
        previousWeather = currentWeather;
        const pool = getWeatherPool();
        currentWeather = randEl(pool);
        targetWeatherIntensity = currentWeather === 'clear' ? 0 : randFloat(0.3, 1.0);
        nextWeatherChange = randFloat(1500, 3500);

        // Speaker comments on weather change
        if (currentWeather !== previousWeather && currentWeather !== 'clear' && persons.length > 0) {
            let weatherConcepts = [];
            switch(currentWeather) {
                case 'rain': weatherConcepts = ['rain','water','cold']; break;
                case 'snow': weatherConcepts = ['cold','wind','white']; break;
                case 'wind': weatherConcepts = ['wind','fast']; break;
                case 'fog': weatherConcepts = ['look','quiet']; break;
            }
            const validConcepts = weatherConcepts.filter(c => vocab[c]);
            if (validConcepts.length >= 1) {
                const chosen = validConcepts.slice(0, randInt(1, 2));
                const words = chosen.map(c => ({ conceptId: c, kanji: vocab[c].kanji, kana: vocab[c].kana, de: vocab[c].de, type: vocab[c].type, role: vocab[c].type }));
                const kanjiText = words.map(w => w.kanji).join('') + '!';
                const kanaText = words.map(w => w.kana).join(' ') + '!';
                const wBubble = new SpeechBubble(persons[0], kanjiText, words, false);
                wBubble.kanjiText = kanjiText;
                wBubble.kanaText = kanaText;
                speechBubbles.push(wBubble);
                sfx('speak');
                addLog(`${persons[0].name}: "${kanjiText}" (Wetter)`, 'speak');

                const learner = persons[1];
                if (learner.distTo(persons[0].x, persons[0].y) <= learner.hearingRange) {
                    for (const w of words) {
                        if (!learner.knownWords.has(w.conceptId)) {
                            if (Math.random() < learner.learnChance) {
                                learnWord(learner, w);
                            }
                        }
                    }
                }
            }
        }
    }

    function updateWeather(dt) {
        nextWeatherChange -= dt;
        if (nextWeatherChange <= 0) changeWeather();

        // Smooth intensity transition
        const step = 0.002 * dt;
        if (weatherIntensity < targetWeatherIntensity) {
            weatherIntensity = Math.min(targetWeatherIntensity, weatherIntensity + step);
        } else if (weatherIntensity > targetWeatherIntensity) {
            weatherIntensity = Math.max(targetWeatherIntensity, weatherIntensity - step);
        }

        // Spawn & update particles
        if (currentWeather === 'clear' && weatherIntensity < 0.05) { weatherParticles = []; return; }

        const spawnRate = weatherIntensity * (currentWeather === 'rain' ? 3 : currentWeather === 'snow' ? 2 : 1);
        for (let i = 0; i < spawnRate * dt * 0.3; i++) {
            if (weatherParticles.length > 300) break;
            switch(currentWeather) {
                case 'rain':
                    weatherParticles.push({ x: randFloat(-20, WORLD_W+20), y: randFloat(-40,-5), vx: randFloat(-0.5,-0.2), vy: randFloat(3,5), size: randFloat(1,2) });
                    break;
                case 'snow':
                    weatherParticles.push({ x: randFloat(-20, WORLD_W+20), y: randFloat(-20,-5), vx: randFloat(-0.3,0.3), vy: randFloat(0.3,0.8), size: randFloat(1.5,3.5), phase: randFloat(0,Math.PI*2) });
                    break;
                case 'wind':
                    weatherParticles.push({ x: randFloat(-20,0), y: randFloat(0,WORLD_H), vx: randFloat(2,4), vy: randFloat(-0.5,0.5), life: randFloat(40,100), size: randFloat(0.5,1.5) });
                    break;
                case 'fog':
                    if (weatherParticles.length < 40)
                        weatherParticles.push({ x: randFloat(0,WORLD_W), y: randFloat(0,WORLD_H), size: randFloat(30,80), phase: randFloat(0,Math.PI*2), vx: randFloat(-0.1,0.1), alpha: randFloat(0.03,0.08) });
                    break;
            }
        }

        for (const p of weatherParticles) {
            if (currentWeather === 'rain') { p.x += p.vx * dt; p.y += p.vy * dt; }
            else if (currentWeather === 'snow') { p.x += Math.sin(gameTick*0.02 + p.phase)*0.3*dt + p.vx*dt; p.y += p.vy * dt; }
            else if (currentWeather === 'wind') { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; }
            else if (currentWeather === 'fog') { p.x += p.vx * dt; p.phase += 0.01 * dt; }
        }

        weatherParticles = weatherParticles.filter(p => {
            if (p.life !== undefined && p.life <= 0) return false;
            if (p.x < -30 || p.x > WORLD_W+30 || p.y < -40) return false;
            // Rain splash on ground
            if (currentWeather === 'rain' && p.y >= WORLD_H - 10 && rainSplashes.length < 30) {
                rainSplashes.push({ x: p.x, y: WORLD_H - 5 + randFloat(-3, 3), life: 10, maxLife: 10 });
                return false;
            }
            return p.y <= WORLD_H + 20;
        });

        // Update rain splashes
        for (const sp of rainSplashes) sp.life -= dt;
        rainSplashes = rainSplashes.filter(sp => sp.life > 0);
    }

    function drawWeatherEffects(ctx) {
        if (weatherIntensity < 0.02) return;
        ctx.save();
        ctx.globalAlpha = weatherIntensity;
        switch(currentWeather) {
            case 'rain':
                ctx.strokeStyle = 'rgba(150,180,220,0.6)';
                ctx.lineWidth = canvasScale * 0.8;
                for (const p of weatherParticles) {
                    ctx.beginPath();
                    ctx.moveTo(p.x*canvasScale, p.y*canvasScale);
                    ctx.lineTo((p.x+p.vx*2)*canvasScale, (p.y+p.vy*2)*canvasScale);
                    ctx.stroke();
                }
                break;
            case 'snow':
                ctx.fillStyle = '#fff';
                for (const p of weatherParticles) {
                    ctx.globalAlpha = weatherIntensity * 0.8;
                    ctx.beginPath();
                    ctx.arc(p.x*canvasScale, p.y*canvasScale, p.size*canvasScale, 0, Math.PI*2);
                    ctx.fill();
                }
                break;
            case 'wind':
                ctx.strokeStyle = 'rgba(180,180,150,0.4)';
                ctx.lineWidth = canvasScale * 0.5;
                for (const p of weatherParticles) {
                    const a = p.life > 20 ? 0.4 : p.life / 50;
                    ctx.globalAlpha = weatherIntensity * a;
                    ctx.beginPath();
                    ctx.moveTo(p.x*canvasScale, p.y*canvasScale);
                    ctx.lineTo((p.x - p.vx*4)*canvasScale, (p.y - p.vy*4)*canvasScale);
                    ctx.stroke();
                }
                break;
            case 'fog':
                for (const p of weatherParticles) {
                    ctx.globalAlpha = p.alpha * weatherIntensity;
                    ctx.fillStyle = 'rgba(200,200,190,1)';
                    ctx.beginPath();
                    ctx.ellipse(p.x*canvasScale, p.y*canvasScale, p.size*canvasScale, p.size*0.5*canvasScale, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                break;
        }

        // Rain splashes on ground
        if (rainSplashes.length > 0) {
            ctx.strokeStyle = 'rgba(150,180,220,0.5)';
            ctx.lineWidth = canvasScale * 0.5;
            for (const sp of rainSplashes) {
                const progress = 1 - sp.life / sp.maxLife;
                const r = (2 + progress * 6) * canvasScale;
                ctx.globalAlpha = weatherIntensity * (1 - progress) * 0.5;
                ctx.beginPath();
                ctx.arc(sp.x * canvasScale, sp.y * canvasScale, r, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        ctx.restore();
    }

    function drawDayNightOverlay(ctx) {
        const cw = canvas.width / dpr;
        const ch = canvas.height / dpr;
        const s = canvasScale;

        // Night overlay — gradient: darker sky, lighter ground (village glow)
        if (gameHour >= 20 || gameHour < 5) {
            let alpha = 0.45;
            if (gameHour >= 20 && gameHour < 21) alpha = 0.45 * (gameHour - 20);
            if (gameHour >= 4 && gameHour < 5) alpha = 0.45 * (5 - gameHour);
            if (alpha > 0.01) {
                ctx.save();
                const grad = ctx.createLinearGradient(0, 0, 0, ch);
                grad.addColorStop(0, `rgba(10,10,50,${alpha})`);
                grad.addColorStop(0.6, `rgba(20,20,60,${alpha * 0.9})`);
                grad.addColorStop(1, `rgba(30,25,50,${alpha * 0.7})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, cw, ch);
                ctx.restore();
            }
        }

        // Sunrise — warm gradient near horizon
        if (gameHour >= 5 && gameHour < 7) {
            const alpha = 0.18 * (1 - (gameHour - 5) / 2);
            if (alpha > 0.01) {
                ctx.save();
                const grad = ctx.createLinearGradient(0, 0, 0, ch);
                grad.addColorStop(0, `rgba(220,160,80,${alpha * 0.3})`);
                grad.addColorStop(0.4, `rgba(240,130,60,${alpha})`);
                grad.addColorStop(1, `rgba(200,100,40,${alpha * 0.5})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, cw, ch);
                ctx.restore();
            }
        }

        // Sunset — warm gradient, stronger near horizon
        if (gameHour >= 18 && gameHour < 20) {
            const alpha = 0.22 * ((gameHour - 18) / 2);
            if (alpha > 0.01) {
                ctx.save();
                const grad = ctx.createLinearGradient(0, 0, 0, ch);
                grad.addColorStop(0, `rgba(180,60,30,${alpha * 0.4})`);
                grad.addColorStop(0.3, `rgba(220,90,30,${alpha})`);
                grad.addColorStop(0.7, `rgba(200,70,20,${alpha * 0.8})`);
                grad.addColorStop(1, `rgba(180,80,40,${alpha * 0.5})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, cw, ch);
                ctx.restore();
            }
        }

        // Moon + Stars at night
        if (gameHour >= 21 || gameHour < 4) {
            const nightAlpha = gameHour >= 21 ? Math.min(1, (gameHour - 21) / 2) : gameHour < 3 ? 1 : (4 - gameHour);
            ctx.save();

            // Moon — simple lunar cycle based on game day
            const moonPhase = gameDay % 8; // 0=new, 2=quarter, 4=full, 6=three-quarter
            const moonX = 140 * s;
            const moonY = 40 * s;
            const moonR = 8 * s;
            if (moonPhase !== 0) { // skip new moon
                ctx.globalAlpha = nightAlpha * 0.7;
                // Moon glow
                const moonGrad = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 3);
                moonGrad.addColorStop(0, 'rgba(200,210,230,0.12)');
                moonGrad.addColorStop(1, 'rgba(200,210,230,0)');
                ctx.fillStyle = moonGrad;
                ctx.fillRect(moonX - moonR * 3, moonY - moonR * 3, moonR * 6, moonR * 6);
                // Moon disc
                ctx.globalAlpha = nightAlpha * 0.85;
                ctx.fillStyle = '#e8e4d8';
                ctx.beginPath();
                ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
                ctx.fill();
                // Crescent shadow (for non-full phases)
                if (moonPhase !== 4) {
                    const shadowOff = (moonPhase < 4 ? 1 : -1) * moonR * (1 - Math.abs(moonPhase - 4) / 4) * 1.5;
                    ctx.fillStyle = 'rgba(10,10,50,0.85)';
                    ctx.beginPath();
                    ctx.arc(moonX + shadowOff, moonY, moonR * 0.92, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Milky Way band (very faint)
            ctx.globalAlpha = nightAlpha * 0.04;
            ctx.fillStyle = '#c0c8e0';
            ctx.save();
            ctx.translate(cw * 0.5, ch * 0.15);
            ctx.rotate(-0.3);
            ctx.beginPath();
            ctx.ellipse(0, 0, cw * 0.45, 20 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Stars — 40 positions
            ctx.fillStyle = '#fff';
            const stars = [
                [50,20],[180,45],[340,15],[500,30],[650,50],[780,25],[120,60],[400,55],
                [600,10],[820,45],[70,35],[250,8],[460,48],[580,22],[720,55],[850,12],
                [160,52],[380,38],[530,5],[690,42],[30,50],[910,18],[280,28],[440,12],
                [560,55],[740,8],[100,42],[320,52],[480,35],[620,58],[800,38],[950,30],
                [200,15],[360,45],[510,20],[670,32],[760,52],[880,8],[140,30],[420,8]
            ];
            for (let i = 0; i < stars.length; i++) {
                const [sx, sy] = stars[i];
                const twinkle = Math.sin(gameTick * 0.03 + sx * 0.1 + i * 0.7) * 0.5 + 0.5;
                // A few brighter "planet" stars
                const isBright = i === 3 || i === 15 || i === 28;
                const brightness = isBright ? 0.7 : 0.4;
                ctx.globalAlpha = nightAlpha * brightness * twinkle;
                const r = (isBright ? 1.5 + twinkle * 0.5 : 0.8 + twinkle * 0.7) * s;
                ctx.beginPath();
                ctx.arc(sx * s, sy * s, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // Rain darkening
        if (currentWeather === 'rain' && weatherIntensity > 0.1) {
            ctx.save();
            ctx.fillStyle = `rgba(30,40,50,${weatherIntensity * 0.15})`;
            ctx.fillRect(0, 0, cw, ch);
            ctx.restore();
        }
    }

    // ============================================================
    //  ATMOSPHERIC PARTICLES (decorative season/time effects)
    // ============================================================
    function updateAtmospheric(dt) {
        const season = getSeason();
        const isNight = gameHour >= 20 || gameHour < 5;
        const isDusk  = gameHour >= 18 && gameHour < 20;
        const isDawn  = gameHour >= 5 && gameHour < 7;

        // --- Fireflies (night, near water) ---
        if (isNight && atmosParticles.filter(p => p.kind === 'firefly').length < 18) {
            if (Math.random() < 0.04 * dt) {
                // Spawn near water features: lotus pond (120,530), fish pond (180,520), river area
                const spots = [[120,530],[180,520],[420,560],[650,400],[850,450]];
                const [sx,sy] = spots[Math.floor(Math.random()*spots.length)];
                atmosParticles.push({
                    kind: 'firefly', x: sx + randFloat(-40,40), y: sy + randFloat(-30,30),
                    phase: randFloat(0, Math.PI*2), speed: randFloat(0.15, 0.35),
                    drift: randFloat(-0.3, 0.3), radius: randFloat(15, 30),
                    life: randFloat(300, 600), maxLife: 0
                });
                const p = atmosParticles[atmosParticles.length-1];
                p.maxLife = p.life;
            }
        }

        // --- Cherry blossom petals (spring) ---
        if (season === 'spring' && atmosParticles.filter(p => p.kind === 'blossom').length < 25) {
            if (Math.random() < 0.06 * dt) {
                atmosParticles.push({
                    kind: 'blossom', x: randFloat(-20, WORLD_W + 20), y: randFloat(-20, -5),
                    vx: randFloat(-0.3, -0.1), vy: randFloat(0.3, 0.7),
                    rot: randFloat(0, Math.PI*2), rotSpeed: randFloat(-0.03, 0.03),
                    size: randFloat(2, 4), phase: randFloat(0, Math.PI*2),
                    color: randEl(['#f0a0b0','#e890a0','#f5b0c0','#e8a0b8'])
                });
            }
        }

        // --- Autumn leaves ---
        if (season === 'autumn' && atmosParticles.filter(p => p.kind === 'leaf').length < 15) {
            if (Math.random() < 0.03 * dt) {
                atmosParticles.push({
                    kind: 'leaf', x: randFloat(-20, WORLD_W + 20), y: randFloat(-20, -5),
                    vx: randFloat(0.5, 1.5), vy: randFloat(0.4, 0.8),
                    rot: randFloat(0, Math.PI*2), rotSpeed: randFloat(-0.04, 0.04),
                    size: randFloat(3, 5), color: randEl(['#c86830','#d89040','#b84020','#c8a030','#a06028'])
                });
            }
        }

        // --- Morning mist wisps (dawn) ---
        if (isDawn && atmosParticles.filter(p => p.kind === 'mist').length < 12) {
            if (Math.random() < 0.05 * dt) {
                atmosParticles.push({
                    kind: 'mist', x: randFloat(0, WORLD_W), y: randFloat(WORLD_H * 0.5, WORLD_H * 0.85),
                    vx: randFloat(-0.08, 0.08), size: randFloat(50, 100),
                    alpha: randFloat(0.04, 0.10), phase: randFloat(0, Math.PI*2),
                    life: randFloat(200, 400), maxLife: 0
                });
                const p = atmosParticles[atmosParticles.length-1];
                p.maxLife = p.life;
            }
        }

        // --- Dusk embers / warm dust (dusk) ---
        if (isDusk && atmosParticles.filter(p => p.kind === 'ember').length < 20) {
            if (Math.random() < 0.06 * dt) {
                atmosParticles.push({
                    kind: 'ember', x: randFloat(0, WORLD_W), y: randFloat(WORLD_H * 0.2, WORLD_H * 0.8),
                    vx: randFloat(-0.1, 0.3), vy: randFloat(-0.3, -0.1),
                    size: randFloat(1, 2.5), alpha: randFloat(0.2, 0.5),
                    life: randFloat(100, 250), maxLife: 0
                });
                const p = atmosParticles[atmosParticles.length-1];
                p.maxLife = p.life;
            }
        }

        // Update all particles
        for (const p of atmosParticles) {
            switch (p.kind) {
                case 'firefly':
                    p.phase += p.speed * dt * 0.05;
                    p.x += Math.cos(p.phase * 2.3) * p.radius * 0.008 * dt + p.drift * dt * 0.3;
                    p.y += Math.sin(p.phase * 1.7) * p.radius * 0.006 * dt;
                    p.life -= dt;
                    break;
                case 'blossom':
                    p.x += (p.vx + Math.sin(gameTick * 0.015 + p.phase) * 0.2) * dt;
                    p.y += p.vy * dt;
                    p.rot += p.rotSpeed * dt;
                    break;
                case 'leaf':
                    p.x += (p.vx + Math.sin(gameTick * 0.01 + p.rot) * 0.5) * dt;
                    p.y += p.vy * dt;
                    p.rot += p.rotSpeed * dt;
                    break;
                case 'mist':
                    p.x += p.vx * dt;
                    p.phase += 0.008 * dt;
                    p.life -= dt;
                    break;
                case 'ember':
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    break;
            }
        }

        // Remove dead / out-of-bounds
        atmosParticles = atmosParticles.filter(p => {
            if (p.life !== undefined && p.life <= 0) return false;
            if (p.kind === 'blossom' || p.kind === 'leaf') {
                return p.y < WORLD_H + 20 && p.x > -40 && p.x < WORLD_W + 40;
            }
            return true;
        });
    }

    function drawAtmosphericEffects(ctx) {
        const s = canvasScale;
        const season = getSeason();
        const isNight = gameHour >= 20 || gameHour < 5;
        const isDusk  = gameHour >= 18 && gameHour < 20;

        ctx.save();

        // --- Fireflies ---
        for (const p of atmosParticles) {
            if (p.kind !== 'firefly') continue;
            const glow = Math.sin(p.phase * 3.5) * 0.5 + 0.5; // pulsing
            const fadeIn = Math.min(1, (p.maxLife - p.life) / 60);
            const fadeOut = Math.min(1, p.life / 60);
            const a = glow * 0.7 * fadeIn * fadeOut;
            if (a < 0.01) continue;
            // Outer glow
            const grad = ctx.createRadialGradient(
                p.x*s, p.y*s, 0, p.x*s, p.y*s, 8*s
            );
            grad.addColorStop(0, `rgba(180,220,80,${a * 0.3})`);
            grad.addColorStop(1, 'rgba(180,220,80,0)');
            ctx.fillStyle = grad;
            ctx.fillRect((p.x-10)*s, (p.y-10)*s, 20*s, 20*s);
            // Core
            ctx.fillStyle = `rgba(220,255,120,${a})`;
            ctx.beginPath();
            ctx.arc(p.x*s, p.y*s, (1.2 + glow*0.8)*s, 0, Math.PI*2);
            ctx.fill();
        }

        // --- Cherry blossoms ---
        for (const p of atmosParticles) {
            if (p.kind !== 'blossom') continue;
            ctx.save();
            ctx.translate(p.x*s, p.y*s);
            ctx.rotate(p.rot);
            ctx.globalAlpha = 0.6;
            // Petal shape (elongated ellipse)
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size*s, p.size*0.5*s, 0, 0, Math.PI*2);
            ctx.fill();
            // Slight white highlight
            ctx.fillStyle = 'rgba(255,230,240,0.4)';
            ctx.beginPath();
            ctx.ellipse(-p.size*0.2*s, -p.size*0.1*s, p.size*0.4*s, p.size*0.2*s, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        // --- Autumn leaves ---
        for (const p of atmosParticles) {
            if (p.kind !== 'leaf') continue;
            ctx.save();
            ctx.translate(p.x*s, p.y*s);
            ctx.rotate(p.rot);
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = p.color;
            // Leaf shape
            ctx.beginPath();
            ctx.moveTo(0, -p.size*s);
            ctx.quadraticCurveTo(p.size*0.7*s, -p.size*0.3*s, 0, p.size*s);
            ctx.quadraticCurveTo(-p.size*0.7*s, -p.size*0.3*s, 0, -p.size*s);
            ctx.fill();
            // Vein
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 0.5*s;
            ctx.beginPath();
            ctx.moveTo(0, -p.size*s);
            ctx.lineTo(0, p.size*s);
            ctx.stroke();
            ctx.restore();
        }

        // --- Morning mist ---
        for (const p of atmosParticles) {
            if (p.kind !== 'mist') continue;
            const fadeIn = Math.min(1, (p.maxLife - p.life) / 80);
            const fadeOut = Math.min(1, p.life / 80);
            const a = p.alpha * fadeIn * fadeOut;
            ctx.globalAlpha = a;
            ctx.fillStyle = '#d8d0c0';
            ctx.beginPath();
            const wobble = Math.sin(p.phase) * p.size * 0.15;
            ctx.ellipse((p.x + wobble)*s, p.y*s, p.size*s, p.size*0.35*s, 0, 0, Math.PI*2);
            ctx.fill();
        }

        // --- Dusk embers ---
        for (const p of atmosParticles) {
            if (p.kind !== 'ember') continue;
            const fadeOut = Math.min(1, p.life / 40);
            const a = p.alpha * fadeOut;
            ctx.globalAlpha = a;
            ctx.fillStyle = '#e8a050';
            ctx.beginPath();
            ctx.arc(p.x*s, p.y*s, p.size*s, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.restore();

        // --- Enhanced light sources at night / dusk ---
        if (isNight || isDusk) {
            const nightFactor = isNight ? 1.0 : (gameHour - 18) / 2;
            ctx.save();
            for (const obj of worldObjects) {
                let lx, ly, r, col;
                if (obj.type === 'lantern_post') {
                    lx = (obj.x + 8) * s;
                    ly = (obj.y - obj.h/3 + 4) * s;
                    r = 30 * s * nightFactor;
                    col = [255, 120, 40];
                } else if (obj.type === 'kitchen') {
                    lx = obj.x * s;
                    ly = (obj.y - 5) * s;
                    r = 40 * s * nightFactor;
                    col = [255, 140, 50];
                } else if (obj.type === 'teahouse') {
                    lx = obj.x * s;
                    ly = (obj.y - 8) * s;
                    r = 35 * s * nightFactor;
                    col = [255, 160, 80];
                } else if (obj.type === 'shrine') {
                    lx = obj.x * s;
                    ly = (obj.y - 5) * s;
                    r = 25 * s * nightFactor;
                    col = [255, 100, 30];
                } else {
                    continue;
                }
                const grad = ctx.createRadialGradient(lx, ly, 0, lx, ly, r);
                grad.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},${0.18 * nightFactor})`);
                grad.addColorStop(0.5, `rgba(${col[0]},${col[1]-30},${col[2]-10},${0.06 * nightFactor})`);
                grad.addColorStop(1, `rgba(${col[0]},${col[1]-30},${col[2]-20},0)`);
                ctx.fillStyle = grad;
                ctx.fillRect(lx - r, ly - r, r*2, r*2);
            }
            ctx.restore();
        }
    }

    function getWeatherLabel() {
        switch(currentWeather) {
            case 'rain': return 'Regen'; case 'snow': return 'Schnee';
            case 'wind': return 'Wind'; case 'fog': return 'Nebel';
            default: return 'Klar';
        }
    }

    function getSeasonLabel() {
        switch(getSeason()) {
            case 'spring': return 'Fruehling'; case 'summer': return 'Sommer';
            case 'autumn': return 'Herbst'; case 'winter': return 'Winter';
        }
    }

    // ============================================================
    //  MICRO-EVENTS (random, routine-breaking happenings)
    // ============================================================
    let microEventTimer = randFloat(300, 600);
    let activeMicroEvent = null;

    const MICRO_EVENTS = [
        { id: 'chicken_chase',  weight: 3, minNpcs: 1 },
        { id: 'dropped_basket', weight: 3, minNpcs: 1 },
        { id: 'rare_stone',     weight: 2, minNpcs: 1 },
        { id: 'splash_well',    weight: 2, minNpcs: 1 },
        { id: 'cat_nap',        weight: 2, minNpcs: 0 },
        { id: 'big_fish',       weight: 2, minNpcs: 1 },
        { id: 'child_hide',     weight: 2, minNpcs: 2 },
    ];

    function pickIdleNpc() {
        const idle = npcs.filter(n => n.state === 'idle');
        return idle.length > 0 ? idle[Math.floor(Math.random() * idle.length)] : null;
    }

    function triggerMicroEvent() {
        // Weighted random pick
        const totalW = MICRO_EVENTS.reduce((s, e) => s + e.weight, 0);
        let roll = Math.random() * totalW;
        let chosen = MICRO_EVENTS[0];
        for (const e of MICRO_EVENTS) {
            roll -= e.weight;
            if (roll <= 0) { chosen = e; break; }
        }

        const idleCount = npcs.filter(n => n.state === 'idle').length;
        if (idleCount < chosen.minNpcs) return; // not enough idle NPCs

        switch (chosen.id) {
            case 'chicken_chase': {
                // An NPC chases a chicken — chicken runs away, NPC follows
                const npc = pickIdleNpc();
                if (!npc) return;
                const chicken = wildlife.find(w => w.type === 'rabbit' || w.type === 'crane'); // use any land animal
                npcBubbles.push(new SpeechBubble(npc, '抓住它！', [], false));
                // NPC runs around erratically
                activeMicroEvent = { id: 'chicken_chase', npc, timer: 180, phase: 0 };
                alertNearbyNPCs(npc.x, npc.y, 100, 80);
                break;
            }
            case 'dropped_basket': {
                // NPC drops something, makes a surprised sound, picks it up
                const npc = pickIdleNpc();
                if (!npc) return;
                npcBubbles.push(new SpeechBubble(npc, '哎呀！', [], false));
                activeMicroEvent = { id: 'dropped_basket', npc, timer: 160,
                    itemX: npc.x + randFloat(-8, 8), itemY: npc.y + randFloat(5, 12), phase: 0 };
                alertNearbyNPCs(npc.x, npc.y, 80, 60);
                break;
            }
            case 'rare_stone': {
                // NPC finds a pretty stone and shows it around
                const npc = pickIdleNpc();
                if (!npc) return;
                npcBubbles.push(new SpeechBubble(npc, '看！好石头！', [], false));
                activeMicroEvent = { id: 'rare_stone', npc, timer: 200, phase: 0 };
                // Nearby NPCs turn toward finder and react
                alertNearbyNPCs(npc.x, npc.y, 100, 100);
                for (const other of npcs) {
                    if (other !== npc && Math.abs(other.x - npc.x) < 100 && Math.abs(other.y - npc.y) < 80) {
                        setTargetWithPath(other, npc.x + randFloat(-20, 20), npc.y + randFloat(-15, 15));
                        other.state = 'moving';
                        if (Math.random() < 0.4) npcBubbles.push(new SpeechBubble(other, randEl(NPC_REACTIONS), [], false));
                    }
                }
                break;
            }
            case 'splash_well': {
                // NPC at the well — bucket falls, splash
                const npc = pickIdleNpc();
                if (!npc) return;
                const well = worldObjects.find(o => o.id === 'well1');
                if (!well) return;
                setTargetWithPath(npc, well.x, well.y);
                npc.state = 'moving';
                activeMicroEvent = { id: 'splash_well', npc, well, timer: 200, phase: 0 };
                alertNearbyNPCs(well.x, well.y, 90, 80);
                break;
            }
            case 'cat_nap': {
                // Cat finds a warm spot and naps — purely visual
                const cat = wildlife.find(w => w.type === 'cat');
                if (!cat) return;
                // Cat goes to a sunny spot near a building
                const spot = randEl(worldObjects.filter(o => o.type === 'house' || o.type === 'market'));
                if (!spot) return;
                cat.targetX = spot.x + randFloat(-15, 15);
                cat.targetY = spot.y + spot.h/2 + 5;
                activeMicroEvent = { id: 'cat_nap', cat, timer: 300, phase: 0 };
                break;
            }
            case 'big_fish': {
                // NPC at the fish pond gets excited about a big fish
                const npc = pickIdleNpc();
                if (!npc) return;
                const pond = worldObjects.find(o => o.id === 'fish_pond1');
                if (!pond) return;
                setTargetWithPath(npc, pond.x + randFloat(-10, 10), pond.y + randFloat(-10, 10));
                npc.state = 'moving';
                activeMicroEvent = { id: 'big_fish', npc, pond, timer: 200, phase: 0 };
                alertNearbyNPCs(pond.x, pond.y, 80, 70);
                break;
            }
            case 'child_hide': {
                // Two NPCs — one "hides" behind bamboo, other "seeks"
                const seeker = pickIdleNpc();
                if (!seeker) return;
                const hider = npcs.find(n => n !== seeker && n.state === 'idle');
                if (!hider) return;
                const bamboo = worldObjects.find(o => o.type === 'bamboo');
                if (!bamboo) return;
                setTargetWithPath(hider, bamboo.x + randFloat(-5, 5), bamboo.y + randFloat(-5, 5));
                hider.state = 'moving';
                npcBubbles.push(new SpeechBubble(seeker, '你在哪里？', [], false));
                activeMicroEvent = { id: 'child_hide', seeker, hider, bamboo, timer: 250, phase: 0 };
                break;
            }
        }
    }

    function updateMicroEvents(dt) {
        microEventTimer -= dt;
        if (microEventTimer <= 0 && !activeMicroEvent) {
            triggerMicroEvent();
            microEventTimer = randFloat(350, 700);
        }

        if (!activeMicroEvent) return;
        const ev = activeMicroEvent;
        ev.timer -= dt;

        switch (ev.id) {
            case 'chicken_chase':
                ev.phase += dt;
                if (ev.phase > 30 && Math.floor(ev.phase) % 40 < 2) {
                    // NPC runs to random nearby spot
                    const tx = ev.npc.x + randFloat(-60, 60);
                    const ty = ev.npc.y + randFloat(-40, 40);
                    setTargetWithPath(ev.npc, Math.max(40, Math.min(WORLD_W-40, tx)), Math.max(40, Math.min(WORLD_H-40, ty)));
                    ev.npc.state = 'moving';
                }
                if (ev.timer <= 30 && ev.phase < 1000) {
                    npcBubbles.push(new SpeechBubble(ev.npc, '太快了…', [], false));
                    ev.phase = 1000; // prevent re-trigger
                }
                break;
            case 'dropped_basket':
                ev.phase += dt;
                // After a pause, NPC walks to dropped item
                if (ev.phase > 60 && ev.phase < 62) {
                    setTargetWithPath(ev.npc, ev.itemX, ev.itemY);
                    ev.npc.state = 'moving';
                }
                if (ev.phase > 120 && ev.phase < 122) {
                    npcBubbles.push(new SpeechBubble(ev.npc, '好了！', [], false));
                }
                break;
            case 'rare_stone':
                ev.phase += dt;
                if (ev.phase > 100 && ev.phase < 102) {
                    // Finder shows stone — a nearby NPC reacts
                    const watcher = npcs.find(n => n !== ev.npc && Math.abs(n.x - ev.npc.x) < 60);
                    if (watcher) npcBubbles.push(new SpeechBubble(watcher, '真漂亮！', [], false));
                }
                break;
            case 'splash_well':
                ev.phase += dt;
                if (ev.phase > 80 && ev.phase < 82) {
                    npcBubbles.push(new SpeechBubble(ev.npc, '哎呀！水！', [], false));
                    sfx('drink');
                }
                break;
            case 'big_fish':
                ev.phase += dt;
                if (ev.phase > 80 && ev.phase < 82) {
                    npcBubbles.push(new SpeechBubble(ev.npc, '好大的鱼！', [], false));
                }
                if (ev.phase > 140 && ev.phase < 142) {
                    npcBubbles.push(new SpeechBubble(ev.npc, '跑了…', [], false));
                }
                break;
            case 'cat_nap':
                // Purely visual, just let timer run down
                break;
            case 'child_hide':
                ev.phase += dt;
                if (ev.phase > 100 && ev.phase < 102) {
                    setTargetWithPath(ev.seeker, ev.bamboo.x + randFloat(-20, 20), ev.bamboo.y + randFloat(-10, 10));
                    ev.seeker.state = 'moving';
                }
                if (ev.phase > 170 && ev.phase < 172) {
                    npcBubbles.push(new SpeechBubble(ev.seeker, '找到你了！', [], false));
                    npcBubbles.push(new SpeechBubble(ev.hider, '哈哈！', [], false));
                }
                break;
        }

        if (ev.timer <= 0) activeMicroEvent = null;
    }

    function drawMicroEventEffects(ctx) {
        if (!activeMicroEvent) return;
        const ev = activeMicroEvent;
        const s = canvasScale;

        switch (ev.id) {
            case 'dropped_basket': {
                // Draw dropped basket on ground
                if (ev.phase < 120) {
                    const ix = ev.itemX * s, iy = ev.itemY * s;
                    ctx.fillStyle = '#c8b870';
                    ctx.beginPath();
                    ctx.arc(ix, iy, 4*s, Math.PI, 0);
                    ctx.fill();
                    ctx.strokeStyle = '#a89850';
                    ctx.lineWidth = 0.5*s;
                    ctx.stroke();
                    // Scattered items
                    ctx.fillStyle = '#d89040';
                    ctx.beginPath(); ctx.arc(ix - 4*s, iy + 2*s, 1.5*s, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ix + 3*s, iy + 3*s, 1.5*s, 0, Math.PI*2); ctx.fill();
                }
                break;
            }
            case 'rare_stone': {
                // Draw glittering stone above NPC's hand
                if (ev.npc) {
                    const sx = ev.npc.x * s, sy = (ev.npc.y - 30) * s;
                    const sparkle = Math.sin(gameTick * 0.1) * 0.4 + 0.6;
                    ctx.fillStyle = `rgba(200,180,140,${sparkle})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 3*s, 0, Math.PI*2);
                    ctx.fill();
                    // Sparkle rays
                    ctx.strokeStyle = `rgba(255,230,150,${sparkle * 0.5})`;
                    ctx.lineWidth = 0.5*s;
                    for (let i = 0; i < 4; i++) {
                        const a = gameTick * 0.05 + i * Math.PI/2;
                        ctx.beginPath();
                        ctx.moveTo(sx + Math.cos(a)*4*s, sy + Math.sin(a)*4*s);
                        ctx.lineTo(sx + Math.cos(a)*7*s, sy + Math.sin(a)*7*s);
                        ctx.stroke();
                    }
                }
                break;
            }
            case 'splash_well': {
                // Water splash particles at well
                if (ev.phase > 78 && ev.phase < 120 && ev.well) {
                    const wx = ev.well.x * s, wy = (ev.well.y - 10) * s;
                    const splashT = ev.phase - 78;
                    ctx.fillStyle = 'rgba(80,150,200,0.5)';
                    for (let i = 0; i < 5; i++) {
                        const angle = i * Math.PI * 2 / 5 + splashT * 0.05;
                        const dist = splashT * 0.5;
                        const dx = Math.cos(angle) * dist * s;
                        const dy = Math.sin(angle) * dist * 0.6 * s - splashT * 0.2 * s;
                        const size = Math.max(0.5, (2 - splashT * 0.04)) * s;
                        ctx.beginPath();
                        ctx.arc(wx + dx, wy + dy, size, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                break;
            }
            case 'big_fish': {
                // Draw fish jumping out of pond
                if (ev.phase > 75 && ev.phase < 110 && ev.pond) {
                    const jumpT = (ev.phase - 75) / 35;
                    const fx = ev.pond.x * s + 5*s;
                    const fy = (ev.pond.y - 15 * Math.sin(jumpT * Math.PI)) * s;
                    ctx.save();
                    ctx.translate(fx, fy);
                    ctx.rotate(-0.3 + jumpT * 0.6);
                    ctx.fillStyle = '#e86030';
                    ctx.beginPath();
                    ctx.moveTo(0, -3*s);
                    ctx.quadraticCurveTo(4*s, 0, 0, 3*s);
                    ctx.quadraticCurveTo(-3*s, 0, 0, -3*s);
                    ctx.fill();
                    // Tail
                    ctx.beginPath();
                    ctx.moveTo(0, 2.5*s);
                    ctx.lineTo(-2*s, 5*s);
                    ctx.lineTo(2*s, 5*s);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                    // Splash drops
                    ctx.fillStyle = 'rgba(80,150,200,0.4)';
                    for (let i = 0; i < 3; i++) {
                        const dx = Math.sin(i*2.1 + ev.phase*0.1) * 6*s;
                        const dy = -Math.abs(Math.sin(jumpT*Math.PI)) * 8*s + i*3*s;
                        ctx.beginPath();
                        ctx.arc(ev.pond.x*s + dx, ev.pond.y*s + dy, 1.5*s, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                break;
            }
            case 'cat_nap': {
                // Draw Zzz above sleeping cat
                if (ev.cat) {
                    const cx = ev.cat.x * s, cy = (ev.cat.y - 12) * s;
                    const zPhase = gameTick * 0.03;
                    ctx.save();
                    ctx.font = `${Math.round(7*s)}px sans-serif`;
                    ctx.fillStyle = 'rgba(200,200,220,0.5)';
                    ctx.textAlign = 'center';
                    for (let i = 0; i < 3; i++) {
                        const rise = (zPhase + i * 1.5) % 4;
                        const a = rise < 0.5 ? rise * 2 : rise > 3 ? (4-rise)*2 : 1;
                        ctx.globalAlpha = a * 0.4;
                        ctx.fillText('z', cx + i*4*s, cy - rise*4*s);
                    }
                    ctx.restore();
                }
                break;
            }
        }
    }

    // ============================================================
    //  MULTI-STEP NPC INTERACTIONS
    // ============================================================
    function triggerNpcInteraction() {
        if (activeNpcInteraction) return;
        const idle = npcs.filter(n => n.state === 'idle');
        if (idle.length < 2) return;

        const npc1 = randEl(idle);
        // Pick partner weighted by relationship
        const candidates = idle.filter(n => n !== npc1);
        if (candidates.length === 0) return;
        const npc2 = randEl(candidates);
        const rel = npc1.relationships[npc2.name] || 0;

        // Pick a valid interaction
        const valid = NPC_INTERACTION_DEFS.filter(d => rel >= d.minRel);
        if (valid.length === 0) return;
        const def = randEl(valid);

        activeNpcInteraction = {
            id: def.id, npc1, npc2, def,
            phaseIdx: 0, phaseTimer: def.phases[0].duration,
            started: false
        };
    }

    function updateNpcInteractions(dt) {
        npcInteractionTimer -= dt;
        if (npcInteractionTimer <= 0 && !activeNpcInteraction) {
            triggerNpcInteraction();
            npcInteractionTimer = randFloat(500, 1000);
        }
        if (!activeNpcInteraction) return;
        const ia = activeNpcInteraction;
        const phase = ia.def.phases[ia.phaseIdx];

        // Init phase
        if (!ia.started) {
            ia.started = true;
            ia.npc1.activityDe = ia.def.label;
            ia.npc2.activityDe = ia.def.label;

            if (phase.chat) {
                npcBubbles.push(new SpeechBubble(ia.npc1, phase.chat, [], false));
            }

            switch (phase.action) {
                case 'move_kitchen': {
                    const kitchen = worldObjects.find(o => o.type === 'kitchen');
                    if (kitchen) { setTargetWithPath(ia.npc1, kitchen.x + randFloat(-10,10), kitchen.y + randFloat(-5,5)); ia.npc1.state = 'moving'; }
                    break;
                }
                case 'move_partner':
                    setTargetWithPath(ia.npc1, ia.npc2.x + randFloat(-15,15), ia.npc2.y + randFloat(-10,10));
                    ia.npc1.state = 'moving';
                    break;
                case 'greet':
                    ia.npc1.facing = Math.atan2(ia.npc2.y - ia.npc1.y, ia.npc2.x - ia.npc1.x);
                    ia.npc2.facing = Math.atan2(ia.npc1.y - ia.npc2.y, ia.npc1.x - ia.npc2.x);
                    break;
                case 'walk_garden': {
                    const garden = worldObjects.find(o => o.type === 'garden');
                    const tx = garden ? garden.x + randFloat(-20,20) : ia.npc1.x + randFloat(-80,80);
                    const ty = garden ? garden.y + randFloat(-15,15) : ia.npc1.y + randFloat(-60,60);
                    setTargetWithPath(ia.npc1, Math.max(40, Math.min(WORLD_W-40, tx)), Math.max(40, Math.min(WORLD_H-40, ty)));
                    setTargetWithPath(ia.npc2, Math.max(40, Math.min(WORLD_W-40, tx + randFloat(-15,15))), Math.max(40, Math.min(WORLD_H-40, ty + randFloat(-10,10))));
                    ia.npc1.state = 'moving'; ia.npc2.state = 'moving';
                    break;
                }
                case 'find': case 'show':
                    ia.npc1.facing = Math.atan2(ia.npc2.y - ia.npc1.y, ia.npc2.x - ia.npc1.x);
                    break;
                case 'argue':
                    ia.npc1.facing = Math.atan2(ia.npc2.y - ia.npc1.y, ia.npc2.x - ia.npc1.x);
                    ia.npc2.facing = Math.atan2(ia.npc1.y - ia.npc2.y, ia.npc1.x - ia.npc2.x);
                    break;
                case 'walk_away':
                    setTargetWithPath(ia.npc1, Math.max(40, Math.min(WORLD_W-40, ia.npc1.x + randFloat(-80,80))), Math.max(40, Math.min(WORLD_H-40, ia.npc1.y + randFloat(-60,60))));
                    ia.npc1.state = 'moving';
                    break;
                case 'return':
                    setTargetWithPath(ia.npc1, ia.npc2.x + randFloat(-15,15), ia.npc2.y + randFloat(-10,10));
                    ia.npc1.state = 'moving';
                    break;
                case 'reconcile':
                    ia.npc1.facing = Math.atan2(ia.npc2.y - ia.npc1.y, ia.npc2.x - ia.npc1.x);
                    ia.npc2.facing = Math.atan2(ia.npc1.y - ia.npc2.y, ia.npc1.x - ia.npc2.x);
                    npcBubbles.push(new SpeechBubble(ia.npc2, '没关系。', [], false));
                    break;
                case 'drink_together': case 'arrive': case 'react':
                    if (phase.chat) npcBubbles.push(new SpeechBubble(ia.npc2, npcContextualChatter(ia.npc2, ia.npc1), [], false));
                    break;
            }
        }

        ia.phaseTimer -= dt;
        if (ia.phaseTimer <= 0) {
            ia.phaseIdx++;
            if (ia.phaseIdx >= ia.def.phases.length) {
                // Interaction complete — boost relationship
                const oldRel = ia.npc1.relationships[ia.npc2.name] || 0;
                ia.npc1.relationships[ia.npc2.name] = Math.min(100, oldRel + 5);
                ia.npc2.relationships[ia.npc1.name] = Math.min(100, (ia.npc2.relationships[ia.npc1.name] || 0) + 5);
                relChangeFlashes.push({ x: (ia.npc1.x + ia.npc2.x)/2, y: Math.min(ia.npc1.y, ia.npc2.y) - 20, text: '+', timer: 60, color: 'rgba(120,220,120,' });
                ia.npc1.state = 'idle'; ia.npc1.idleTimer = randFloat(60, 200);
                ia.npc2.state = 'idle'; ia.npc2.idleTimer = randFloat(60, 200);
                ia.npc1.activityDe = 'Untätig'; ia.npc2.activityDe = 'Untätig';
                activeNpcInteraction = null;
            } else {
                ia.phaseTimer = ia.def.phases[ia.phaseIdx].duration;
                ia.started = false; // trigger next phase init
            }
        }
    }
