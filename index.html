    // ============================================================
    //  RIVER BARRIER & PATHFINDING
    // ============================================================
    // River runs roughly x=705..800 (meandering bezier), full height
    const RIVER_LEFT  = 705;
    const RIVER_RIGHT = 800;
    const BRIDGE = { x: 750, y: 400, halfW: 45, halfH: 50 };

    function isInRiver(x) {
        return x > RIVER_LEFT && x < RIVER_RIGHT;
    }

    function crossesRiver(x1, x2) {
        // True if one point is left of river and the other is right (or inside)
        const left1  = x1 <= RIVER_LEFT;
        const right1 = x1 >= RIVER_RIGHT;
        const left2  = x2 <= RIVER_LEFT;
        const right2 = x2 >= RIVER_RIGHT;
        if (left1 && right2) return true;
        if (right1 && left2) return true;
        if (left1 && isInRiver(x2)) return true;
        if (right1 && isInRiver(x2)) return true;
        if (left2 && isInRiver(x1)) return true;
        if (right2 && isInRiver(x1)) return true;
        return false;
    }

    // Build waypoints for river crossing via bridge
    function planWaypoints(fromX, fromY, toX, toY) {
        if (!crossesRiver(fromX, toX)) return null; // no waypoints needed
        const waypoints = [];
        // Approach bridge from the correct side (with generous margin from river edge)
        const comingFromLeft = fromX < RIVER_LEFT;
        const bridgeApproach = comingFromLeft
            ? { x: RIVER_LEFT - 15, y: BRIDGE.y }
            : { x: RIVER_RIGHT + 15, y: BRIDGE.y };
        const bridgeExit = comingFromLeft
            ? { x: RIVER_RIGHT + 15, y: BRIDGE.y }
            : { x: RIVER_LEFT - 15, y: BRIDGE.y };
        waypoints.push(bridgeApproach);
        waypoints.push(bridgeExit);
        return waypoints;
    }

    // Check if a point is inside any building (for avoidance)
    const BUILDING_TYPES = ['house', 'teahouse', 'kitchen', 'workshop', 'market', 'pagoda', 'shrine', 'torii', 'school', 'medicine_hut', 'stable'];
    const GROUND_TYPES = ['rice_paddy', 'river', 'lotus_pond', 'fish_pond', 'garden'];
    const VISUAL_BOTTOM = {
        house: 18, teahouse: 19, market: 14, well: 10, bridge: 22,
        pagoda: 21, gate: 26, bamboo: 25, garden: 0, kitchen: 14,
        workshop: 19, fish_pond: 0, shrine: 14, lantern_post: 16,
        rice_paddy: 0, river: 0, dock: 12, lotus_pond: 0,
        flower: 10, willow: 22, school: 20, medicine_hut: 13,
        stable: 13, tea_terrace: 16, viewpoint: 13
    };
    function isInsideBuilding(x, y, excludeType) {
        for (const obj of cachedBuildingObjects) {
            if (excludeType && obj.type === excludeType) continue;
            const hw = obj.w / 2, hh = obj.h / 2;
            if (x > obj.x - hw && x < obj.x + hw && y > obj.y - hh && y < obj.y + hh) {
                return obj;
            }
        }
        return null;
    }

    // Check if a position is blocked (river without bridge, or building)
    function isBlocked(x, y, targetType) {
        // River check (allow on bridge with generous corridor)
        if (isInRiver(x) && Math.abs(y - BRIDGE.y) > BRIDGE.halfH + 25) {
            return true;
        }
        // Building check
        if (isInsideBuilding(x, y, targetType)) {
            return true;
        }
        return false;
    }

    // Steer around obstacles: try original direction, then alternate angles
    // Always returns a direction — never leaves the character stuck
    function steerAroundObstacles(x, y, dirX, dirY, step, targetType) {
        // Try original direction first
        if (!isBlocked(x + dirX * step, y + dirY * step, targetType)) {
            return { dx: dirX, dy: dirY };
        }
        // Try increasingly wider angles
        const baseAngle = Math.atan2(dirY, dirX);
        const offsets = [0.4, -0.4, 0.8, -0.8, 1.2, -1.2, 1.6, -1.6, 2.2, -2.2, 2.8, -2.8];
        for (const off of offsets) {
            const angle = baseAngle + off;
            const sdx = Math.cos(angle);
            const sdy = Math.sin(angle);
            if (!isBlocked(x + sdx * step, y + sdy * step, targetType)) {
                return { dx: sdx, dy: sdy };
            }
        }
        // All angles blocked: move in original direction anyway (prevents freezing)
        return { dx: dirX, dy: dirY };
    }

    // Check if a line segment from (x1,y1) to (x2,y2) intersects a rectangle
    function lineIntersectsRect(x1, y1, x2, y2, rx, ry, rw, rh) {
        const hw = rw / 2 + 4, hh = rh / 2 + 4; // small margin
        const left = rx - hw, right = rx + hw, top = ry - hh, bot = ry + hh;
        // Liang-Barsky clipping
        const dx = x2 - x1, dy = y2 - y1;
        let tMin = 0, tMax = 1;
        const edges = [
            { p: -dx, q: x1 - left },
            { p: dx,  q: right - x1 },
            { p: -dy, q: y1 - top },
            { p: dy,  q: bot - y1 },
        ];
        for (const { p, q } of edges) {
            if (Math.abs(p) < 0.001) {
                if (q < 0) return false;
            } else {
                const t = q / p;
                if (p < 0) { if (t > tMin) tMin = t; }
                else       { if (t < tMax) tMax = t; }
                if (tMin > tMax) return false;
            }
        }
        return true;
    }

    // Plan waypoints around buildings that lie in the path
    function planBuildingWaypoints(fromX, fromY, toX, toY, targetType) {
        const waypoints = [];
        for (const obj of worldObjects) {
            if (!BUILDING_TYPES.includes(obj.type)) continue;
            if (targetType && obj.type === targetType) continue;
            if (!lineIntersectsRect(fromX, fromY, toX, toY, obj.x, obj.y, obj.w, obj.h)) continue;
            // Route around this building - pick the corner closest to the straight line
            const hw = obj.w / 2 + 10, hh = obj.h / 2 + 10;
            const corners = [
                { x: obj.x - hw, y: obj.y - hh },
                { x: obj.x + hw, y: obj.y - hh },
                { x: obj.x - hw, y: obj.y + hh },
                { x: obj.x + hw, y: obj.y + hh },
            ];
            // Pick the corner that results in shortest total detour and isn't itself blocked
            let bestCorner = null, bestDist = Infinity;
            for (const c of corners) {
                // Skip corners that land in the river or another building
                if (isInRiver(c.x)) continue;
                if (c.x < 20 || c.x > WORLD_W - 20 || c.y < 20 || c.y > WORLD_H - 20) continue;
                const d = Math.sqrt((fromX - c.x) ** 2 + (fromY - c.y) ** 2)
                        + Math.sqrt((toX - c.x) ** 2 + (toY - c.y) ** 2);
                if (d < bestDist) { bestDist = d; bestCorner = c; }
            }
            if (bestCorner) {
                waypoints.push({ x: bestCorner.x, y: bestCorner.y, _dist: Math.sqrt((fromX - bestCorner.x) ** 2 + (fromY - bestCorner.y) ** 2) });
            }
        }
        // Sort by distance from start
        waypoints.sort((a, b) => a._dist - b._dist);
        return waypoints;
    }

    // Set target with automatic river-crossing and building-avoidance waypoints
    function entityDistTo(entity, ox, oy) {
        return Math.sqrt((entity.x - ox) ** 2 + (entity.y - oy) ** 2);
    }

    function moveEntityToward(entity, tx, ty, dt, speed, speedMul, stuckThreshold, targetType) {
        // Navigate through waypoints first
        let goalX = tx, goalY = ty;
        if (entity.waypoints && entity.waypoints.length > 0) {
            goalX = entity.waypoints[0].x;
            goalY = entity.waypoints[0].y;
        }
        const dx = goalX - entity.x;
        const dy = goalY - entity.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 8 && entity.waypoints && entity.waypoints.length > 0) {
            entity.waypoints.shift();
            entity.stuckTimer = 0;
            entity.steerFrames = 0;
            return false;
        }
        if (dist < 3 && (!entity.waypoints || entity.waypoints.length === 0)) {
            entity.stuckTimer = 0;
            entity.steerFrames = 0;
            return true;
        }
        // Stuck detection: if barely moved, skip waypoint or give up
        const movedDist = Math.sqrt((entity.x - entity.lastMoveX) ** 2 + (entity.y - entity.lastMoveY) ** 2);
        entity.stuckTimer += dt;
        if (entity.stuckTimer > stuckThreshold) {
            entity.stuckTimer = 0;
            if (movedDist < 5) {
                entity.steerFrames = 0;
                if (entity.waypoints && entity.waypoints.length > 0) {
                    entity.waypoints.shift();
                } else {
                    return true; // give up, treat as arrived
                }
            }
            entity.lastMoveX = entity.x;
            entity.lastMoveY = entity.y;
        }
        const spd = speed * dt * speedMul;
        const step = Math.min(spd, dist);
        const dirX = dx / dist, dirY = dy / dist;
        // Use cached steer direction if still active, otherwise recalculate
        if (entity.steerFrames > 0) {
            entity.steerFrames -= dt;
            if (!isBlocked(entity.x + entity.steerDx * step, entity.y + entity.steerDy * step, targetType)) {
                entity.x += entity.steerDx * step;
                entity.y += entity.steerDy * step;
                entity.facing = Math.atan2(entity.steerDy, entity.steerDx);
                return dist < 8 && (!entity.waypoints || entity.waypoints.length === 0);
            }
            entity.steerFrames = 0;
        }
        const steer = steerAroundObstacles(entity.x, entity.y, dirX, dirY, step, targetType);
        if (Math.abs(steer.dx - dirX) > 0.1 || Math.abs(steer.dy - dirY) > 0.1) {
            entity.steerDx = steer.dx;
            entity.steerDy = steer.dy;
            entity.steerFrames = 20;
        }
        entity.x += steer.dx * step;
        entity.y += steer.dy * step;
        entity.facing = Math.atan2(steer.dy, steer.dx);
        return dist < 8 && (!entity.waypoints || entity.waypoints.length === 0);
    }

    function setTargetWithPath(character, tx, ty) {
        // Clamp target out of the river to prevent characters from targeting positions inside it
        tx = clampOutOfRiver(tx);
        character.targetX = tx;
        character.targetY = ty;
        // Determine what type of building the character is going to (so we don't avoid it)
        let targetType = null;
        if (character.currentAction) {
            const act = ACTION_DEFS.find(a => a.id === character.currentAction.id);
            if (act) targetType = act.target;
            if (character.currentAction.target && typeof character.currentAction.target === 'string') {
                targetType = character.currentAction.target;
            }
        }
        // River waypoints
        const riverWP = planWaypoints(character.x, character.y, tx, ty);
        // Building waypoints for non-river segments
        const buildingWP = planBuildingWaypoints(character.x, character.y, tx, ty, targetType);
        // Merge: building waypoints first (sorted by distance), then river waypoints
        const allWP = [];
        if (riverWP) {
            // Insert building waypoints that come before the first river waypoint
            const riverStartDist = Math.sqrt((character.x - riverWP[0].x) ** 2 + (character.y - riverWP[0].y) ** 2);
            for (const bw of buildingWP) {
                if (bw._dist < riverStartDist) allWP.push(bw);
            }
            allWP.push(...riverWP);
            // Insert building waypoints after river crossing
            for (const bw of planBuildingWaypoints(riverWP[riverWP.length - 1].x, riverWP[riverWP.length - 1].y, tx, ty, targetType)) {
                allWP.push(bw);
            }
        } else {
            allWP.push(...buildingWP);
        }
        character.waypoints = allWP;
        // Reset stuck tracking so new movement starts fresh
        character.stuckTimer = 0;
        character.lastMoveX = character.x;
        character.lastMoveY = character.y;
    }

    // Ensure positions don't land inside the river
    function clampOutOfRiver(x) {
        if (x > RIVER_LEFT && x < BRIDGE.x) return RIVER_LEFT - 10;
        if (x >= BRIDGE.x && x < RIVER_RIGHT) return RIVER_RIGHT + 10;
        return x;
    }

    // ============================================================
    //  SEASONAL FESTIVALS (祭り)
    // ============================================================
    const FESTIVALS = [
        { id: 'hanami',   name: '花見',   kana: 'はなみ',     romaji: 'Hanami',   de: 'Kirschbluetenfest',  dayInCycle: 5,  season: 'spring' },
        { id: 'tanabata', name: '七夕',   kana: 'たなばた',   romaji: 'Tanabata', de: 'Sternenfest',        dayInCycle: 15, season: 'summer' },
        { id: 'tsukimi',  name: '月見',   kana: 'つきみ',     romaji: 'Tsukimi',  de: 'Mondschaufest',      dayInCycle: 25, season: 'autumn' },
    ];

    let activeFestival = null;
    let festivalParticles = [];

    function checkFestival() {
        const dayInCycle = ((gameDay - 1) % 40) + 1;
        const prev = activeFestival;
        activeFestival = FESTIVALS.find(f => f.dayInCycle === dayInCycle) || null;
        if (activeFestival && activeFestival !== prev) {
            addLog(`🎌 ${activeFestival.name} (${activeFestival.de}) beginnt!`, 'speak');
            festivalParticles = [];
        }
        if (!activeFestival) festivalParticles = [];
    }

    function updateFestivalParticles(dt) {
        if (!activeFestival) return;
        const maxP = 20;
        // Spawn festival-specific particles
        if (festivalParticles.length < maxP && Math.random() < 0.03 * dt) {
            if (activeFestival.id === 'hanami') {
                // Falling cherry blossom petals
                festivalParticles.push({
                    type: 'sakura', x: randFloat(50, WORLD_W - 50), y: -10,
                    vx: randFloat(-0.3, 0.3), vy: randFloat(0.2, 0.5),
                    size: randFloat(2, 5), rot: randFloat(0, Math.PI * 2), rotSpeed: randFloat(-0.02, 0.02),
                    life: randFloat(400, 700)
                });
            } else if (activeFestival.id === 'tanabata') {
                // Tanzaku paper strips swaying
                festivalParticles.push({
                    type: 'tanzaku', x: randFloat(50, WORLD_W - 50), y: randFloat(20, 60),
                    phase: randFloat(0, Math.PI * 2), size: randFloat(3, 6),
                    color: randEl(['#e84040','#4080e8','#40c040','#e8c040','#c040c0']),
                    life: randFloat(300, 600), maxLife: 0
                });
                festivalParticles[festivalParticles.length - 1].maxLife = festivalParticles[festivalParticles.length - 1].life;
            } else if (activeFestival.id === 'tsukimi') {
                // Glowing moon orbs
                festivalParticles.push({
                    type: 'moonorb', x: randFloat(50, WORLD_W - 50), y: randFloat(20, 80),
                    phase: randFloat(0, Math.PI * 2), size: randFloat(2, 4),
                    life: randFloat(200, 400), maxLife: 0
                });
                festivalParticles[festivalParticles.length - 1].maxLife = festivalParticles[festivalParticles.length - 1].life;
            }
        }
        // Update particles
        for (const p of festivalParticles) {
            p.life -= dt;
            p.x += (p.vx || 0) * dt;
            p.y += (p.vy || 0) * dt;
            if (p.type === 'sakura') { p.vx += Math.sin(gameTick * 0.01 + p.x * 0.05) * 0.003 * dt; p.rot += p.rotSpeed * dt; }
            if (p.type === 'tanzaku') p.vx = Math.sin(gameTick * 0.008 + p.phase) * 0.05;
        }
        festivalParticles = festivalParticles.filter(p => p.life > 0 && p.y > -30 && p.y < WORLD_H + 30);
    }

    function drawFestivalEffects(ctx) {
        if (!activeFestival || festivalParticles.length === 0) return;
        const s = canvasScale;
        ctx.save();
        for (const p of festivalParticles) {
            if (p.type === 'sakura') {
                // Cherry blossom petal
                const a = Math.min(1, p.life / 60);
                ctx.save();
                ctx.translate(p.x*s, p.y*s);
                ctx.rotate(p.rot);
                ctx.globalAlpha = a * 0.8;
                ctx.fillStyle = `rgba(255,180,200,0.9)`;
                ctx.beginPath();
                ctx.ellipse(0, 0, p.size*0.6*s, p.size*0.3*s, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = `rgba(255,220,230,0.6)`;
                ctx.beginPath();
                ctx.ellipse(p.size*0.2*s, 0, p.size*0.3*s, p.size*0.2*s, 0.3, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
                ctx.globalAlpha = 1;
            } else if (p.type === 'tanzaku') {
                // Tanabata paper strip
                const fadeIn = Math.min(1, (p.maxLife - p.life) / 40);
                const fadeOut = Math.min(1, p.life / 40);
                const a = fadeIn * fadeOut;
                ctx.globalAlpha = a * 0.7;
                ctx.fillStyle = p.color;
                const sway = Math.sin(gameTick * 0.01 + p.phase) * 3;
                ctx.fillRect((p.x + sway)*s, p.y*s, p.size*0.3*s, p.size*2*s);
                ctx.globalAlpha = 1;
            } else if (p.type === 'moonorb') {
                const fadeIn = Math.min(1, (p.maxLife - p.life) / 40);
                const fadeOut = Math.min(1, p.life / 40);
                const a = fadeIn * fadeOut * (0.3 + Math.sin(p.phase + gameTick * 0.02) * 0.15);
                ctx.fillStyle = `rgba(255,230,180,${a})`;
                ctx.beginPath();
                ctx.arc((p.x + Math.sin(gameTick*0.008 + p.phase)*15)*s, p.y*s, p.size*s, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // Festival banner at top
        if (activeFestival) {
            const bannerAlpha = 0.6 + Math.sin(gameTick * 0.03) * 0.1;
            const cw = canvas.width / dpr;
            ctx.globalAlpha = bannerAlpha;
            ctx.font = `bold ${Math.round(10*s)}px 'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif`;
            ctx.fillStyle = '#d4a030';
            ctx.textAlign = 'right';
            ctx.fillText(`${activeFestival.name} ${activeFestival.romaji}`, cw - 10*s, 14*s);
            ctx.globalAlpha = 1;
        }
        ctx.restore();
    }

    class YojijukugoCloud {
        constructor(yoji) {
            this.chars = yoji.chars;
            this.kana = yoji.kana;
            this.de = yoji.de;
            this.life = 300;
            this.maxLife = 300;
        }
        update(dt) {
            this.life -= dt;
            return this.life > 0;
        }
        draw(ctx) {
            const cw = canvas.width / dpr;
            const s = canvasScale;
            const fadeIn = Math.min(1, (this.maxLife - this.life) / 40);
            const fadeOut = Math.min(1, this.life / 40);
            const alpha = fadeIn * fadeOut;
            const cy = 50 * s + Math.sin(gameTick * 0.015) * 4 * s;
            ctx.save();
            ctx.globalAlpha = alpha;
            // Cloud background
            ctx.fillStyle = 'rgba(30,25,15,0.6)';
            const tw = this.chars.length * 18 * s + 40 * s;
            const cx = cw / 2;
            ctx.beginPath();
            ctx.ellipse(cx, cy, tw / 2, 22 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            // Gold border
            ctx.strokeStyle = `rgba(180,130,40,${alpha * 0.5})`;
            ctx.lineWidth = 1 * s;
            ctx.stroke();
            // Characters
            ctx.font = `bold ${Math.round(16*s)}px 'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif`;
            ctx.fillStyle = '#e8d080';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.chars, cx, cy - 3 * s);
            // Kana + German
            ctx.font = `${Math.round(8*s)}px 'Courier New','Noto Sans JP',monospace`;

    // ============================================================
    //  PERSON CLASS
    // ============================================================
    class Person {
        constructor(name, role, color) {
            this.name = name;
            this.role = role; // 'speaker' or 'learner'
            this.color = color;

            // Random attributes 1-10
            this.geschick = randInt(1, 10);      // Dexterity: movement speed + action speed
            this.neugier = randInt(1, 10);       // Curiosity: wander tendency + action variety
            this.geselligkeit = randInt(1, 10);  // Sociability: social actions + staying close
            this.wahrnehmung = randInt(1, 10);   // Perception: hearing range + learn chance

            // Appearance — Edo period Japanese / German traveler
            const skinTones = ['#e8c8a0','#d4b088','#e0c098','#dab890','#e8d0a8','#d0a880'];
            const hairColors = ['#1a1008','#0a0a08','#1a1a10','#2a1a10'];
            const clothColors_s = ['#4a6a8a','#6a3030','#3a5a3a','#8a6a30']; // Japanese robes
            const clothColors_l = ['#6a5a40','#5a4a30','#7a6a50']; // German traveler clothing
            this.skinTone = randEl(skinTones);
            this.hairColor = randEl(hairColors);
            this.clothColor = randEl(role === 'speaker' ? clothColors_s : clothColors_l);

            // Position
            this.x = role === 'speaker' ? 400 : 440;
            this.y = role === 'speaker' ? 300 : 320;
            this.targetX = this.x;
            this.targetY = this.y;
            this.facing = 0; // angle

            // Needs (0-100, 100 = full)
            this.hunger = 70 + randInt(0, 30);
            this.thirst = 70 + randInt(0, 30);
            this.energy = 60 + randInt(0, 40);

            // State
            this.state = 'idle'; // idle, moving, acting, speaking
            this.currentAction = null;
            this.actionTimer = 0;
            this.idleTimer = randInt(30, 120);
            this.activityDe = 'Untätig';

            // Spaced repetition: track action history for variety
            this.actionHistory = []; // recent action IDs (newest first)
            this.actionHistoryMax = 12; // remember last N actions

            // Learner follow behavior
            this.followMode = 'following'; // 'following', 'wandering', 'returning'
            this.wanderTimer = 0;
            this.followTimer = randInt(300, 800);  // time before considering a wander
            this.returnUrgency = 0;

            // Learning (only for learner)
            this.knownWords = new Set();
            this.wordHistory = []; // for UI display order

            // Relationships (name → score 0-100)
            this.relationships = {};

            // Mood (computed periodically)
            this.mood = null;

            // Waypoint navigation
            this.waypoints = [];
            this.stuckTimer = 0;
            this.lastMoveX = this.x;
            this.lastMoveY = this.y;
            // Steer memory: keep a chosen avoidance direction for several frames to prevent jitter
            this.steerDx = 0;
            this.steerDy = 0;
            this.steerFrames = 0;
        }

        get moveSpeed() {
            return 0.6 + this.geschick * 0.18;
        }

        get needDecayRate() {
            // Higher geschick = slightly slower decay (skilled people are more efficient)
            return 0.005 / (0.5 + this.geschick * 0.06);
        }

        get learnChance() {
            // Perception is the primary driver of learning ability (reduced by 1/3)
            return (this.wahrnehmung * 0.08 + 0.05) * 0.667;
        }

        get hearingRange() {
            // Perception affects how far the learner can hear the speaker
            return 120 + this.wahrnehmung * 12;
        }

        get wanderChance() {
            // Curiosity drives how often the learner wanders off
            return 0.04 + this.neugier * 0.016;
        }

        get socialWeight() {
            // Sociability affects social action preference (0.5 - 2.0 range)
            return 0.5 + this.geselligkeit * 0.15;
        }

        update(dt) {
            // Decay needs
            this.hunger -= this.needDecayRate * dt;
            this.thirst -= this.needDecayRate * dt * 1.2;
            if (this.state === 'acting' && this.currentAction && this.currentAction.id !== 'sleep_house') {
                this.energy -= this.needDecayRate * dt * 0.8;
            } else if (this.state === 'idle') {
                this.energy += 0.003 * dt;
            }
            this.hunger = Math.max(0, Math.min(100, this.hunger));
            this.thirst = Math.max(0, Math.min(100, this.thirst));
            this.energy = Math.max(0, Math.min(100, this.energy));
        }

        distTo(ox, oy) {
            return entityDistTo(this, ox, oy);
        }

        moveToward(tx, ty, dt) {
            let tType = null;
            if (this.currentAction) {
                if (this.currentAction.target && typeof this.currentAction.target === 'string') tType = this.currentAction.target;
                else { const a = ACTION_DEFS.find(a => a.id === this.currentAction.id); if (a) tType = a.target; }
            }
            return moveEntityToward(this, tx, ty, dt, this.moveSpeed, 0.4, 80, tType);
        }
    }

    function getGrammarTier() {
        if (persons.length < 2) return 0;
        const known = persons[1].knownWords.size;
        const day = gameDay;
        if (known < 15 || day <= 2) return 0;
        if (known < 40 || day <= 5) return 1;
        if (known < 80 || day <= 10) return 2;
        if (known < 130 || day <= 20) return 3;
        return 4;

    // Resultative complements — verb → possible complements
    const RESULTATIVES = {
        eat:   [{ kanji: '完', kana: 'wán', de: 'aufgegessen' }, { kanji: '饱', kana: 'bǎo', de: 'satt gegessen' }],
        drink: [{ kanji: '完', kana: 'wán', de: 'ausgetrunken' }],
        cook:  [{ kanji: '好', kana: 'hǎo', de: 'fertig gekocht' }],
        make:  [{ kanji: '好', kana: 'hǎo', de: 'fertig gemacht' }, { kanji: '完', kana: 'wán', de: 'fertig' }],
        write: [{ kanji: '好', kana: 'hǎo', de: 'fertig geschrieben' }, { kanji: '完', kana: 'wán', de: 'fertig' }],
        learn: [{ kanji: '会', kana: 'huì', de: 'gelernt/kann' }],
        look:  [{ kanji: '到', kana: 'dào', de: 'erblickt' }, { kanji: '见', kana: 'jiàn', de: 'gesehen' }],
        listen:[{ kanji: '到', kana: 'dào', de: 'gehoert' }, { kanji: '见', kana: 'jiàn', de: 'gehoert' }],
        find:  [{ kanji: '到', kana: 'dào', de: 'gefunden' }],
        wash:  [{ kanji: '干净', kana: 'gānjìng', de: 'sauber gewaschen' }],
        repair:[{ kanji: '好', kana: 'hǎo', de: 'repariert' }],
        open:  [{ kanji: '开', kana: 'kāi', de: 'geoeffnet' }],
        paint: [{ kanji: '好', kana: 'hǎo', de: 'fertig gemalt' }],
    };

    // Time-word IDs (should be placed sentence-initially in Chinese)
    const TIME_WORD_IDS = new Set([
        'now','today','tomorrow','yesterday','morning','night'
    ]);

    // Location mapping — action target → vocab concept for 在+place
    const TARGET_LOCATION_MAP = {
        kitchen: 'kitchen', teahouse: 'teahouse', workshop: 'workshop',
        house: 'home', market: 'market', well: 'well2',
        bridge: 'bridge', garden: 'garden', fish_pond: 'fish_pond',
        shrine: 'shrine', stable: 'stable', river: 'river',
    };

    function applyGrammar(words, tier, action) {
        if (tier <= 0 || words.length === 0) return words;
        let result = words.map(w => ({ ...w }));
        let majorApplied = false;

        // --- Helper: re-scan types after mutations ---
        function scan() {
            return {
                types: result.map(w => w.type),
                ids: result.map(w => w.conceptId),
                hasVerb: result.some(w => w.type === 'verb'),
                hasMod: result.some(w => w.type === 'mod'),
                hasNoun: result.some(w => w.type === 'noun'),
                hasSubj: result[0] && result[0].type === 'pronoun',
                vIdx: result.findIndex(w => w.type === 'verb'),
                firstNounIdx: result.findIndex(w => w.type === 'noun'),
            };
        }

        // =============================================
        //  STRUCTURAL REORDERING (before particle insertion)
        // =============================================

        // Tier 1+: Move time words to sentence-initial position (Japanese rule)
        if (tier >= 1) {
            for (let i = 1; i < result.length; i++) {
                if (TIME_WORD_IDS.has(result[i].conceptId)) {
                    const tw = result.splice(i, 1)[0];
                    result.splice(0, 0, tw);
                    break; // only move one
                }
            }
        }

        // =============================================
        //  TIER 1: Basic grammar
        // =============================================
        let s = scan();

        // 很 before adjective predicates (no verb: 茶很好)
        if (tier >= 1 && !s.hasVerb && s.hasMod && result.length >= 2) {
            const adjIdx = result.findIndex((w, i) => i > 0 && w.type === 'mod');
            if (adjIdx > 0 && Math.random() < 0.55) {
                result.splice(adjIdx, 0, makeGrammarWord('very'));
            }
        }
        // 也 before verb (我也喝茶)
        if (tier >= 1 && s.hasVerb && s.vIdx > 0 && Math.random() < 0.13) {
            result.splice(s.vIdx, 0, makeGrammarWord('also'));
        }

        // =============================================
        //  TIER 2: Core particles
        // =============================================
        s = scan();

        // 了 after verb (completed: 我吃了饭)
        if (tier >= 2 && s.hasVerb && !majorApplied && Math.random() < 0.25) {
            result.splice(s.vIdx + 1, 0, makeGrammarWord('le_perf'));
            majorApplied = true;
        }
        // 的 possessive (pronoun + noun: 我的书)
        if (tier >= 2 && s.hasSubj && s.types.length >= 2 && s.types[1] === 'noun' && Math.random() < 0.22) {
            result.splice(1, 0, makeGrammarWord('de_poss'));
        }
        // 不 negation for present/future (不好, 不吃)
        if (tier >= 2 && !majorApplied && Math.random() < 0.10) {
            s = scan();
            const tgt = result.findIndex((w, i) => i > 0 && (w.type === 'verb' || w.type === 'mod'));
            if (tgt > 0) {
                result.splice(tgt, 0, makeGrammarWord('no'));
            }
        }
        // 没 negation for past (没吃, 没看到) — distinct from 不
        if (tier >= 2 && s.hasVerb && !majorApplied && Math.random() < 0.08) {
            s = scan();
            if (s.vIdx > 0) {
                result.splice(s.vIdx, 0, makeGrammarWord('mei_neg'));
                majorApplied = true;
            }
        }

        // =============================================
        //  TIER 2+: Measure words (量词) — one 杯 tea, one 碗 rice
        // =============================================
        if (tier >= 2 && s.hasNoun) {
            // Find a noun that has a measure word, insert 一+MW before it
            const nIdx = result.findIndex(w => w.type === 'noun' && MEASURE_WORDS[w.conceptId]);
            if (nIdx >= 0 && Math.random() < 0.25) {
                const mw = MEASURE_WORDS[result[nIdx].conceptId];
                const mwWord = { conceptId: '_mw', kanji: '一' + mw.kanji, kana: 'yī ' + mw.kana, de: '', type: 'particle', role: 'particle' };
                result.splice(nIdx, 0, mwWord);
            }
        }

        // =============================================
        //  TIER 3: Complex structures
        // =============================================
        s = scan();

        // 吗 yes/no question
        if (tier >= 3 && !majorApplied && Math.random() < 0.12) {
            result.push(makeGrammarWord('ma_q'));
            majorApplied = true;
        }
        // 在...呢 progressive (我在喝茶呢)
        if (tier >= 3 && s.hasVerb && !majorApplied && Math.random() < 0.15) {
            s = scan();
            result.splice(s.vIdx, 0, makeGrammarWord('zai_prog'));
            result.push(makeGrammarWord('ne_q'));
            majorApplied = true;
        }
        // V + 得 + Adj complement (做得好)
        if (tier >= 3 && s.hasVerb && s.hasMod && !majorApplied && Math.random() < 0.13) {
            s = scan();
            const modIdx = result.findIndex((w, i) => i > s.vIdx && w.type === 'mod');
            if (modIdx > s.vIdx) {
                result.splice(modIdx, 0, makeGrammarWord('de_comp'));
                majorApplied = true;
            }
        }
        // Resultative complement (吃完, 做好, 看到)
        if (tier >= 3 && s.hasVerb && !majorApplied && Math.random() < 0.18) {
            s = scan();
            const verbId = result[s.vIdx] ? result[s.vIdx].conceptId : null;
            const rc = RESULTATIVES[verbId];
            if (rc) {
                const comp = randEl(rc);
                const rcWord = { conceptId: '_rc', kanji: comp.kanji, kana: comp.kana, de: comp.de, type: 'particle', role: 'particle' };
                result.splice(s.vIdx + 1, 0, rcWord);
                majorApplied = true;
            }
        }
        // 都 before verb for emphasis/totality (我们都喝茶)
        if (tier >= 3 && s.hasVerb && s.vIdx > 0 && Math.random() < 0.10) {
            s = scan();
            // Only if subject is plural-ish (我们, 他们) or there's a 'many' concept
            const subj = result[0] ? result[0].conceptId : '';
            if (subj === 'we' || subj === 'they' || result.some(w => w.conceptId === 'many' || w.conceptId === 'every')) {
                result.splice(s.vIdx, 0, makeGrammarWord('dou_all'));
            }
        }

        // =============================================
        //  TIER 3+: Location with 在 (在厨房做饭)
        // =============================================
        if (tier >= 3 && action && action.target && !majorApplied && Math.random() < 0.20) {
            const locId = TARGET_LOCATION_MAP[action.target];
            if (locId && vocab[locId]) {
                s = scan();
                if (s.hasVerb && s.vIdx >= 0) {
                    const locWord = { conceptId: locId, kanji: vocab[locId].kanji, kana: vocab[locId].kana, de: vocab[locId].de, type: 'noun', role: 'noun' };
                    const zaiWord = makeGrammarWord('zai_prog'); // 在 doubles as locative
                    // Insert 在+place before verb
                    result.splice(s.vIdx, 0, zaiWord, locWord);
                }
            }
        }

        // =============================================
        //  TIER 4: Advanced structures
        // =============================================
        s = scan();

        // 过 experience (我吃过这个)
        if (tier >= 4 && s.hasVerb && !majorApplied && Math.random() < 0.10) {
            result.splice(s.vIdx + 1, 0, makeGrammarWord('guo_exp'));
            majorApplied = true;
        }
        // 把 disposal construction (我把饭吃了) — S 把 O V 了
        if (tier >= 4 && s.hasVerb && s.hasNoun && !majorApplied && Math.random() < 0.10) {
            s = scan();
            // Need noun after verb (object) to move before verb
            const objIdx = result.findIndex((w, i) => i > s.vIdx && w.type === 'noun');
            if (objIdx > s.vIdx) {
                const obj = result.splice(objIdx, 1)[0];
                s = scan(); // rescan after splice
                result.splice(s.vIdx, 0, makeGrammarWord('ba_disp'), obj);
                // Add 了 at end
                result.push(makeGrammarWord('le_perf'));
                majorApplied = true;
            }
        }
        // 就 (then/immediately: 我就去)
        if (tier >= 4 && s.hasVerb && s.vIdx > 0 && !majorApplied && Math.random() < 0.10) {
            s = scan();
            result.splice(s.vIdx, 0, makeGrammarWord('jiu_then'));
        }
        // 因为...所以 causal
        if (tier >= 4 && result.length >= 4 && !majorApplied && Math.random() < 0.08) {
            result.splice(0, 0, makeGrammarWord('because'));
            const midPoint = Math.min(3, result.length);
            result.splice(midPoint, 0, makeGrammarWord('therefore'));
            majorApplied = true;
        }
        // 如果...就 conditional
        if (tier >= 4 && result.length >= 4 && !majorApplied && Math.random() < 0.08) {
            result.splice(0, 0, makeGrammarWord('if'));
            s = scan();
            if (s.vIdx > 0) {
                result.splice(s.vIdx, 0, makeGrammarWord('jiu_then'));
            }
            majorApplied = true;
        }

        // =============================================
        //  SENTENCE-FINAL MOOD PARTICLES (all tiers 2+)
        // =============================================
        if (tier >= 2 && !majorApplied) {
            const lastType = result.length > 0 ? result[result.length - 1].type : '';
            // Don't stack mood particles after question particles
            if (lastType !== 'particle') {
                const r = Math.random();
                if (r < 0.08) {
                    result.push(makeGrammarWord('a_mood'));   // 啊 exclamation
                } else if (r < 0.14) {
                    result.push(makeGrammarWord('ba_sug'));   // 吧 suggestion
                } else if (r < 0.18) {
                    result.push(makeGrammarWord('la_mood'));  // 啦 joyful
                }
            }
        }

        return result;
    }

    // Shared helper: draw color-coded kanji characters
    function _drawColorCodedKanji(ctx, words, cx, cy, fontSize, lightBg) {
        if (!words || words.length === 0) return;
        const colors = lightBg ? ROLE_COLORS_LIGHT : ROLE_COLORS;
        ctx.font = `bold ${fontSize}px ${CJK_FONT_GRAMMAR}`;
        ctx.textBaseline = 'middle';
        // Measure total width
        let totalW = 0;
        const segs = words.map(w => {
            const hw = w.kanji || '';
            const width = ctx.measureText(hw).width;
            totalW += width;
            return { kanji: hw, width, color: colors[w.type] || colors.unknown };
        });
        // Draw left-to-right
        ctx.textAlign = 'left';
        let drawX = cx - totalW / 2;
        for (const seg of segs) {
            ctx.fillStyle = seg.color;
            ctx.fillText(seg.kanji, drawX, cy);
            drawX += seg.width;
        }
        ctx.textAlign = 'center'; // restore
    }

    // ============================================================
    //  SPEECH BUBBLE
    // ============================================================
    class SpeechBubble {
        constructor(person, text, conceptWords, isResponse) {
            this.person = person;
            this.text = text;
            this.kanjiText = text; // may be overridden
            this.kanaText = '';  // may be set
            this.conceptWords = conceptWords || [];
            this.isResponse = isResponse || false;
            this.life = 240;
            this.maxLife = 240;
            this.alpha = 0;
        }
        update(dt) {
            this.life -= dt * 0.5;
            if (this.life > this.maxLife - 30) {
                this.alpha = Math.min(1, this.alpha + 0.08 * dt);
            } else if (this.life < 40) {
                this.alpha = Math.max(0, this.life / 40);
            } else {
                this.alpha = 1;
            }
            return this.life > 0;
        }
        draw(ctx) {
            if (this.alpha <= 0) return;
            const x = this.person.x * canvasScale;
            const yOff = this.isResponse ? -60 : -48;
            const y = (this.person.y + yOff) * canvasScale;
            const CJK_FONT = "'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif";
            ctx.save();
            ctx.globalAlpha = this.alpha;

            // Measure widths for both lines
            const hasPinyin = this.kanaText && !this.isResponse;
            const kanjiFontSize = Math.round(13 * canvasScale);
            const kanaFontSize = Math.round(9 * canvasScale);
            const responseFontSize = Math.round(11 * canvasScale);

            let textW;
            if (this.isResponse) {
                // Measure with the actual font used for response rendering
                ctx.font = `bold ${responseFontSize}px 'Courier New',${CJK_FONT}`;
                textW = ctx.measureText(this.text).width;
            } else {
                ctx.font = `bold ${kanjiFontSize}px ${CJK_FONT}`;
                const kanjiW = ctx.measureText(this.kanjiText).width;
                let kanaW = 0;
                if (hasPinyin) {
                    ctx.font = `${kanaFontSize}px 'Courier New',${CJK_FONT}`;
                    kanaW = ctx.measureText(this.kanaText).width;
                }
                textW = Math.max(kanjiW, kanaW);
            }

            const pad = 8 * canvasScale;
            const bw = textW + pad * 2;
            const bh = (hasPinyin ? 34 : 22) * canvasScale;
            const bx = x - bw / 2;
            const by = y - bh;

            // Bubble bg
            ctx.fillStyle = this.isResponse ? '#2a2a1a' : '#f5f0e0';
            ctx.strokeStyle = this.isResponse ? '#6a8a5a' : '#c83030';
            ctx.lineWidth = canvasScale;
            roundRect(ctx, bx, by, bw, bh, 4 * canvasScale);
            ctx.fill();
            ctx.stroke();

            // Pointer
            ctx.beginPath();
            ctx.moveTo(x - 4 * canvasScale, by + bh);
            ctx.lineTo(x, by + bh + 6 * canvasScale);
            ctx.lineTo(x + 4 * canvasScale, by + bh);
            ctx.fillStyle = this.isResponse ? '#2a2a1a' : '#f5f0e0';
            ctx.fill();

            ctx.textAlign = 'center';
            if (hasPinyin) {
                // Color-coded kanji line (top, larger)
                if (this.conceptWords && this.conceptWords.length > 0) {
                    _drawColorCodedKanji(ctx, this.conceptWords, x, by + bh * 0.35, kanjiFontSize, true);
                } else {
                    ctx.font = `bold ${kanjiFontSize}px ${CJK_FONT}`;
                    ctx.fillStyle = '#2a2010';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.kanjiText, x, by + bh * 0.35);
                }
                // Pinyin line (bottom, smaller, grey)
                ctx.font = `${kanaFontSize}px 'Courier New',${CJK_FONT}`;
                ctx.fillStyle = '#8a7e6a';
                ctx.fillText(this.kanaText, x, by + bh * 0.72);
            } else {
                // Single line (response bubble or fallback)
                ctx.font = `bold ${Math.round(11 * canvasScale)}px 'Courier New',${CJK_FONT}`;
                ctx.fillStyle = this.isResponse ? '#a0c890' : '#2a2010';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, x, by + bh / 2);
            }
            ctx.restore();
        }
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ============================================================
    //  LEARN FLASH (visual feedback)
    // ============================================================
    class LearnFlash {
        constructor(x, y, word) {
            this.x = x;
            this.y = y;
            this.word = word;
            this.life = 90;
            this.vy = -0.5;
        }
        update(dt) {
            this.y += this.vy * dt;
            this.life -= dt;
            return this.life > 0;
        }
        draw(ctx) {
            const alpha = Math.min(1, this.life / 40);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = `bold ${Math.round(10 * canvasScale)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
            ctx.fillStyle = '#4ade4a';
            ctx.textAlign = 'center';
            ctx.fillText('+ ' + this.word, this.x * canvasScale, this.y * canvasScale);
            ctx.restore();
        }
    }

    // ============================================================
    //  CALLIGRAPHY OVERLAY (书法 shūfǎ — brush stroke animation)
    // ============================================================
    const CJK_FONT = "'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic','Noto Sans CJK JP',sans-serif";
    const INK_COLOR = '#1a0a00';
    const PARCHMENT_BG = '#f5e6c8';
    const PARCHMENT_BORDER = '#c4a46a';

    class CalligraphyOverlay {
        constructor(kanji, kana, german) {
            this.kanji = kanji;
            this.kana = kana;
            this.german = german;
            this.life = 300; // ~5 seconds at 60fps
            this.maxLife = 300;
            this.revealProgress = 0;
            this.inkDrops = [];
            // Position in world coords (flush right with small margin to panel)
            this.ww = 160;
            this.wh = 200;
            this.wx = WORLD_W - this.ww - 5;
            this.wy = 15;
            // Pre-render character to offscreen canvas
            this.offCanvas = document.createElement('canvas');
            this.offCanvas.width = 192;
            this.offCanvas.height = 192;
            this.offCtx = this.offCanvas.getContext('2d');
            this._renderCharacter();
            // Generate ink drops for decoration
            for (let i = 0; i < 6; i++) {
                this.inkDrops.push({
                    x: Math.random() * 0.8 + 0.1,
                    y: Math.random() * 0.8 + 0.1,
                    r: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.15 + 0.05,
                    delay: Math.random() * 0.6,
                });
            }
        }

        _renderCharacter() {
            const c = this.offCtx;
            const s = 192;
            c.clearRect(0, 0, s, s);
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            // Auto-scale font size based on character count
            const len = this.kanji.length;
            let fontSize = len <= 1 ? 130 : len === 2 ? 85 : len === 3 ? 65 : Math.max(38, Math.floor(160 / len));
            // Measure and shrink further if needed
            c.font = `bold ${fontSize}px ${CJK_FONT}`;
            const measured = c.measureText(this.kanji).width;
            if (measured > s * 0.9) {
                fontSize = Math.floor(fontSize * (s * 0.9) / measured);
                c.font = `bold ${fontSize}px ${CJK_FONT}`;
            }
            // Ink bleed: draw twice with offset
            c.fillStyle = INK_COLOR;
            c.globalAlpha = 0.25;
            c.fillText(this.kanji, s / 2 + 1, s / 2 + 1);
            c.globalAlpha = 1.0;
            c.fillText(this.kanji, s / 2, s / 2);
        }

        update(dt) {
            this.life -= dt;
            // Reveal: ramps 0→1 over first 60% of life
            const revealEnd = this.maxLife * 0.6;
            const elapsed = this.maxLife - this.life;
            this.revealProgress = Math.min(1, elapsed / revealEnd);
            return this.life > 0;
        }

        draw(ctx) {
            if (this.life <= 0) return;
            const s = canvasScale;
            // Fade in/out
            let alpha = 1;
            const elapsed = this.maxLife - this.life;
            if (elapsed < this.maxLife * 0.12) alpha = elapsed / (this.maxLife * 0.12);
            if (this.life < this.maxLife * 0.18) alpha = this.life / (this.maxLife * 0.18);

            ctx.save();
            ctx.globalAlpha = alpha * 0.95;

            // Use actual canvas width so overlay sits flush-right even on wide screens
            const cw = canvas.width / dpr;
            const w = this.ww * s;
            const h = this.wh * s;
            const x = cw - w - 10 * s;
            const y = this.wy * s;

            // Parchment/rice paper background
            ctx.fillStyle = PARCHMENT_BG;
            ctx.strokeStyle = PARCHMENT_BORDER;
            ctx.lineWidth = 1.5 * s;
            roundRect(ctx, x, y, w, h, 4 * s);
            ctx.fill();
            ctx.stroke();

            // Subtle paper texture
            ctx.globalAlpha = alpha * 0.06;
            for (let i = 0; i < 8; i++) {
                const tx = x + w * (0.1 + Math.sin(i * 2.7) * 0.4 + 0.4);
                const ty = y + h * (0.1 + Math.cos(i * 1.9) * 0.35 + 0.35);
                ctx.beginPath();
                ctx.arc(tx, ty, (3 + i * 1.5) * s, 0, Math.PI * 2);
                ctx.fillStyle = '#c8a060';
                ctx.fill();
            }
            ctx.globalAlpha = alpha * 0.95;

            // Red seal stamp decoration (top-left corner)
            const sealX = x + 8 * s;
            const sealY = y + 6 * s;
            const sealSz = 14 * s;
            ctx.fillStyle = 'rgba(180,30,20,0.15)';
            ctx.fillRect(sealX, sealY, sealSz, sealSz);
            ctx.strokeStyle = 'rgba(180,30,20,0.3)';
            ctx.lineWidth = 0.8 * s;
            ctx.strokeRect(sealX, sealY, sealSz, sealSz);

            // Character area (centered in upper portion of parchment)
            const charAreaX = x + (w - 100 * s) / 2;
            const charAreaY = y + 20 * s;
            const charAreaW = 100 * s;
            const charAreaH = 100 * s;

            // Progressive brush reveal with clipping
            ctx.save();
            ctx.beginPath();
            const rp = this.revealProgress;

            if (rp < 0.25) {
                // Phase 1: Top-left vertical stroke downward
                const ph = rp / 0.25;
                const clipW = charAreaW * 0.4;
                const clipH = charAreaH * ph;
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else if (rp < 0.55) {
                // Phase 2: Expand rightward
                const ph = (rp - 0.25) / 0.3;
                const clipW = charAreaW * (0.4 + 0.6 * ph);
                const clipH = charAreaH * (0.6 + 0.2 * ph);
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else if (rp < 0.8) {
                // Phase 3: Fill bottom
                const ph = (rp - 0.55) / 0.25;
                const clipW = charAreaW;
                const clipH = charAreaH * (0.8 + 0.2 * ph);
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else {
                // Phase 4: Full character
                ctx.rect(charAreaX - 2 * s, charAreaY - 2 * s, charAreaW + 4 * s, charAreaH + 4 * s);
            }
            ctx.clip();

            // Draw the pre-rendered character
            ctx.drawImage(this.offCanvas, charAreaX, charAreaY, charAreaW, charAreaH);

            // Ink drops that appear during reveal
            for (const drop of this.inkDrops) {
                if (rp > drop.delay) {
                    ctx.globalAlpha = alpha * drop.alpha * Math.min(1, (rp - drop.delay) * 3);
                    ctx.beginPath();
                    ctx.arc(
                        charAreaX + drop.x * charAreaW,
                        charAreaY + drop.y * charAreaH,
                        drop.r * s, 0, Math.PI * 2
                    );
                    ctx.fillStyle = INK_COLOR;
                    ctx.fill();
                }
            }
            ctx.restore();

            // Pinyin below character
            ctx.globalAlpha = alpha * 0.9;
            ctx.font = `${Math.round(11 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#4a3520';
            ctx.textAlign = 'center';
            ctx.fillText(this.kana, x + w / 2, y + 132 * s);

            // German translation
            ctx.font = `${Math.round(9 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#7a6a55';
            ctx.fillText(this.german, x + w / 2, y + 150 * s);

            // Decorative line
            ctx.beginPath();
            ctx.moveTo(x + 15 * s, y + 170 * s);
            ctx.lineTo(x + w - 15 * s, y + 170 * s);
            ctx.strokeStyle = 'rgba(180,140,80,0.3)';
            ctx.lineWidth = 0.5 * s;
            ctx.stroke();

            ctx.restore();
        }

        _brushClip(ctx, bx, by, bw, bh, s) {
            // Create ragged brush-edge clipping path using overlapping circles
            ctx.rect(bx, by, bw - 4 * s, bh - 4 * s);
            // Ragged right edge
            const steps = 8;
            for (let i = 0; i <= steps; i++) {
                const cy = by + (bh - 4 * s) * (i / steps);
                const cx = bx + bw - 4 * s + (Math.sin(i * 2.3 + bw * 0.1) * 3) * s;
                ctx.moveTo(cx + 4 * s, cy);
                ctx.arc(cx, cy, 4 * s, 0, Math.PI * 2);
            }
            // Ragged bottom edge
            for (let i = 0; i <= steps; i++) {
                const cx = bx + (bw - 4 * s) * (i / steps);
                const cy = by + bh - 4 * s + (Math.cos(i * 1.7 + bh * 0.1) * 3) * s;
                ctx.moveTo(cx + 4 * s, cy);
                ctx.arc(cx, cy, 4 * s, 0, Math.PI * 2);
            }
        }
    }

    // ============================================================
    //  PROVERB OVERLAY (ことわざ kotowaza — milestone calligraphy)
    // ============================================================
    class ProverbOverlay {
        constructor(proverb) {
            this.chars = [...proverb.chars]; // Array of individual characters
            this.kana = proverb.kana;
            this.german = proverb.german;
            this.milestone = proverb.words;
            this.charCount = this.chars.length;
            // Timing: ~0.8s per char reveal + 3s hold + 2s fade
            this.revealPerChar = 48; // frames per character reveal
            this.holdTime = 180; // frames to hold fully revealed
            this.fadeOutTime = 120; // frames to fade out
            this.totalLife = this.charCount * this.revealPerChar + this.holdTime + this.fadeOutTime;
            this.life = this.totalLife;
            this.maxLife = this.totalLife;
            // Pre-render each character
            this.offCanvases = this.chars.map(ch => {
                const oc = document.createElement('canvas');
                oc.width = 96;
                oc.height = 96;
                const octx = oc.getContext('2d');
                octx.textAlign = 'center';
                octx.textBaseline = 'middle';
                octx.font = `bold 72px ${CJK_FONT}`;
                octx.fillStyle = INK_COLOR;
                octx.globalAlpha = 0.2;
                octx.fillText(ch, 49, 49);
                octx.globalAlpha = 1.0;
                octx.fillText(ch, 48, 48);
                return oc;
            });
        }

        update(dt) {
            this.life -= dt;
            return this.life > 0;
        }

        draw(ctx) {
            if (this.life <= 0) return;
            const s = canvasScale;
            const elapsed = this.maxLife - this.life;

            // Overall alpha: fade in first 60 frames, fade out last fadeOutTime frames
            let alpha = 1;
            if (elapsed < 60) alpha = elapsed / 60;
            if (this.life < this.fadeOutTime) alpha = this.life / this.fadeOutTime;

            ctx.save();

            // Semi-transparent backdrop (full canvas, not just world area)
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;
            ctx.globalAlpha = alpha * 0.55;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, cw, ch);

            ctx.globalAlpha = alpha;

            // Silk banner background (centered on full canvas)
            const charSize = 42 * s;
            const charGap = 6 * s;
            const totalCharsW = this.charCount * (charSize + charGap) - charGap;
            const bannerW = Math.min(totalCharsW + 60 * s, cw - 40 * s);
            const bannerH = 160 * s;
            const bannerX = (cw - bannerW) / 2;
            const bannerY = (ch - bannerH) / 2 - 20 * s;

            // Banner fill
            ctx.fillStyle = PARCHMENT_BG;
            ctx.strokeStyle = '#b8863a';
            ctx.lineWidth = 2 * s;
            roundRect(ctx, bannerX, bannerY, bannerW, bannerH, 6 * s);
            ctx.fill();
            ctx.stroke();

            // Inner border
            ctx.strokeStyle = 'rgba(180,100,40,0.25)';
            ctx.lineWidth = 0.8 * s;
            roundRect(ctx, bannerX + 6 * s, bannerY + 6 * s, bannerW - 12 * s, bannerH - 12 * s, 3 * s);
            ctx.stroke();

            // Paper texture on banner
            ctx.globalAlpha = alpha * 0.04;
            for (let i = 0; i < 12; i++) {
                const tx = bannerX + bannerW * (0.05 + Math.sin(i * 3.1) * 0.45 + 0.45);
                const ty = bannerY + bannerH * (0.1 + Math.cos(i * 2.3) * 0.4 + 0.4);
                ctx.beginPath();
                ctx.arc(tx, ty, (4 + i * 1.2) * s, 0, Math.PI * 2);
                ctx.fillStyle = '#c8a060';
                ctx.fill();
            }
            ctx.globalAlpha = alpha;

            // Milestone label
            ctx.font = `${Math.round(7 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#b8863a';
            ctx.textAlign = 'center';
            ctx.fillText(`${this.milestone} Woerter gelernt`, cw / 2, bannerY + 18 * s);

            // Draw characters sequentially
            const charsStartX = (cw - totalCharsW) / 2;
            const charsY = bannerY + 32 * s;

            for (let i = 0; i < this.charCount; i++) {
                const charElapsed = elapsed - i * this.revealPerChar;
                if (charElapsed <= 0) continue; // Not yet revealed

                const charProgress = Math.min(1, charElapsed / this.revealPerChar);
                const cx = charsStartX + i * (charSize + charGap);

                ctx.save();

                // Clip for progressive reveal (top-to-bottom sweep)
                ctx.beginPath();
                const revealH = charSize * charProgress;
                ctx.rect(cx - 2 * s, charsY - 2 * s, charSize + 4 * s, revealH + 4 * s);
                // Ragged bottom edge
                for (let j = 0; j < 5; j++) {
                    const bx = cx + charSize * (j / 4);
                    const by = charsY + revealH + Math.sin(j * 2.1 + i) * 3 * s;
                    ctx.moveTo(bx + 3 * s, by);
                    ctx.arc(bx, by, 3 * s, 0, Math.PI * 2);
                }
                ctx.clip();

                // Draw pre-rendered character
                ctx.globalAlpha = alpha;
                ctx.drawImage(this.offCanvases[i], cx, charsY, charSize, charSize);

                ctx.restore();
            }

            // Kana (below characters, appears after all revealed)
            const allRevealed = elapsed > this.charCount * this.revealPerChar;
            if (allRevealed) {
                const textAlpha = Math.min(1, (elapsed - this.charCount * this.revealPerChar) / 40);
                ctx.globalAlpha = alpha * textAlpha;
                ctx.font = `${Math.round(9 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#5a4530';
                ctx.textAlign = 'center';
                ctx.fillText(this.kana, cw / 2, bannerY + 88 * s);

                // German translation
                ctx.font = `${Math.round(8 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#7a6a55';
                ctx.fillText(this.german, cw / 2, bannerY + 104 * s);

                // Decorative divider
                ctx.beginPath();
                ctx.moveTo(bannerX + 30 * s, bannerY + 118 * s);
                ctx.lineTo(bannerX + bannerW - 30 * s, bannerY + 118 * s);
                ctx.strokeStyle = 'rgba(180,140,80,0.3)';
                ctx.lineWidth = 0.5 * s;
                ctx.stroke();

                // Source attribution
                ctx.font = `italic ${Math.round(6.5 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#a09080';
                ctx.fillText('— Japanisches Sprichwort', cw / 2, bannerY + 132 * s);
            }

            ctx.restore();
        }
    }

    // --- Calligraphy trigger functions ---
    function triggerCalligraphy(kanji, kana, german) {
        // Queue words for sequential display (one at a time)
        calligraphyQueue.push({ kanji, kana, german });
        // If nothing is currently showing, start immediately
        if (calligraphyOverlays.length === 0) {
            _advanceCalligraphyQueue();
        }
    }

    function _advanceCalligraphyQueue() {
        if (calligraphyQueue.length === 0) return;
        const next = calligraphyQueue.shift();
        calligraphyOverlays = [new CalligraphyOverlay(next.kanji, next.kana, next.german)];
    }

    function checkProverbMilestone(wordCount) {
        for (const p of PROVERBS) {
            if (p.words === wordCount && !proverbMilestonesHit.has(p.words)) {
                proverbMilestonesHit.add(p.words);
                proverbOverlay = new ProverbOverlay(p);
                addLog(`Meilenstein: ${p.chars} — ${p.german}`, 'learn');
                sfx('learn');
                break;
            }
        }
    }

    // --- Consolidated learn-word helper ---
    function learnWord(learner, w) {
        // Grammar particles are structural, not learnable content
        if (w.type === 'particle' || (vocab[w.conceptId] && vocab[w.conceptId].type === 'particle')) return;
        learner.knownWords.add(w.conceptId);
        learner.wordHistory.push(w.conceptId);
        vocabHistory.push({ day: gameDay, tick: gameTick });
        sfx('learn');
        learnFlashes.push(new LearnFlash(
            learner.x + randFloat(-10, 10), learner.y - 25,
            w.kanji + ' (' + w.kana + ')'
        ));
        addLog(`${learner.name} lernt: ${w.kanji} [${w.kana}] (${w.de})`, 'learn');
        triggerCalligraphy(w.kanji, w.kana, w.de);
        checkProverbMilestone(learner.knownWords.size);
    }

    // ============================================================
    //  RENDERING
    // ============================================================
    function drawTerrain(ctx) {
        const cw = canvas.width / dpr;
        const ch = canvas.height / dpr;
        const s = canvasScale;

        // Base green landscape with subtle gradient (darker at top/distance)
        const terrainGrad = ctx.createLinearGradient(0, 0, 0, ch);
        terrainGrad.addColorStop(0, '#3e6e28');
        terrainGrad.addColorStop(0.5, '#4a7a30');
        terrainGrad.addColorStop(1, '#508035');
        ctx.fillStyle = terrainGrad;
        ctx.fillRect(0, 0, cw, ch);

        // Ground texture variation — subtle tonal circles
        const groundSpots = [
            [60,90,'#467428'],[200,150,'#4e7e32'],[340,420,'#3e7228'],[480,100,'#508030'],
            [100,350,'#447228'],[550,480,'#3a6a24'],[720,550,'#4a7a2e'],[850,200,'#467428'],
            [300,530,'#508030'],[180,480,'#3e6e28'],[630,350,'#447228'],[800,100,'#467428'],
            [420,560,'#3a6a24'],[250,250,'#4e7e32'],[500,380,'#3e7228'],[150,60,'#447228'],
            [750,480,'#508030'],[900,400,'#3e6e28'],[380,80,'#467428'],[650,560,'#4a7a2e'],
        ];
        for (const [gx, gy, gc] of groundSpots) {
            ctx.beginPath();
            ctx.ellipse(gx * s, gy * s, (20 + gx % 15) * s, (12 + gy % 10) * s, (gx * 0.01), 0, Math.PI * 2);
            ctx.fillStyle = gc;
            ctx.fill();
        }

        // Distant mountain silhouettes (水墨画 ink wash style)
        ctx.save();
        // Far mountains — very faint, bluish-grey
        ctx.fillStyle = 'rgba(60,80,70,0.18)';
        ctx.beginPath();
        ctx.moveTo(0, 30 * s);
        ctx.quadraticCurveTo(60 * s, -20 * s, 150 * s, 25 * s);
        ctx.quadraticCurveTo(200 * s, -10 * s, 280 * s, 20 * s);
        ctx.quadraticCurveTo(350 * s, -30 * s, 420 * s, 15 * s);
        ctx.lineTo(420 * s, 50 * s);
        ctx.lineTo(0, 50 * s);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(50,70,60,0.15)';
        ctx.beginPath();
        ctx.moveTo(400 * s, 25 * s);
        ctx.quadraticCurveTo(500 * s, -25 * s, 600 * s, 18 * s);
        ctx.quadraticCurveTo(680 * s, -15 * s, 780 * s, 22 * s);
        ctx.quadraticCurveTo(880 * s, -20 * s, 1000 * s, 20 * s);
        ctx.lineTo(1000 * s, 55 * s);
        ctx.lineTo(400 * s, 55 * s);
        ctx.closePath();
        ctx.fill();
        // Mist between mountains and village
        const mistGrad = ctx.createLinearGradient(0, 20 * s, 0, 70 * s);
        mistGrad.addColorStop(0, 'rgba(200,200,190,0.08)');
        mistGrad.addColorStop(0.5, 'rgba(200,200,190,0.12)');
        mistGrad.addColorStop(1, 'rgba(200,200,190,0)');
        ctx.fillStyle = mistGrad;
        ctx.fillRect(0, 20 * s, cw, 50 * s);
        ctx.restore();

        // Rolling green hills in foreground
        const hills = [
            { x: 80, y: 60, rx: 140, ry: 50, c: '#3e6e28' },
            { x: 350, y: 40, rx: 180, ry: 60, c: '#447228' },
            { x: 650, y: 50, rx: 120, ry: 45, c: '#3a6a24' },
            { x: 200, y: 80, rx: 100, ry: 35, c: '#4a7a30' },
        ];
        for (const h of hills) {
            ctx.beginPath();
            ctx.ellipse(h.x * s, h.y * s, h.rx * s, h.ry * s, 0, Math.PI, 0);
            ctx.fillStyle = h.c;
            ctx.fill();
        }

        // Golden-tan courtyard area (center, slightly irregular ellipse)
        ctx.beginPath();
        ctx.ellipse(420 * s, 300 * s, 180 * s, 120 * s, -0.06, 0, Math.PI * 2);
        ctx.fillStyle = '#c8b080';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(418 * s, 302 * s, 160 * s, 105 * s, 0.04, 0, Math.PI * 2);
        ctx.fillStyle = '#baa870';
        ctx.fill();

        // Subtle dirt paths with soft edges
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const drawPath = (x1, y1, x2, y2, w, alpha) => {
            // Soft outer edge
            ctx.globalAlpha = alpha * 0.3;
            ctx.strokeStyle = '#9a8868';
            ctx.lineWidth = (w + 4) * s;
            ctx.beginPath();
            ctx.moveTo(x1 * s, y1 * s);
            ctx.lineTo(x2 * s, y2 * s);
            ctx.stroke();
            // Main path
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = '#a89878';
            ctx.lineWidth = w * s;
            ctx.beginPath();
            ctx.moveTo(x1 * s, y1 * s);
            ctx.lineTo(x2 * s, y2 * s);
            ctx.stroke();
        };
        // Main crossroads
        drawPath(200, 300, 640, 300, 14, 0.35);
        drawPath(420, 155, 420, 475, 12, 0.3);
        // Diagonal
        drawPath(285, 205, 555, 395, 10, 0.25);
        // Side path to river
        drawPath(580, 300, 700, 300, 8, 0.2);
        // Pebble dots along main path
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#8a7a60';
        const pebbles = [[230,298],[280,303],[330,297],[380,301],[450,299],[520,302],[570,297],[620,300],
                          [418,180],[422,220],[419,260],[421,340],[418,380],[420,420],[422,460]];
        for (const [px, py] of pebbles) {
            ctx.beginPath();
            ctx.arc(px * s, py * s, (1 + (px % 3) * 0.5) * s, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;
        ctx.lineCap = 'butt';

        // River on right side (gentle meander) — gradient fill
        const riverGrad = ctx.createLinearGradient(705 * s, 0, 800 * s, 0);
        riverGrad.addColorStop(0, '#2a5a78');
        riverGrad.addColorStop(0.3, '#3a7090');
        riverGrad.addColorStop(0.7, '#3a7090');
        riverGrad.addColorStop(1, '#2a5a78');
        ctx.fillStyle = riverGrad;
        ctx.beginPath();
        ctx.moveTo(725 * s, 0);
        ctx.bezierCurveTo(720 * s, 120 * s, 715 * s, 280 * s, 710 * s, 400 * s);
        ctx.bezierCurveTo(705 * s, 500 * s, 708 * s, 560 * s, 705 * s, ch);
        ctx.lineTo(800 * s, ch);
        ctx.bezierCurveTo(798 * s, 540 * s, 793 * s, 420 * s, 795 * s, 300 * s);
        ctx.bezierCurveTo(797 * s, 180 * s, 790 * s, 80 * s, 785 * s, 0);
        ctx.closePath();
        ctx.fill();
        // Shore highlight — left bank
        ctx.strokeStyle = 'rgba(90,120,70,0.35)';
        ctx.lineWidth = 2 * s;
        ctx.beginPath();
        ctx.moveTo(725 * s, 0);
        ctx.bezierCurveTo(720 * s, 120 * s, 715 * s, 280 * s, 710 * s, 400 * s);
        ctx.bezierCurveTo(705 * s, 500 * s, 708 * s, 560 * s, 705 * s, ch);
        ctx.stroke();
        // River ripples (flow downward, clipped to river)
        ctx.save();
        ctx.clip(); // clip to the river path drawn above
        ctx.strokeStyle = 'rgba(100,170,220,0.3)';
        ctx.lineWidth = 1 * s;
        for (let i = 0; i < 14; i++) {
            const ry = (i * 50 + (gameTick * 0.4) % 50) * s;
            ctx.beginPath();
            ctx.moveTo(715 * s, ry);
            ctx.quadraticCurveTo(750 * s, (ry + 8 * s), 785 * s, ry);
            ctx.stroke();
        }
        ctx.restore(); // end river clipping

        // Green grass patches (positioned to avoid buildings)
        const grassPatches = [
            { x: 80,  y: 400, r: 55, c: '#508030' },
            { x: 620, y: 100, r: 45, c: '#4a7a2e' },
            { x: 140, y: 140, r: 50, c: '#467428' },
            { x: 580, y: 530, r: 55, c: '#4e7e32' },
        ];
        for (const gp of grassPatches) {
            const depthScale = 0.8 + (gp.y / WORLD_H) * 0.4;
            ctx.beginPath();
            ctx.ellipse(gp.x * s, gp.y * s, gp.r * depthScale * s, gp.r * 0.6 * depthScale * s, 0, 0, Math.PI * 2);
            ctx.fillStyle = gp.c;
            ctx.fill();
        }

        // Bamboo shoots scattered (small green triangles)
        const bambooShoots = [
            [60, 180], [90, 420], [680, 100], [670, 480],
            [140, 520], [50, 350], [660, 250], [100, 100]
        ];
        ctx.fillStyle = '#3a8a3a';
        for (const [bx, by] of bambooShoots) {
            ctx.beginPath();
            ctx.moveTo(bx * s, by * s);
            ctx.lineTo((bx - 2) * s, (by + 10) * s);
            ctx.lineTo((bx + 2) * s, (by + 10) * s);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo((bx + 1) * s, (by + 3) * s);
            ctx.lineTo((bx + 5) * s, (by + 1) * s);
            ctx.lineTo((bx + 4) * s, (by + 4) * s);
            ctx.closePath();
            ctx.fill();
        }
    }

    function drawObject(ctx, obj) {
        const x = obj.x * canvasScale;
        const y = obj.y * canvasScale;
        const w = obj.w * canvasScale;
        const h = obj.h * canvasScale;

        // Soft shadow under object (skip ground-level types and bridge)
        if (!GROUND_TYPES.includes(obj.type) && obj.type !== 'bridge') {
            const vb = (VISUAL_BOTTOM[obj.type] || obj.h / 2) * canvasScale;
            const shadowW = w * 0.7;
            const shadowH = Math.max(h * 0.12, 3 * canvasScale);
            ctx.beginPath();
            ctx.ellipse(x, y + vb, shadowW / 2, shadowH / 2, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.10)';
            ctx.fill();
        }

        switch (obj.type) {
            case 'house': {
                // Song Dynasty wooden house with curved tiled roof
                // Wooden walls
                ctx.fillStyle = '#8B6914';
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/4, w - 4*canvasScale, h/2 + 4*canvasScale);
                // Wall wood grain
                ctx.strokeStyle = '#7a5a10';
                ctx.lineWidth = canvasScale * 0.5;
                for (let i = 0; i < 3; i++) {
                    const ly = y - h/4 + 4*canvasScale + i * h/6;
                    ctx.beginPath();
                    ctx.moveTo(x - w/2 + 4*canvasScale, ly);
                    ctx.lineTo(x + w/2 - 4*canvasScale, ly);
                    ctx.stroke();
                }
                // Red door
                ctx.fillStyle = '#a82020';
                ctx.fillRect(x - 4*canvasScale, y - h/4 + 6*canvasScale, 8*canvasScale, h/2 - 2*canvasScale);
                ctx.fillStyle = '#e8c020';
                ctx.beginPath();
                ctx.arc(x + 2*canvasScale, y + 2*canvasScale, 1.2*canvasScale, 0, Math.PI*2);
                ctx.fill();
                // Curved tiled roof (dark grey trapezoid with curve)
                ctx.fillStyle = '#3a3a3a';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 6*canvasScale, y - h/4 + 2*canvasScale);
                ctx.quadraticCurveTo(x - w/3, y - h/2 - 8*canvasScale, x, y - h/2 - 10*canvasScale);
                ctx.quadraticCurveTo(x + w/3, y - h/2 - 8*canvasScale, x + w/2 + 6*canvasScale, y - h/4 + 2*canvasScale);
                ctx.fill();
                // Roof ridge lines
                ctx.strokeStyle = '#2a2a2a';
                ctx.lineWidth = canvasScale * 0.7;
                for (let i = 1; i <= 3; i++) {
                    const ry = y - h/4 + 2*canvasScale - i * h/8;
                    ctx.beginPath();
                    ctx.moveTo(x - w/2 - 4*canvasScale + i*4*canvasScale, ry + i*2*canvasScale);
                    ctx.quadraticCurveTo(x, ry - 2*canvasScale, x + w/2 + 4*canvasScale - i*4*canvasScale, ry + i*2*canvasScale);
                    ctx.stroke();
                }
                // Chimney smoke (not during rain)
                if (currentWeather !== 'rain') {
                    ctx.save();
                    ctx.globalAlpha = 0.15;
                    ctx.fillStyle = '#b0a890';
                    const smokeT = gameTick * 0.02;
                    for (let si = 0; si < 3; si++) {
                        const sx = x + w/4 + Math.sin(smokeT + si * 2) * 3 * canvasScale;
                        const sy = y - h/2 - 10*canvasScale - si * 8 * canvasScale;
                        const sr = (2 + si * 1.5) * canvasScale;
                        ctx.globalAlpha = 0.15 - si * 0.04;
                        ctx.beginPath();
                        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
                break;
            }

            case 'teahouse': {
                // Wider open-front teahouse with red awning and steam
                // Back wall
                ctx.fillStyle = '#8B6914';
                ctx.fillRect(x - w/2, y - h/4, w, h/2 + 4*canvasScale);
                // Open front (darker interior)
                ctx.fillStyle = '#4a3a10';
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/4 + 2*canvasScale, w - 4*canvasScale, h/3);
                // Support posts
                ctx.fillStyle = '#6a4a1a';
                ctx.fillRect(x - w/2 + 1*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                ctx.fillRect(x + w/2 - 4*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                ctx.fillRect(x - 1.5*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                // Red fabric awning
                ctx.fillStyle = '#c03020';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 4*canvasScale, y - h/4);
                ctx.lineTo(x - w/2 + 2*canvasScale, y - h/3 - 6*canvasScale);
                ctx.lineTo(x + w/2 - 2*canvasScale, y - h/3 - 6*canvasScale);
                ctx.lineTo(x + w/2 + 4*canvasScale, y - h/4);
                ctx.fill();
                // Awning drape scallops
                ctx.fillStyle = '#a82818';
                for (let i = 0; i < 3; i++) {
                    const sx = x - w/2 + 2*canvasScale + i * (w - 4*canvasScale) / 3;
                    const cw = (w - 4*canvasScale) / 3;
                    ctx.beginPath();
                    ctx.arc(sx + cw/2, y - h/4 + 2*canvasScale, cw/2, Math.PI, 0);
                    ctx.fill();
                }
                // Roof
                ctx.fillStyle = '#3a3a3a';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 6*canvasScale, y - h/3 - 4*canvasScale);
                ctx.quadraticCurveTo(x, y - h/2 - 12*canvasScale, x + w/2 + 6*canvasScale, y - h/3 - 4*canvasScale);
                ctx.fill();
                // Steam wisps rising from teahouse (animated)
                const st = gameTick * 0.03;
                for (let i = 0; i < 3; i++) {
                    const sx = x + (i - 1) * 5 * canvasScale;
                    const rise = (st + i * 2.5) % 6;
                    const fadeAlpha = rise < 1 ? rise * 0.25 : Math.max(0, 0.25 - (rise - 1) * 0.06);
                    if (fadeAlpha <= 0) continue;
                    ctx.globalAlpha = fadeAlpha;
                    ctx.fillStyle = '#e8e4e0';
                    const wy = y - h/3 - (6 + rise * 5) * canvasScale;
                    const wobble = Math.sin(st * 2 + i * 1.8) * 3 * canvasScale;
                    ctx.beginPath();
                    ctx.ellipse(sx + wobble, wy, (2.5 + rise * 0.4) * canvasScale, (1.5 + rise * 0.3) * canvasScale, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
                break;
            }

            case 'market': {
                // Market stalls with red awnings and items
                // Counter/table
                ctx.fillStyle = '#7a5a2a';
                ctx.fillRect(x - w/2, y, w, h/4);
                // Items on counter
                ctx.fillStyle = '#d0a040';
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.arc(x - w/3 + i * w/5, y - 2*canvasScale, 2.5*canvasScale, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = '#40a040';
                ctx.fillRect(x + w/5, y - 4*canvasScale, 6*canvasScale, 4*canvasScale);
                // Posts
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x - w/2, y - h/2, 3*canvasScale, h/2);
