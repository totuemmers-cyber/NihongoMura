                // Red awning
                ctx.fillStyle = '#c03020';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 4*canvasScale, y - h/3);
                ctx.lineTo(x - w/2 + 3*canvasScale, y - h/2 - 2*canvasScale);
                ctx.lineTo(x + w/2 - 3*canvasScale, y - h/2 - 2*canvasScale);
                ctx.lineTo(x + w/2 + 4*canvasScale, y - h/3);
                ctx.fill();
                // Awning scallops
                ctx.fillStyle = '#a02818';
                for (let i = 0; i < 3; i++) {
                    const sx = x - w/2 + 2*canvasScale + i * (w - 4*canvasScale)/2.5;
                    ctx.beginPath();
                    ctx.arc(sx + w/6, y - h/3 + 2*canvasScale, w/7, Math.PI, 0);
                    ctx.fill();
                }
                break;
            }

            case 'well': {
                // Stone well with wooden frame and rope
                // Stone base (circular)
                ctx.fillStyle = '#7a7a6a';
                ctx.beginPath();
                ctx.ellipse(x, y + 2*canvasScale, w/3, h/5, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#5a5a4a';
                ctx.lineWidth = 2*canvasScale;
                ctx.stroke();
                // Stone wall (cylinder effect)
                ctx.fillStyle = '#8a8a7a';
                ctx.fillRect(x - w/3, y - h/4, w*2/3, h/4 + 2*canvasScale);
                ctx.strokeStyle = '#6a6a5a';
                ctx.lineWidth = canvasScale;
                // Stone rows
                for (let i = 0; i < 3; i++) {
                    const sy = y - h/4 + i * h/10;
                    ctx.beginPath();
                    ctx.moveTo(x - w/3, sy);
                    ctx.lineTo(x + w/3, sy);
                    ctx.stroke();
                }
                // Top rim
                ctx.fillStyle = '#6a6a5a';
                ctx.beginPath();
                ctx.ellipse(x, y - h/4, w/3 + 2*canvasScale, h/7, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#5a5a4a';
                ctx.stroke();
                // Dark water inside
                ctx.fillStyle = '#1a3a5a';
                ctx.beginPath();
                ctx.ellipse(x, y - h/4, w/3 - 2*canvasScale, h/8, 0, 0, Math.PI*2);
                ctx.fill();
                // Wooden frame above
                ctx.fillStyle = '#6a4a2a';
                ctx.fillRect(x - w/3 - 2*canvasScale, y - h/2 - 10*canvasScale, 3*canvasScale, h/3 + 6*canvasScale);
                ctx.fillRect(x + w/3 - 1*canvasScale, y - h/2 - 10*canvasScale, 3*canvasScale, h/3 + 6*canvasScale);
                // Cross beam
                ctx.fillRect(x - w/3 - 2*canvasScale, y - h/2 - 10*canvasScale, w*2/3 + 4*canvasScale, 3*canvasScale);
                // Rope
                ctx.strokeStyle = '#8a7a5a';
                ctx.lineWidth = canvasScale;
                ctx.beginPath();
                ctx.moveTo(x, y - h/2 - 8*canvasScale);
                ctx.lineTo(x, y - h/4 - 2*canvasScale);
                ctx.stroke();
                // Bucket
                ctx.fillStyle = '#5a4a2a';
                ctx.fillRect(x - 3*canvasScale, y - h/4 - 6*canvasScale, 6*canvasScale, 5*canvasScale);

            case 'bridge': {
                // Wooden bridge over river
                const bw = w, bh = h;
                const s2 = canvasScale;
                // Wooden deck (main surface, above water)
                ctx.fillStyle = '#8a6a3a';
                ctx.fillRect(x - bw/2, y - bh/3, bw, bh * 0.6);
                // Plank lines
                ctx.strokeStyle = '#6a4a2a';
                ctx.lineWidth = s2 * 0.5;
                const plankCount = 8;
                for (let i = 1; i < plankCount; i++) {
                    const px = x - bw/2 + i * bw / plankCount;
                    ctx.beginPath();
                    ctx.moveTo(px, y - bh/3);
                    ctx.lineTo(px, y - bh/3 + bh * 0.6);
                    ctx.stroke();
                }
                // Support posts (visible below deck)
                ctx.fillStyle = '#6a4a20';
                const postW = 4 * s2;
                ctx.fillRect(x - bw/3 - postW/2, y - bh/3 + bh*0.5, postW, bh * 0.45);
                ctx.fillRect(x + bw/3 - postW/2, y - bh/3 + bh*0.5, postW, bh * 0.45);
                ctx.fillRect(x - postW/2, y - bh/3 + bh*0.5, postW, bh * 0.45);
                // Railings
                ctx.strokeStyle = '#7a5a2a';
                ctx.lineWidth = 2 * s2;
                ctx.beginPath();
                ctx.moveTo(x - bw/2, y - bh/3 - 2*s2);
                ctx.lineTo(x + bw/2, y - bh/3 - 2*s2);
                ctx.stroke();
                ctx.moveTo(x - bw/2, y - bh/3 + bh*0.6 + 2*s2);
                ctx.lineTo(x + bw/2, y - bh/3 + bh*0.6 + 2*s2);
                ctx.stroke();
                // Railing posts
                ctx.lineWidth = 1.5 * s2;
                for (let i = 0; i <= 4; i++) {
                    const rpx = x - bw/2 + i * bw/4;
                    ctx.beginPath();
                    ctx.moveTo(rpx, y - bh/3 - 3*s2);
                    ctx.lineTo(rpx, y - bh/3);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(rpx, y - bh/3 + bh*0.6);
                    ctx.lineTo(rpx, y - bh/3 + bh*0.6 + 3*s2);
                    ctx.stroke();
                }
                break;
            }

            case 'pagoda': {
                // 3-tier pagoda with upturned edges
                // Base pillar
                ctx.fillStyle = '#7a5a2a';
                ctx.fillRect(x - w/4, y - h/6, w/2, h/3 + 6*canvasScale);
                // Door
                ctx.fillStyle = '#3a2a10';
                ctx.beginPath();
                ctx.moveTo(x - 4*canvasScale, y + h/6 + 4*canvasScale);
                ctx.lineTo(x - 4*canvasScale, y);
                ctx.arc(x, y, 4*canvasScale, Math.PI, 0);
                ctx.lineTo(x + 4*canvasScale, y + h/6 + 4*canvasScale);
                ctx.fill();
                // 3 stacked roofs (trapezoids with upturned tips)
                for (let tier = 0; tier < 3; tier++) {
                    const tw = w/2 - tier * w/7;
                    const ty = y - h/6 - tier * h/5;
                    ctx.fillStyle = tier % 2 === 0 ? '#3a3a3a' : '#4a4a4a';
                    ctx.beginPath();
                    ctx.moveTo(x - tw - 4*canvasScale, ty + 4*canvasScale);
                    // Upturned left edge
                    ctx.quadraticCurveTo(x - tw - 6*canvasScale, ty - 2*canvasScale, x - tw - 3*canvasScale, ty - 4*canvasScale);
                    ctx.lineTo(x, ty - 6*canvasScale - tier*2*canvasScale);
                    ctx.lineTo(x + tw + 3*canvasScale, ty - 4*canvasScale);
                    // Upturned right edge
                    ctx.quadraticCurveTo(x + tw + 6*canvasScale, ty - 2*canvasScale, x + tw + 4*canvasScale, ty + 4*canvasScale);
                    ctx.closePath();
                    ctx.fill();
                    // Tier body
                    ctx.fillStyle = '#8a6a30';
                    ctx.fillRect(x - tw + 2*canvasScale, ty + 4*canvasScale, tw*2 - 4*canvasScale, h/6);
                }
                // Spire
                ctx.fillStyle = '#c8a030';
                ctx.beginPath();
                ctx.moveTo(x, y - h/2 - h/4 - 4*canvasScale);
                ctx.lineTo(x - 3*canvasScale, y - h/6 - 2*h/5);
                ctx.lineTo(x + 3*canvasScale, y - h/6 - 2*h/5);
                ctx.closePath();
                ctx.fill();
                break;
            }

            case 'gate':
            case 'torii': {
                // Torii gate (鳥居) — vermillion red, two pillars + two crossbars
                const pillarW = 5 * canvasScale;
                const pillarH = h * 0.85;
                // Main pillars
                ctx.fillStyle = '#c83030';
                ctx.fillRect(x - w/2, y - h/3, pillarW, pillarH);
                ctx.fillRect(x + w/2 - pillarW, y - h/3, pillarW, pillarH);
                // Top crossbar (kasagi) — extends beyond pillars, slight upward curve at ends
                ctx.fillStyle = '#b82828';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 8*canvasScale, y - h/3 + 2*canvasScale);
                ctx.quadraticCurveTo(x - w/2 - 6*canvasScale, y - h/3 - 4*canvasScale, x - w/2, y - h/3 - 2*canvasScale);
                ctx.lineTo(x + w/2, y - h/3 - 2*canvasScale);
                ctx.quadraticCurveTo(x + w/2 + 6*canvasScale, y - h/3 - 4*canvasScale, x + w/2 + 8*canvasScale, y - h/3 + 2*canvasScale);
                ctx.lineTo(x + w/2 + 8*canvasScale, y - h/3 + 5*canvasScale);
                ctx.lineTo(x - w/2 - 8*canvasScale, y - h/3 + 5*canvasScale);
                ctx.closePath();
                ctx.fill();
                // Lower crossbar (nuki) — between pillars
                ctx.fillStyle = '#c83030';
                const nukiY = y - h/3 + h * 0.2;
                ctx.fillRect(x - w/2 + pillarW, nukiY, w - pillarW * 2, 3*canvasScale);
                // Pillar caps (daiwa)
                ctx.fillStyle = '#a02020';
                ctx.fillRect(x - w/2 - 2*canvasScale, y - h/3 - 2*canvasScale, pillarW + 4*canvasScale, 3*canvasScale);

                    for (let j = 1; j < 4; j++) {
                        const ly = y + h/3 - j * h/4;

                        ctx.beginPath();
                        ctx.moveTo(sx, ly);
                        ctx.quadraticCurveTo(sx + dir*8*canvasScale, ly - 4*canvasScale, sx + dir*12*canvasScale, ly - 2*canvasScale);

            case 'garden': {

            case 'workshop': {

                ctx.lineWidth = 1.5*canvasScale;
                ctx.beginPath();
                ctx.moveTo(x + w/3 + 2*canvasScale, y + h/6 - 6*canvasScale);
                ctx.lineTo(x + w/3, y + h/6 - 1*canvasScale);

            case 'stable': {
                // Lean-to wooden stable with fence
                // Back wall
                ctx.fillStyle = '#7a5a2a';
                ctx.fillRect(x - w/2, y - h/4, w, h/3);
                // Support beams
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x - w/2, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                ctx.fillRect(x + w/2 - 3*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                // Slanted roof (lean-to)

                ctx.lineTo(x - w/2 - 4*canvasScale, y - h/4 - 8*canvasScale);
                ctx.closePath();
                ctx.fill();
                // Fence rails
                ctx.strokeStyle = '#6a4a2a';
                ctx.lineWidth = 2*canvasScale;
                ctx.beginPath();
                ctx.moveTo(x - w/2, y + h/6);
                ctx.lineTo(x + w/2, y + h/6);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x - w/2, y);
                ctx.lineTo(x + w/2, y);
                ctx.stroke();
                // Fence posts
                ctx.fillStyle = '#5a3a1a';
                for (let i = 0; i <= 3; i++) {
                    ctx.fillRect(x - w/2 + i * w/3 - 1.5*canvasScale, y - 2*canvasScale, 3*canvasScale, h/4 + 2*canvasScale);
                }
                // Hay bale
                ctx.fillStyle = '#c8a840';

            }

            case 'tea_terrace': {
                // Flat bamboo trays on wooden frames for drying tea
                // Wooden frame base
                ctx.fillStyle = '#6a4a2a';
                ctx.fillRect(x - w/2, y + h/6, w, 3*canvasScale);
                // Frame legs
                ctx.fillRect(x - w/2 + 2*canvasScale, y + h/6, 2*canvasScale, h/4);
                ctx.fillRect(x + w/2 - 4*canvasScale, y + h/6, 2*canvasScale, h/4);
                ctx.fillRect(x - 1*canvasScale, y + h/6, 2*canvasScale, h/4);
                // Bamboo drying trays (3 round trays)
                for (let i = 0; i < 3; i++) {
                    const tx = x - w/3 + i * w/3;
                    const ty = y + h/6 - 1*canvasScale;
                    // Tray (light bamboo color)
                    ctx.fillStyle = '#c8b870';
                    ctx.beginPath();
                    ctx.ellipse(tx, ty, 7*canvasScale, 4*canvasScale, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#a89850';
                    ctx.lineWidth = canvasScale * 0.5;
                    ctx.stroke();
                    // Tea leaves on tray (small dark green dots)
                    ctx.fillStyle = '#3a6a2a';
                    for (let j = 0; j < 5; j++) {
                        const lx = tx + (Math.cos(j*1.3 + i)*4)*canvasScale;
                        const ly = ty + (Math.sin(j*1.3 + i)*2)*canvasScale;
                        ctx.fillRect(lx, ly, 2*canvasScale, 1*canvasScale);
                    }
                }
                // Simple canopy poles
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/3, 2*canvasScale, h/2);
                ctx.fillRect(x + w/2 - 4*canvasScale, y - h/3, 2*canvasScale, h/2);
                // Canopy beam
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/3, w - 4*canvasScale, 2*canvasScale);
                // Cloth cover (partial shade)
                ctx.fillStyle = 'rgba(160,140,100,0.3)';
                ctx.fillRect(x - w/2 + 4*canvasScale, y - h/3 + 2*canvasScale, w/2, h/4);
                break;
            }

            case 'viewpoint': {
                // Stone platform with flat rocks overlooking the river
                // Large flat stone base
                ctx.fillStyle = '#7a7a6a';
                ctx.beginPath();
                ctx.moveTo(x - w/2, y + h/4);
                ctx.lineTo(x - w/2 + 4*canvasScale, y - h/6);
                ctx.lineTo(x + w/2 - 4*canvasScale, y - h/6);
                ctx.lineTo(x + w/2, y + h/4);
                ctx.closePath();
                ctx.fill();
                // Stone texture
                ctx.strokeStyle = '#6a6a5a';
                ctx.lineWidth = canvasScale * 0.5;
                ctx.beginPath();
                ctx.moveTo(x - w/4, y);
                ctx.lineTo(x + w/4, y - 2*canvasScale);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x - w/3, y + h/8);
                ctx.lineTo(x + w/6, y + h/10);
                ctx.stroke();
                // Seat stone (smaller, on top)
                ctx.fillStyle = '#8a8a7a';
                ctx.beginPath();
                ctx.ellipse(x - w/6, y - h/8, 6*canvasScale, 3*canvasScale, 0.1, 0, Math.PI*2);
                ctx.fill();
                // Small cypress tree beside
                ctx.fillStyle = '#2a5a2a';
                ctx.beginPath();
                ctx.moveTo(x + w/3, y - h/6);
                ctx.lineTo(x + w/3 - 4*canvasScale, y + h/6);
                ctx.lineTo(x + w/3 + 4*canvasScale, y + h/6);
                ctx.closePath();
                ctx.fill();
                // Trunk
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x + w/3 - 1.5*canvasScale, y + h/6, 3*canvasScale, h/6);
                break;
            }
        }

        // Window glow at night
        if ((gameHour >= 19 || gameHour < 6) && (obj.type === 'house' || obj.type === 'teahouse' || obj.type === 'school')) {
            const nightA = gameHour >= 19 && gameHour < 20 ? (gameHour - 19) : gameHour >= 5 && gameHour < 6 ? (6 - gameHour) : 1;
            const glowA = 0.25 * nightA;
            ctx.fillStyle = `rgba(255,200,100,${glowA})`;
            if (obj.type === 'house') {
                // Door glow
                ctx.fillRect(x - 4*canvasScale, y - h/4 + 6*canvasScale, 8*canvasScale, h/2 - 2*canvasScale);
            } else if (obj.type === 'teahouse') {
                // Open front interior glow
                ctx.fillRect(x - w/2 + 4*canvasScale, y - h/4 + 2*canvasScale, w - 8*canvasScale, h/3);
            } else if (obj.type === 'school') {
                // Window glow
                ctx.fillRect(x - w/4, y - h/4 + 4*canvasScale, w/2, h/4);
            }
        }

        // Snow accumulation on rooftops
        if (currentWeather === 'snow' && weatherIntensity > 0.3 && BUILDING_TYPES.includes(obj.type)) {
            ctx.fillStyle = `rgba(240,240,250,${weatherIntensity * 0.5})`;
            const snowY = y - h/4 - (obj.type === 'pagoda' ? h/3 : h/8);
            const snowW = w * 0.8;
            ctx.beginPath();
            ctx.ellipse(x, snowY, snowW / 2, 2.5 * canvasScale, 0, Math.PI, 0);
            ctx.fill();
        }

        // Label — per-type visual bottom offset (distance from center to visual bottom in world coords)
        const visualBottom = VISUAL_BOTTOM[obj.type] || obj.h/2;
        const labelY = y + (visualBottom + 10) * canvasScale;
        ctx.textAlign = 'center';

        // Contextual glow when speaker acts here
        if (activeObjectGlow && activeObjectGlow.objId === obj.id) {
            const glowAlpha = Math.min(1, activeObjectGlow.timer / 30); // fade out in last 30 ticks
            const pulseAlpha = glowAlpha * (0.7 + Math.sin(gameTick * 0.08) * 0.3);
            // Glow halo
            ctx.save();
            ctx.font = `bold ${Math.round(12*canvasScale)}px 'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif`;
            ctx.fillStyle = `rgba(212,160,48,${pulseAlpha * 0.3})`;
            ctx.fillText(obj.label, x, labelY);
            ctx.fillText(obj.label, x + canvasScale * 0.5, labelY + canvasScale * 0.5);
            // Sharp label
            ctx.fillStyle = `rgba(255,220,120,${pulseAlpha})`;
            ctx.fillText(obj.label, x, labelY);
            // Romaji below
            if (obj.romaji) {
                ctx.font = `${Math.round(9*canvasScale)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro',monospace`;
                ctx.fillStyle = `rgba(220,200,160,${pulseAlpha * 0.8})`;
                ctx.fillText(obj.romaji, x, labelY + 12 * canvasScale);
            }
            ctx.restore();
        } else {
            ctx.font = `${Math.round(9*canvasScale)}px 'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif`;
            ctx.fillStyle = 'rgba(200,190,160,0.6)';
            ctx.fillText(obj.label, x, labelY);
        }
    }

    function drawPerson(ctx, person) {
        const x = person.x * canvasScale;
        const y = person.y * canvasScale;
        const s = canvasScale;
        const facing = person.facing;
        const isMoving = person.state === 'moving' || (person.state === 'idle' && person.distTo(person.targetX, person.targetY) > 5);
        const walkCycle = isMoving ? Math.sin(gameTick * 0.15) : 0;
        const skin = person.skinTone;
        const cloth = person.clothColor;
        const isLearner = person.role === 'learner';
        const isSleeping = person.state === 'acting' && person.currentAction &&
            (person.currentAction.id === 'sleep_house' || person.currentAction.id === 'sleep_self');
        const isActing = person.state === 'acting' && person.currentAction && !isSleeping;
        const actionId = (person.currentAction && person.currentAction.id) || '';

        // Breathing animation (idle only)
        const breathPhase = Math.sin(gameTick * 0.04 + person.x * 0.1);
        const breathOff = isMoving ? 0 : breathPhase * 0.3 * s;
        // Idle fidget — subtle weight shift every few seconds
        const fidgetPhase = Math.sin(gameTick * 0.008 + person.y * 0.2);
        const fidgetX = (!isMoving && !isSleeping) ? fidgetPhase * 0.5 * s : 0;
        // Head bob when walking
        const headBob = isMoving ? Math.abs(Math.sin(gameTick * 0.30)) * 0.8 * s : breathOff * 0.5;
        // Body lean when walking
        const leanX = isMoving ? Math.cos(facing) * 1.0 * s : fidgetX;
        const leanY = isMoving ? Math.sin(facing) * 1.0 * s : 0;

        ctx.save();
        ctx.translate(x, y);

        // Shadow
        ctx.beginPath();
        ctx.ellipse(0, 5*s, 10*s, 4*s, 0, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fill();

        // Feet / cloth shoes
        const legSpread = 4 * s;
        const leftLegOff = walkCycle * 3 * s;
        const rightLegOff = -walkCycle * 3 * s;
        ctx.fillStyle = isLearner ? '#4a3020' : '#2a2a2a';
        // Left foot
        ctx.save();
        ctx.translate(Math.cos(facing + 1.8) * legSpread, Math.sin(facing + 1.8) * legSpread);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * leftLegOff, Math.sin(facing) * leftLegOff, 3*s, 2.5*s, facing, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        // Right foot
        ctx.save();
        ctx.translate(Math.cos(facing - 1.8) * legSpread, Math.sin(facing - 1.8) * legSpread);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * rightLegOff, Math.sin(facing) * rightLegOff, 3*s, 2.5*s, facing, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        // Body / robe (longer for Song Dynasty) — with breathing
        ctx.beginPath();
        ctx.ellipse(leanX, -2*s + leanY, 9*s, 12*s + breathOff, 0, 0, Math.PI*2);
        ctx.fillStyle = cloth;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.6*s;
        ctx.stroke();

        // V-collar on robe
        ctx.strokeStyle = isLearner ? '#d0c8b0' : '#e8d8a0';
        ctx.lineWidth = 1*s;
        ctx.beginPath();
        const collarFwd = Math.cos(facing) * 4 * s;
        const collarSide = Math.sin(facing) * 4 * s;
        ctx.moveTo(leanX + Math.cos(facing + 0.8) * 6*s, leanY + Math.sin(facing + 0.8) * 6*s - 8*s);
        ctx.lineTo(leanX + collarFwd, leanY + collarSide - 2*s);
        ctx.lineTo(leanX + Math.cos(facing - 0.8) * 6*s, leanY + Math.sin(facing - 0.8) * 6*s - 8*s);
        ctx.stroke();

        // Belt / sash
        ctx.beginPath();
        ctx.ellipse(leanX, 2*s + leanY, 9*s, 2*s, 0, 0, Math.PI*2);
        ctx.fillStyle = isLearner ? '#6a4a2a' : '#8a6030';
        ctx.fill();

        // Arms with sleeves — action-specific poses
        let leftArmSwing = walkCycle * 2 * s;
        let rightArmSwing = -walkCycle * 2 * s;
        let leftArmYOff = -3 * s;
        let rightArmYOff = -3 * s;
        const sleeveW = isLearner ? 3.5*s : 5*s;
        const sleeveH = isLearner ? 5*s : 6*s;

        if (isActing) {
            if (actionId.startsWith('cook') || actionId === 'make_soup' || actionId === 'brew_tea') {
                // Both arms forward (stirring)
                leftArmSwing = 4 * s + Math.sin(gameTick * 0.1) * 1.5 * s;
                rightArmSwing = 3 * s + Math.cos(gameTick * 0.1) * 1.5 * s;
                leftArmYOff = -5 * s;
                rightArmYOff = -5 * s;
            } else if (actionId.startsWith('write') || actionId === 'grind_ink' || actionId.startsWith('paint') || actionId.startsWith('read')) {
                // One arm extended (writing/reading)
                leftArmSwing = 5 * s + Math.sin(gameTick * 0.06) * 0.5 * s;
                rightArmSwing = -1 * s;
                leftArmYOff = -6 * s;
            } else if (actionId === 'fish_catch') {
                // Arm extended to side (holding rod)
                rightArmSwing = -6 * s;
                rightArmYOff = -6 * s;
            } else if (actionId.startsWith('eat') || actionId.startsWith('drink')) {
                // One arm raised to mouth
                leftArmSwing = 3 * s;
                leftArmYOff = -8 * s + Math.sin(gameTick * 0.08) * s;
            } else if (actionId === 'cut_bamboo') {
                // Chopping motion
                rightArmSwing = -4 * s;
                rightArmYOff = -4 * s + Math.sin(gameTick * 0.2) * 3 * s;
            }
        } else if (isSleeping) {
            leftArmSwing = 0;
            rightArmSwing = 0;
            leftArmYOff = 0;
            rightArmYOff = 0;
        }

        // Left arm
        ctx.save();
        ctx.translate(leanX + Math.cos(facing + 1.5) * 9*s, leanY + Math.sin(facing + 1.5) * 9*s);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * leftArmSwing, Math.sin(facing) * leftArmSwing + leftArmYOff, sleeveW, sleeveH, facing + 0.3, 0, Math.PI*2);
        ctx.fillStyle = cloth;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.4*s;
        ctx.stroke();
        // Hand
        ctx.beginPath();
        ctx.arc(Math.cos(facing) * (leftArmSwing + 2*s), Math.sin(facing) * (leftArmSwing + 2*s) + leftArmYOff, 2*s, 0, Math.PI*2);
        ctx.fillStyle = skin;
        ctx.fill();
        ctx.restore();
        // Right arm
        ctx.save();
        ctx.translate(leanX + Math.cos(facing - 1.5) * 9*s, leanY + Math.sin(facing - 1.5) * 9*s);
        ctx.beginPath();
        ctx.ellipse(Math.cos(facing) * rightArmSwing, Math.sin(facing) * rightArmSwing + rightArmYOff, sleeveW, sleeveH, facing - 0.3, 0, Math.PI*2);
        ctx.fillStyle = cloth;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.4*s;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(Math.cos(facing) * (rightArmSwing + 2*s), Math.sin(facing) * (rightArmSwing + 2*s) + rightArmYOff, 2*s, 0, Math.PI*2);
        ctx.fillStyle = skin;
        ctx.fill();
        ctx.restore();

        // Head — with breathing bob and walk bob
        const headX = leanX + Math.cos(facing) * 3 * s;
        const headY = leanY + Math.sin(facing) * 3 * s - 12 * s - headBob;
        ctx.beginPath();
        ctx.arc(headX, headY, 6*s, 0, Math.PI*2);
        ctx.fillStyle = skin;
        ctx.fill();
        ctx.strokeStyle = '#1a1a10';
        ctx.lineWidth = 0.5*s;
        ctx.stroke();

        // Hair
        ctx.save();
        ctx.translate(headX, headY);
        ctx.fillStyle = '#1a1a1a';
        if (isLearner) {
            // German traveler: shorter hair, no topknot, maybe a cap
            ctx.beginPath();
            ctx.arc(0, -2*s, 6.5*s, Math.PI, 0);
            ctx.fill();
            // Simple cap/hat brim
            ctx.fillStyle = '#5a4030';
            ctx.beginPath();
            ctx.ellipse(0, -4*s, 8*s, 2*s, 0, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle = '#6a5040';
            ctx.beginPath();
            ctx.arc(0, -5*s, 5*s, Math.PI, 0);
            ctx.fill();
        } else {
            // Japanese: black hair
            ctx.beginPath();
            ctx.arc(0, -2*s, 6.5*s, Math.PI, 0);
            ctx.fill();
            // Topknot (small bun on top)
            ctx.beginPath();
            ctx.arc(0, -8*s, 3*s, 0, Math.PI*2);
            ctx.fill();
            // Topknot pin (small line through bun)
            ctx.strokeStyle = '#8a7060';
            ctx.lineWidth = 0.8*s;
            ctx.beginPath();
            ctx.moveTo(-4*s, -8*s);
            ctx.lineTo(4*s, -8*s);
            ctx.stroke();
        }
        ctx.restore();

        // Eyes — with blinking
        const eyeDist = 2.5 * s;
        const eyeFwd = 3 * s;
        const lEx = headX + Math.cos(facing) * eyeFwd + Math.cos(facing + 1.3) * eyeDist;
        const lEy = headY + Math.sin(facing) * eyeFwd + Math.sin(facing + 1.3) * eyeDist;
        const rEx = headX + Math.cos(facing) * eyeFwd + Math.cos(facing - 1.3) * eyeDist;
        const rEy = headY + Math.sin(facing) * eyeFwd + Math.sin(facing - 1.3) * eyeDist;
        ctx.fillStyle = '#1a1a10';
        // Blink cycle: deterministic per-character, blinks for 3 ticks every ~150 ticks
        const blinkSeed = (person.name.charCodeAt(0) || 65) * 137;
        const blinkCycle = (gameTick * 0.5 + blinkSeed) % 150;
        const isBlinking = blinkCycle < 3 || isSleeping;
        if (isBlinking) {
            // Closed eyes — horizontal lines
            ctx.strokeStyle = '#1a1a10';
            ctx.lineWidth = 1.2 * s;
            ctx.beginPath();
            ctx.moveTo(lEx - 1.2*s, lEy); ctx.lineTo(lEx + 1.2*s, lEy);
            ctx.moveTo(rEx - 1.2*s, rEy); ctx.lineTo(rEx + 1.2*s, rEy);
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.arc(lEx, lEy, 1.2*s, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(rEx, rEy, 1.2*s, 0, Math.PI*2);
            ctx.fill();
        }

        // Sleeping indicator
        if (isSleeping) {
            const zt = gameTick * 0.04;
            ctx.font = `bold ${Math.round(12*s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
            ctx.fillStyle = `rgba(150,180,220,${0.5+Math.sin(zt)*0.3})`;
            ctx.textAlign = 'center';
            ctx.fillText('z Z', 14*s, (-24 + Math.sin(zt)*4)*s);
        }

        // Acting indicator
        if (isActing) {
            const at = gameTick * 0.08;
            const sparkX = Math.cos(at) * 12 * s;
            const sparkY = Math.sin(at * 1.3) * 8 * s - 6 * s;
            ctx.beginPath();
            ctx.arc(sparkX, sparkY, 1.5*s, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,220,100,0.6)';
            ctx.fill();
        }

        // Mood indicator (small symbol above head)
        if (!isSleeping && person.mood) {
            const moodY = -32 * s;
            const bobY = Math.sin(gameTick * 0.03) * 1.5 * s;
            ctx.font = `${Math.round(10*s)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.globalAlpha = 0.7;
            let sym = '';
            switch (person.mood) {
                case 'happy':    sym = '\u2665'; ctx.fillStyle = '#ff8888'; break; // ♥
                case 'content':  sym = '\u266A'; ctx.fillStyle = '#aaddaa'; break; // ♪
                case 'cold':     sym = '\u2744'; ctx.fillStyle = '#88ccff'; break; // ❄
                case 'tired':    sym = '\u00B7\u00B7'; ctx.fillStyle = '#aaaacc'; break; // ··
                case 'surprised':sym = '!';      ctx.fillStyle = '#ffdd66'; break;
            }
            if (sym) ctx.fillText(sym, 0, moodY + bobY);
            ctx.globalAlpha = 1;
        }

        ctx.restore();

        // Name label
        ctx.font = `bold ${Math.round(10*s)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
        ctx.fillStyle = '#e0d8c0';
        ctx.textAlign = 'center';
        ctx.fillText(person.name, x, y + 20*s);
    }

    //  AI - SPEAKER (Person 1)

    function findClosestObject(type) {
        let best = null, bestDist = Infinity;
        for (const obj of worldObjects) {
            if (obj.type === type) {
                const d = persons[0].distTo(obj.x, obj.y);
                if (d < bestDist) { bestDist = d; best = obj; }
            }
        }
        return best;
    }

    // Spaced repetition: pick from candidates weighted by recency (recent = less likely)
    function spacedPick(candidates, history, curiosity) {
        if (candidates.length === 0) return null;
        if (candidates.length === 1) return candidates[0];

        // Score each candidate: the more recently used, the lower the weight
        const weights = candidates.map(c => {
            const idx = history.indexOf(c.id);
            // Curiosity boosts novelty: curious characters strongly prefer new actions
            const noveltyBonus = 6 + (curiosity || 5) * 0.8;
            if (idx === -1) return noveltyBonus; // never done = highest weight
            // idx 0 = most recent => weight 1, idx 11 => weight ~8
            return 1 + idx * 0.7;
        });

        const total = weights.reduce((s, w) => s + w, 0);
        let r = Math.random() * total;
        for (let i = 0; i < candidates.length; i++) {
            r -= weights[i];
            if (r <= 0) return candidates[i];
        }
        return candidates[candidates.length - 1];
    }

    function chooseSpeakerAction() {
        const p = persons[0];
        let candidates = [];
        let isNeedAction = false;

        // Critical needs
        if (p.hunger < 30) {
            candidates = ACTION_DEFS.filter(a => a.needCheck === 'hunger');
            isNeedAction = true;
        } else if (p.thirst < 30) {
            candidates = ACTION_DEFS.filter(a => a.needCheck === 'thirst');
            isNeedAction = true;
        } else if (p.energy < 20) {
            candidates = ACTION_DEFS.filter(a => a.needCheck === 'energy');
            isNeedAction = true;
        }

        if (candidates.length === 0) {
            const indoorTargets = ['house', 'teahouse', 'kitchen', 'workshop'];
            const isHarshWeather = (currentWeather === 'rain' || currentWeather === 'snow') && weatherIntensity > 0.4;
            const r = Math.random();

            // In harsh weather, prefer indoor/sheltered activities
            if (isHarshWeather && r < 0.6) {
                candidates = ACTION_DEFS.filter(a =>
                    a.priority !== 'need' && indoorTargets.includes(a.target)
                );
            }

            if (candidates.length === 0) {
                // Sociability shifts the thresholds: social speakers do more social actions
                const socialThreshold = 0.85 - p.socialWeight * 0.12; // high geselligkeit → lower threshold → more social
                const productiveThreshold = socialThreshold - 0.15;

                if (r < productiveThreshold) {
                    candidates = ACTION_DEFS.filter(a => a.priority === 'productive');
                } else if (r < socialThreshold) {
                    candidates = ACTION_DEFS.filter(a => a.priority === 'social');
                } else {
                    candidates = ACTION_DEFS.filter(a => a.priority === 'idle');
                }
            }
        }

        if (candidates.length === 0) candidates = ACTION_DEFS.filter(a => a.priority === 'productive');
        if (candidates.length === 0) candidates = ACTION_DEFS.slice(); // ultimate fallback: any action

        // Use spaced repetition: prefer actions not done recently
        // Curiosity boosts weight for never-done actions (more variety)
        const chosen = spacedPick(candidates, p.actionHistory, p.neugier);

        // Track in history
        if (chosen) {
            // Remove if already in history, then add to front
            const existIdx = p.actionHistory.indexOf(chosen.id);
            if (existIdx !== -1) p.actionHistory.splice(existIdx, 1);
            p.actionHistory.unshift(chosen.id);
            // Trim to max
            if (p.actionHistory.length > p.actionHistoryMax) {
                p.actionHistory.length = p.actionHistoryMax;
            }
        }

        return chosen;
    }

    function buildSentence(action) {
        const template = randEl(action.templates);
        const words = template.map(conceptId => ({
            conceptId,
            kanji: vocab[conceptId] ? vocab[conceptId].kanji : conceptId,
            kana: vocab[conceptId] ? vocab[conceptId].kana : conceptId,
            de: vocab[conceptId] ? vocab[conceptId].de : conceptId,
            type: vocab[conceptId] ? vocab[conceptId].type : 'unknown',
            role: vocab[conceptId] ? vocab[conceptId].type : 'unknown'
        }));
        // Apply grammar transforms based on progression tier
        const tier = getGrammarTier();
        const enhanced = applyGrammar(words, tier, action);
        // Determine punctuation based on sentence-final particle
        const lastId = enhanced.length > 0 ? enhanced[enhanced.length - 1].conceptId : '';
        const punct = (lastId === 'ka_q') ? '?'
                     : (lastId === 'yo_emph' || lastId === 'ne_confirm') ? '' : '!';
        const kanjiText = enhanced.map(w => w.kanji).join('') + punct;
        const kanaText = enhanced.map(w => w.kana).join(' ') + punct;
        const text = kanjiText;
        return { words: enhanced, text, kanjiText, kanaText };
    }

    function speakerSpeak(action) {
        const sentence = buildSentence(action);
        const bubble = new SpeechBubble(persons[0], sentence.kanjiText, sentence.words, false);
        bubble.kanjiText = sentence.kanjiText;
        bubble.kanaText = sentence.kanaText;
        speechBubbles.push(bubble);
        sfx('speak');
        addLog(`${persons[0].name}: "${sentence.kanjiText}" (${sentence.kanaText})`, 'speak');

        // Learner tries to learn (perception determines hearing range)
        const learner = persons[1];
        const dist = learner.distTo(persons[0].x, persons[0].y);
        if (dist <= learner.hearingRange) {
            learnerRespond(sentence, action);
        } else {
            // Too far away, no response
        }
    }

    // Map pronoun concept → German conjugation key
    const DE_PRONOUN_CONJ = {
        'me': 'ich', 'you': 'du', 'he': 'er', 'she': 'er', 'we': 'wir', 'they': 'sie',
    };

    // Map pronoun concept → German subject form
    const DE_PRONOUN_SUBJ = {
        'me': 'Ich', 'you': 'Du', 'he': 'Er', 'she': 'Sie', 'we': 'Wir', 'they': 'Sie',
    };

    // Noun articles (simplified — all accusative for objects)
    const DE_NOUN_ARTICLE = {
        // Common nouns with articles: concept → [nom, akk]
        'food': ['das','das'], 'tea': ['der','den'], 'water': ['das','das'],
        'rice': ['der','den'], 'fish': ['der','den'], 'book': ['das','das'],
        'brush': ['der','den'], 'ink': ['die','die'], 'paper': ['das','das'],
        'picture': ['das','das'], 'mountain': ['der','den'], 'river': ['der','den'],
        'bridge': ['die','die'], 'house': ['das','das'], 'home': ['das','das'],
        'fire': ['das','das'], 'pot': ['der','den'], 'silk': ['die','die'],
        'stone': ['der','den'], 'flower': ['die','die'], 'tree': ['der','den'],
        'bird': ['der','den'], 'cat': ['die','die'], 'horse': ['das','das'],
        'bed': ['das','das'], 'door': ['die','die'], 'garden': ['der','den'],
        'wine': ['der','den'], 'soup': ['die','die'], 'moon': ['der','den'],
        'star': ['der','den'], 'rain': ['der','den'], 'wind': ['der','den'],
        'snow': ['der','den'], 'bamboo': ['der','den'], 'song': ['das','das'],
    };

    // Japanese particle → German effect
    const DE_PARTICLE_EFFECT = {
        'wa_topic': null,       // topic marker, no German effect
        'ga_subj': null,        // subject marker
        'wo_obj': null,         // object marker
        'ni_loc': null,         // dative/location
        'de_means': null,       // instrument/location
        'ka_q': 'question',     // → question mark
        'yo_emph': 'exclaim',   // → !
        'ne_confirm': 'exclaim', // → !
        'mashita': 'past',      // → past tense
        'masen': 'neg',         // → negation
    };

    function conjugateVerb(infinitive, pronoun) {
        const key = pronoun || 'er';
        // Try exact match
        const conj = DE_VERB_CONJ[infinitive];
        if (conj && conj[key]) return conj[key];
        // Regular conjugation fallback
        let stem = infinitive;
        if (stem.endsWith('en')) stem = stem.slice(0, -2);
        else if (stem.endsWith('n')) stem = stem.slice(0, -1);
        switch (key) {
            case 'ich': return stem + 'e';
            case 'du': return stem + (stem.endsWith('t') || stem.endsWith('d') ? 'est' : 'st');
            case 'er': return stem + (stem.endsWith('t') || stem.endsWith('d') ? 'et' : 't');
            case 'wir': case 'sie': return infinitive;
            default: return stem + 't';
        }
    }

    function buildGermanResponse(words, learner) {
        if (!words || words.length === 0) return { text: '...', anyKnown: false };

        // Collect known content words and detect particles
        const parts = [];
        let subject = null, verb = null, objects = [], modifiers = [];
        let effects = new Set();
        let anyKnown = false;
        let allKnown = true;

        for (const w of words) {
            if (w.type === 'particle') {
                const eff = DE_PARTICLE_EFFECT[w.conceptId];
                if (eff) effects.add(eff);
                continue;
            }
            const known = learner.knownWords.has(w.conceptId);
            if (!known) { allKnown = false; parts.push({ w, known: false }); continue; }
            anyKnown = true;
            parts.push({ w, known: true });

            if (w.type === 'pronoun' && !subject) subject = w;
            else if (w.type === 'verb' && !verb) verb = w;
            else if (w.type === 'noun') objects.push(w);
            else if (w.type === 'mod') modifiers.push(w);
        }

        if (!anyKnown) return { text: '...', anyKnown: false };

        // Build German sentence
        const tokens = [];
        const conjKey = subject ? (DE_PRONOUN_CONJ[subject.conceptId] || 'er') : 'er';

        // Suggestion pattern: 吧 → "Lass uns..."
        if (effects.has('suggest') && verb) {
            tokens.push('Lass uns');
            tokens.push(verb.de); // infinitive
            for (const o of objects) tokens.push(o.de);
            for (const m of modifiers) tokens.push(m.de);
        } else {
            // Subject
            if (subject) {
                tokens.push(DE_PRONOUN_SUBJ[subject.conceptId] || subject.de);
            }

            // Progressive: "gerade"
            if (effects.has('prog') && verb) tokens.push('gerade');

            // Verb (conjugated)
            if (verb) {
                let verbForm;
                if (effects.has('past') || effects.has('neg_past')) {
                    // Simple past → "habe gegessen" is complex; use present for simplicity
                    // but prepend "habe" for perfekt feel
                    if (subject) {
                        const haben = conjugateVerb('haben', conjKey);
                        tokens.push(haben);
                    }
                    // Past participle approximation: ge + stem + t
                    let pp = verb.de;
                    if (DE_VERB_CONJ[verb.de]) {
                        // Use a simple ge-...-t form
                        let stem = verb.de;
                        if (stem.endsWith('en')) stem = stem.slice(0, -2);
                        else if (stem.endsWith('n')) stem = stem.slice(0, -1);
                        pp = 'ge' + stem + 't';
                        // Irregular: common overrides
                        const ppMap = {
                            'essen':'gegessen','trinken':'getrunken','schlafen':'geschlafen',
                            'schreiben':'geschrieben','lesen':'gelesen','sehen':'gesehen',
                            'finden':'gefunden','kommen':'gekommen','gehen':'gegangen',
                            'helfen':'geholfen','geben':'gegeben','stehen':'gestanden',
                            'sitzen':'gesessen',
                        };
                        if (ppMap[verb.de]) pp = ppMap[verb.de];
                    }
                    // Negation
                    if (effects.has('neg_past')) tokens.push('nicht');
                    // Objects before participle in German
                    for (const o of objects) {
                        const art = DE_NOUN_ARTICLE[o.conceptId];
                        if (art) tokens.push(art[1]); // accusative
                        tokens.push(o.de);
                    }
                    for (const m of modifiers) tokens.push(m.de);
                    tokens.push(pp);
                    objects = []; modifiers = []; // consumed
                } else if (effects.has('exp')) {
                    // Experience: "schon einmal gegessen"
                    verbForm = conjugateVerb(verb.de, conjKey);
                    tokens.push('schon einmal');
                    tokens.push(verbForm);
                } else {
                    verbForm = conjugateVerb(verb.de, conjKey);
                    tokens.push(verbForm);
                }
            }

            // Remaining objects with articles
            for (const o of objects) {
                const art = DE_NOUN_ARTICLE[o.conceptId];
                if (art) tokens.push(art[1]); // accusative
                tokens.push(o.de);
            }

            // Modifiers
            for (const m of modifiers) tokens.push(m.de);

            // Unknown placeholders
            for (const p of parts) {
                if (!p.known && p.w.type !== 'particle') tokens.push('...');
            }
        }

        let text = tokens.join(' ');
        if (!text.trim() || text.trim() === '...') return { text: '...', anyKnown: false };

        // Punctuation
        if (effects.has('question')) text += '?';
        else if (allKnown) text += '!';

        return { text, anyKnown };
    }

    function learnerRespond(sentence, action) {
        const learner = persons[1];
        const speaker = persons[0];

        // Try to learn each word (in hearing range = can also observe)
        for (const w of sentence.words) {
            if (!learner.knownWords.has(w.conceptId)) {
                if (Math.random() < learner.learnChance) {
                    learnWord(learner, w);
                }
            }
        }

        // Build response — German translation with grammar
        setTimeout(() => {
            const result = buildGermanResponse(sentence.words, learner);
            const anyKnown = result.anyKnown;
            const responseText = result.text;

            const bubble = new SpeechBubble(learner, responseText, [], true);
            speechBubbles.push(bubble);
            if (responseText !== '...') {
                sfx('respond');
                addLog(`${learner.name}: "${responseText}"`, 'speak');
            }
        }, 600 / Math.max(1, gameSpeed));
    }

    function canStartStorytelling() {
        if (storytelling.active) return false;
        if (storytelling.cooldownDay >= gameDay) return false;
        if (gameHour < 20 && gameHour >= 4) return false;
        const speaker = persons[0];
        if (speaker.state !== 'idle') return false;
        if (speaker.actionHistory.length < 3) return false;
        const fire = cachedTeahouse;
        if (!fire) return false;
        if (speaker.distTo(fire.x, fire.y) > 80) return false;
        return true;
    }

    function startStorytelling() {
        const speaker = persons[0];
        storytelling.active = true;
        storytelling.currentIdx = 0;
        storytelling.timer = 0;
        storytelling.cooldownDay = gameDay;

        // Build story from 3-5 recent actions
        const storyLen = Math.min(speaker.actionHistory.length, randInt(3, 5));
        const storyActions = speaker.actionHistory.slice(0, storyLen);
        storytelling.sentences = [];

        for (const actionId of storyActions) {
            const actionDef = ACTION_DEFS.find(a => a.id === actionId);
            if (actionDef && actionDef.templates && actionDef.templates.length > 0) {
                const template = randEl(actionDef.templates);
                const baseWords = template.map(conceptId => ({
                    conceptId,
                    kanji: vocab[conceptId] ? vocab[conceptId].kanji : conceptId,
                    kana: vocab[conceptId] ? vocab[conceptId].kana : conceptId,
                    de: vocab[conceptId] ? vocab[conceptId].de : conceptId,
                    type: vocab[conceptId] ? vocab[conceptId].type : 'unknown',
                    role: vocab[conceptId] ? vocab[conceptId].type : 'unknown'
                }));
                const words = applyGrammar(baseWords, getGrammarTier(), actionDef);
                const lastId = words.length > 0 ? words[words.length - 1].conceptId : '';
                const sPunct = (lastId === 'ka_q') ? '?'
                             : (lastId === 'yo_emph' || lastId === 'ne_confirm') ? '' : '。';
                const kanjiText = words.map(w => w.kanji).join('') + sPunct;
                const kanaText = words.map(w => w.kana).join(' ') + (sPunct === '?' ? '?' : '.');
                storytelling.sentences.push({ text: kanjiText, kanjiText, kanaText, words });
            }
        }

        if (storytelling.sentences.length === 0) {
            storytelling.active = false;
            return;
        }

        addLog(`${speaker.name} beginnt eine Geschichte am Feuer...`, 'speak');

        // Make nearby NPCs face the teahouse
        const fire = cachedTeahouse;
        if (fire) {
            for (const npc of npcs) {
                if (npc.distTo(fire.x, fire.y) < 100) {
                    npc.facing = Math.atan2(fire.y - npc.y, fire.x - npc.x);
                    if (npc.state === 'idle') {
                        npc.state = 'moving';
                        setTargetWithPath(npc, Math.max(40, Math.min(WORLD_W - 40, fire.x + randFloat(-30, 30))), Math.max(40, Math.min(WORLD_H - 40, fire.y + randFloat(-30, 30))));
                    }
                }
            }
        }
    }

    function updateStorytelling(dt) {
        if (!storytelling.active) return;

        storytelling.timer -= dt;
        if (storytelling.timer > 0) return;

        const speaker = persons[0];

        if (storytelling.currentIdx < storytelling.sentences.length) {
            const sentence = storytelling.sentences[storytelling.currentIdx];
            const stBubble = new SpeechBubble(speaker, sentence.kanjiText || sentence.text, sentence.words, false);
            stBubble.kanjiText = sentence.kanjiText || sentence.text;
            stBubble.kanaText = sentence.kanaText || '';
            speechBubbles.push(stBubble);
            sfx('speak');
            addLog(`${speaker.name}: "${sentence.kanjiText || sentence.text}"`, 'speak');

            // Learner tries to learn from story
            const learner = persons[1];
            if (learner.distTo(speaker.x, speaker.y) <= learner.hearingRange) {
                for (const w of sentence.words) {
                    if (!learner.knownWords.has(w.conceptId) && vocab[w.conceptId]) {
                        if (Math.random() < learner.learnChance) {
                            learnWord(learner, w);
                        }
                    }
                }
            }

            storytelling.currentIdx++;
            storytelling.timer = randFloat(100, 180);
        } else {
            // Story ended — learner retells
            storytelling.active = false;
            learnerRetellStory();
        }
    }

    function learnerRetellStory() {
        const learner = persons[1];
        const speaker = persons[0];
        if (learner.distTo(speaker.x, speaker.y) > learner.hearingRange) return;

        // Pick 2-3 random sentences from the story and retell using known words
        const retellCount = Math.min(storytelling.sentences.length, randInt(1, 2));
        const retellIdxs = [];
        while (retellIdxs.length < retellCount && retellIdxs.length < storytelling.sentences.length) {
            const idx = randInt(0, storytelling.sentences.length - 1);
            if (!retellIdxs.includes(idx)) retellIdxs.push(idx);
        }

        setTimeout(() => {
            for (const idx of retellIdxs) {
                const sentence = storytelling.sentences[idx];
                const rr = buildGermanResponse(sentence.words, learner);
                const responseText = rr.text;
                if (responseText.replace(/\.\.\./g, '').trim().length > 0) {
                    speechBubbles.push(new SpeechBubble(learner, responseText, [], true));
                    sfx('respond');
                    addLog(`${learner.name}: "${responseText}" (Nacherzählung)`, 'speak');
                }
            }
            // Boost relationship from shared storytelling
            boostRelationshipsNearby(speaker, 5);
        }, 800 / Math.max(1, gameSpeed));
    }

    function spawnDiscovery() {
        const available = DISCOVERY_TYPES.filter(d => !discoveredTypes.has(d.type));
        if (available.length === 0) return;
        const disc = randEl(available);
        const x = randFloat(60, WORLD_W - 60);
        const y = randFloat(60, WORLD_H - 60);
        discoveries.push({ ...disc, x, y, found: false });
        addLog('Etwas Ungewöhnliches ist aufgetaucht...', 'speak');
    }

    function updateDiscoveries(dt) {
        // Spawn timer (every 3-8 game days worth of ticks)
        discoveryTimer -= dt;
        if (discoveryTimer <= 0) {
            discoveryTimer = randFloat(8000, 22000); // roughly 3-8 game days
            spawnDiscovery();
        }

        // Speaker notices nearby undiscovered objects
        if (persons.length === 0) return;
        const speaker = persons[0];
        if (speaker.state !== 'idle' || storytelling.active) return;

        for (const disc of discoveries) {
            if (disc.found) continue;
            const d = speaker.distTo(disc.x, disc.y);
            const noticeRange = 40 + speaker.neugier * 6;
            if (d < noticeRange) {
                investigateDiscovery(disc);
                break;
            }
            // High curiosity speakers move toward discoveries
            if (d < noticeRange * 2 && speaker.neugier >= 6 && Math.random() < 0.001 * dt) {
                speaker.state = 'moving';
                speaker.currentAction = { id: 'investigate', duration: 200, templates: [['look','this','here']], effects: {}, activityDe: 'Untersucht etwas...', priority: 'idle' };
                speaker.targetX = disc.x + randFloat(-10, 10);
                speaker.targetY = disc.y + randFloat(-10, 10);
                speaker.activityDe = 'Untersucht etwas...';
                break;
            }
        }
    }

    function investigateDiscovery(disc) {
        disc.found = true;
        discoveredTypes.add(disc.type);
        const speaker = persons[0];

        // Speak about discovery
        const template = randEl(disc.speech);
        const words = template.map(conceptId => ({
            conceptId,
            kanji: vocab[conceptId] ? vocab[conceptId].kanji : conceptId,
            kana: vocab[conceptId] ? vocab[conceptId].kana : conceptId,
            de: vocab[conceptId] ? vocab[conceptId].de : conceptId,
            type: vocab[conceptId] ? vocab[conceptId].type : 'unknown',
            role: vocab[conceptId] ? vocab[conceptId].type : 'unknown'
        })).filter(w => vocab[w.conceptId]);

        if (words.length > 0) {
            const kanjiText = words.map(w => w.kanji).join('') + '!';
            const kanaText = words.map(w => w.kana).join(' ') + '!';
            const discBubble = new SpeechBubble(speaker, kanjiText, words, false);
            discBubble.kanjiText = kanjiText;
            discBubble.kanaText = kanaText;
            speechBubbles.push(discBubble);
            sfx('speak');
            addLog(`${speaker.name} entdeckt ${disc.desc}: "${kanjiText}"`, 'speak');

            // Learner can learn
            const learner = persons[1];
            if (learner.distTo(speaker.x, speaker.y) <= learner.hearingRange) {
                for (const w of words) {
                    if (!learner.knownWords.has(w.conceptId)) {
                        if (Math.random() < learner.learnChance * 1.3) {
                            learnWord(learner, w);
                        }
                    }
                }
            }
        }

        // Remove after a short delay
        setTimeout(() => {
            discoveries = discoveries.filter(d => d !== disc);
        }, 3000 / Math.max(1, gameSpeed));
    }

    function drawDiscoveries(ctx) {
        for (const disc of discoveries) drawDiscovery(ctx, disc);
    }
    function drawDiscovery(ctx, disc) {
        {
            if (disc.found) return;
            const x = disc.x * canvasScale;
            const y = disc.y * canvasScale;
            const s = canvasScale;
            const t = gameTick * 0.03;

            // Subtle golden glow
            ctx.save();
            ctx.globalAlpha = 0.3 + Math.sin(t) * 0.15;
            ctx.beginPath();
            ctx.arc(x, y, 12*s, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(212,160,48,0.15)';
            ctx.fill();
            ctx.globalAlpha = 1;

            switch (disc.type) {
                case 'ancient_scroll':
                    // Rolled scroll
                    ctx.fillStyle = '#d8c898';
                    ctx.fillRect(x - 8*s, y - 2*s, 16*s, 4*s);
                    // Roll ends
                    ctx.fillStyle = '#c8b080';
                    ctx.beginPath();
                    ctx.ellipse(x - 8*s, y, 1.5*s, 2.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(x + 8*s, y, 1.5*s, 2.5*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Red seal stamp
                    ctx.fillStyle = '#cc3030';
                    ctx.fillRect(x + 2*s, y - 1*s, 3*s, 2*s);
                    // Faint ink characters
                    ctx.fillStyle = 'rgba(30,30,30,0.3)';
                    ctx.fillRect(x - 5*s, y - 0.5*s, 1*s, 1*s);
                    ctx.fillRect(x - 2*s, y - 0.5*s, 1*s, 1*s);
                    break;
                case 'jade_stone':
                    // Polished jade piece (green)
                    ctx.fillStyle = '#5aaa5a';
                    ctx.globalAlpha = 0.85 + Math.sin(t * 2) * 0.15;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 6*s);
                    ctx.lineTo(x + 5*s, y - 2*s);
                    ctx.lineTo(x + 4*s, y + 4*s);
                    ctx.lineTo(x - 4*s, y + 4*s);
                    ctx.lineTo(x - 5*s, y - 2*s);
                    ctx.closePath();
                    ctx.fill();
                    // Shine highlight
                    ctx.fillStyle = 'rgba(180,240,180,0.4)';
                    ctx.beginPath();
                    ctx.ellipse(x - 1*s, y - 1*s, 2*s, 1.5*s, -0.3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    break;
                case 'old_coins':
                    // Japanese coins
                    ctx.fillStyle = '#b0a060';
                    for (let i = 0; i < 4; i++) {
                        const cx = x + (i - 1.5) * 4*s;
                        const cy = y + Math.sin(i * 1.5) * 2*s;
                        ctx.beginPath();
                        ctx.arc(cx, cy, 3*s, 0, Math.PI*2);
                        ctx.fill();
                        // Square hole
                        ctx.fillStyle = '#6a5a30';
                        ctx.fillRect(cx - 1*s, cy - 1*s, 2*s, 2*s);
                        ctx.fillStyle = '#b0a060';
                    }
                    break;
                case 'carved_seal':
                    // Stone seal / chop
                    ctx.fillStyle = '#8a6a4a';
                    ctx.fillRect(x - 3*s, y - 5*s, 6*s, 10*s);
                    // Carved top
                    ctx.fillStyle = '#9a7a5a';
                    ctx.beginPath();
                    ctx.arc(x, y - 5*s, 3*s, Math.PI, 0);
                    ctx.fill();
                    // Red ink on bottom
                    ctx.fillStyle = '#cc3030';
                    ctx.fillRect(x - 2.5*s, y + 3*s, 5*s, 2*s);
                    break;
                case 'pottery_shards':
                    // Broken pottery pieces
                    ctx.fillStyle = '#b08050';
                    ctx.beginPath();
                    ctx.moveTo(x - 4*s, y - 3*s);
                    ctx.lineTo(x + 2*s, y - 4*s);
                    ctx.lineTo(x + 4*s, y + 1*s);
                    ctx.lineTo(x - 1*s, y + 3*s);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#a07040';
                    ctx.beginPath();
                    ctx.moveTo(x + 3*s, y - 1*s);
                    ctx.lineTo(x + 7*s, y - 2*s);
                    ctx.lineTo(x + 6*s, y + 3*s);
                    ctx.lineTo(x + 2*s, y + 2*s);
                    ctx.closePath();
                    ctx.fill();
                    // Blue glaze fragments
                    ctx.strokeStyle = '#4060a0';
                    ctx.lineWidth = 0.5*s;
                    ctx.beginPath();
                    ctx.arc(x, y - 1*s, 2*s, 0.5, 2.5);
                    ctx.stroke();
                    break;
                case 'flower_arrangement':
                    // Vase with flowers
                    ctx.fillStyle = '#c0a060';
                    ctx.beginPath();
                    ctx.ellipse(x, y + 3*s, 3*s, 4*s, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillRect(x - 2*s, y - 1*s, 4*s, 2*s);
                    // Stems
                    ctx.strokeStyle = '#3a7a2a';
                    ctx.lineWidth = 0.8*s;
                    ctx.beginPath();
                    ctx.moveTo(x - 1*s, y - 1*s); ctx.lineTo(x - 3*s, y - 8*s);
                    ctx.moveTo(x, y - 1*s); ctx.lineTo(x + 1*s, y - 10*s);
                    ctx.moveTo(x + 1*s, y - 1*s); ctx.lineTo(x + 4*s, y - 7*s);
                    ctx.stroke();
                    // Flower heads
                    const discFlowerColors = ['#e06080', '#e0a040', '#d060d0'];
                    for (let i = 0; i < 3; i++) {
                        const fx = [x - 3*s, x + 1*s, x + 4*s][i];
                        const fy = [y - 8*s, y - 10*s, y - 7*s][i];
                        ctx.fillStyle = discFlowerColors[i];
                        ctx.beginPath();
                        ctx.arc(fx, fy, 2*s, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#e0d030';
                        ctx.beginPath();
                        ctx.arc(fx, fy, 0.8*s, 0, Math.PI*2);
                        ctx.fill();
                    }
                    break;
            }
            ctx.restore();
        }
    }

    function updateSpeakerAI(dt) {
        const p = persons[0];

        switch (p.state) {
            case 'idle':
                p.idleTimer -= dt;
                p.activityDe = 'Untätig';
                // Check storytelling trigger
                if (!storytelling.active && p.idleTimer <= 0 && canStartStorytelling()) {
                    startStorytelling();
                    p.idleTimer = 200; // wait during storytelling
                    p.activityDe = 'Erzählt eine Geschichte';
                    break;
                }
                if (storytelling.active) {
                    p.activityDe = 'Erzählt eine Geschichte';
                    break;
                }
                if (p.idleTimer <= 0) {
                    // Choose next action
                    const action = chooseSpeakerAction();
                    p.currentAction = action;
                    p.state = 'moving';
                    p.activityDe = 'Geht zu ' + (action.activityDe || '...');

                    // Find target
                    let tx, ty;
                    if (action.target) {
                        const obj = findClosestObject(action.target);
                        if (obj) {
                            tx = obj.x + randFloat(-15, 15);
                            ty = obj.y + randFloat(-15, 15);
                        } else {
                            tx = p.x; ty = p.y;
                        }
                    } else if (action.requiresOther) {
                        tx = persons[1].x + randFloat(-20, 20);
                        ty = persons[1].y + randFloat(-20, 20);
                    } else {
                        tx = p.x + randFloat(-60, 60);
                        ty = p.y + randFloat(-40, 40);
                    }
                    // Clamp to world
                    tx = Math.max(30, Math.min(WORLD_W - 30, tx));
                    ty = Math.max(30, Math.min(WORLD_H - 30, ty));
                    setTargetWithPath(p, tx, ty);
                }
                break;

            case 'moving':
                if (p.moveToward(p.targetX, p.targetY, dt)) {
                    if (!p.currentAction) {
                        // Safety: if action was lost, return to idle
                        p.state = 'idle';
                        p.idleTimer = 60;
                        break;
                    }
                    p.state = 'acting';
                    p.actionTimer = p.currentAction.duration / (0.5 + p.geschick * 0.08) + 240; // +4s pause after speaking
                    p.activityDe = p.currentAction.activityDe;
                    sfxForAction(p.currentAction.id);
                    speakerSpeak(p.currentAction);
                    // Trigger contextual object label glow
                    if (p.currentAction.target) {
                        const glowObj = worldObjects.find(o => o.type === p.currentAction.target &&
                            Math.sqrt((o.x - p.x) ** 2 + (o.y - p.y) ** 2) < 80);
                        if (glowObj) activeObjectGlow = { objId: glowObj.id, timer: 180, maxTimer: 180 };
                    }
                }
                break;

            case 'acting':
                p.actionTimer -= dt;
                if (p.actionTimer <= 0) {
                    // Apply effects
                    if (p.currentAction.effects) {
                        if (p.currentAction.effects.hunger) p.hunger = Math.min(100, p.hunger + p.currentAction.effects.hunger);
                        if (p.currentAction.effects.thirst) p.thirst = Math.min(100, p.thirst + p.currentAction.effects.thirst);
                        if (p.currentAction.effects.energy) p.energy = Math.min(100, p.energy + p.currentAction.effects.energy);
                    }
                    // Track camp progress
                    if (p.currentAction.id) {
                        campProgress[p.currentAction.id] = (campProgress[p.currentAction.id] || 0) + 1;
                        checkCampMilestones();
                        // Boost relationships with nearby characters
                        boostRelationshipsNearby(p, 3);
                    }
                    p.state = 'idle';
                    p.idleTimer = randInt(40, 140) / (0.5 + p.geschick * 0.05);
                    p.currentAction = null;
                }
                break;
        }
    }

    function updateLearnerAI(dt) {
        const learner = persons[1];
        const speaker = persons[0];
        const distToSpeaker = learner.distTo(speaker.x, speaker.y);

        // --- Freeze (stunned from wrong quiz answer) ---
        if (learnerFreezeTimer > 0) {
            learnerFreezeTimer -= dt;
            learner.activityDe = 'Verwirrt...';
            return; // Skip all AI while frozen
        }

        // --- Critical needs override only when idle ---
        if (learner.state === 'idle') {
            let needAction = null;
            if (learner.hunger < 25) {
                const food = findClosestObjectFrom(learner, 'kitchen') || findClosestObjectFrom(learner, 'market');
                if (food) {
                    needAction = { target: food, action: { id: 'eat_self', duration: 120, effects: { hunger: 38 }, activityDe: 'isst' }, label: 'Geht essen' };
                }
            } else if (learner.thirst < 25) {
                const water = findClosestObjectFrom(learner, 'well') || findClosestObjectFrom(learner, 'teahouse');
                if (water) {
                    needAction = { target: water, action: { id: 'drink_self', duration: 80, effects: { thirst: 53 }, activityDe: 'trinkt' }, label: 'Geht trinken' };
                }
            } else if (learner.energy < 15) {
                const house = findClosestObjectFrom(learner, 'house');
                if (house) {
                    needAction = { target: house, action: { id: 'sleep_self', duration: 300, effects: { energy: 45 }, activityDe: 'schlaeft' }, label: 'Geht schlafen' };
                }
            }

            if (needAction) {
                learner.state = 'moving';
                setTargetWithPath(learner, needAction.target.x + randFloat(-10, 10), needAction.target.y + randFloat(-10, 10));
                learner.currentAction = needAction.action;
                learner.activityDe = needAction.label;
                learner.followMode = 'returning'; // will return to speaker after
                return;
            }
        }

        // --- Follow mode management (only when idle) ---
        if (learner.state === 'idle') {
            switch (learner.followMode) {
                case 'following':
                    learner.followTimer -= dt;
                    // Curiosity drives wander probability: curious learners explore more
                    if (learner.followTimer <= 0) {
                        if (Math.random() < learner.wanderChance) {
                            learner.followMode = 'wandering';
                            // Curious learners wander further and longer
                            const wanderRange = 80 + learner.neugier * 8;
                            learner.wanderTimer = randInt(100 + learner.neugier * 15, 300 + learner.neugier * 20);
                            let wtx = Math.max(40, Math.min(WORLD_W - 40, learner.x + randFloat(-wanderRange, wanderRange)));
                            let wty = Math.max(40, Math.min(WORLD_H - 40, learner.y + randFloat(-wanderRange * 0.8, wanderRange * 0.8)));
                            setTargetWithPath(learner, wtx, wty);
                            learner.activityDe = 'Schaut sich um';
                        }
                        // Sociable learners re-check sooner (shorter follow timer)
                        learner.followTimer = randInt(300, 800) / (0.5 + learner.geselligkeit * 0.08);
                    }
                    break;

                case 'wandering':
                    learner.wanderTimer -= dt;
                    // Sociable learners return sooner; hearing range determines awareness of distance
                    const maxWanderDist = learner.hearingRange * (2.0 - learner.geselligkeit * 0.08);
                    if (learner.wanderTimer <= 0 || distToSpeaker > maxWanderDist) {
                        learner.followMode = 'returning';
                        learner.activityDe = 'Kehrt zurück zu ' + speaker.name;
                    }
                    break;

                case 'returning':
                    // Sociable learners come back closer
                    if (distToSpeaker < learner.hearingRange * 0.5) {
                        learner.followMode = 'following';
                        learner.followTimer = randInt(300, 800) / (0.5 + learner.geselligkeit * 0.08);
                    }
                    break;
            }
        }

        // --- Movement and actions ---
        switch (learner.state) {
            case 'idle': {
                if (learner.followMode === 'following' || learner.followMode === 'returning') {
                    learner.activityDe = learner.followMode === 'returning'
                        ? 'Kehrt zurück zu ' + speaker.name
                        : 'Folgt ' + speaker.name;

                    if (distToSpeaker > learner.hearingRange * 0.5) {
                        // Move toward speaker — only recalculate target when speaker moved significantly
                        const angle = Math.atan2(speaker.y - learner.y, speaker.x - learner.x);
                        const followDist = 30 + Math.random() * 25;
                        let ftx = Math.max(30, Math.min(WORLD_W - 30, speaker.x - Math.cos(angle) * followDist));
                        let fty = Math.max(30, Math.min(WORLD_H - 30, speaker.y - Math.sin(angle) * followDist));
                        const targetChanged = Math.abs(ftx - learner.targetX) > 30 || Math.abs(fty - learner.targetY) > 30;
                        if (targetChanged || learner.waypoints.length === 0) {
                            setTargetWithPath(learner, ftx, fty);
                        }
                        learner.moveToward(learner.targetX, learner.targetY, dt);
                        learner.facing = angle;
                    } else if (distToSpeaker > 25) {
                        // Near speaker: wander gently around them
                        if (Math.random() < 0.003 * dt) {
                            let gtx = Math.max(30, Math.min(WORLD_W - 30, speaker.x + randFloat(-45, 45)));
                            let gty = Math.max(30, Math.min(WORLD_H - 30, speaker.y + randFloat(-45, 45)));
                            setTargetWithPath(learner, gtx, gty);
                        }
                        learner.moveToward(learner.targetX, learner.targetY, dt);
                    }
                } else if (learner.followMode === 'wandering') {
                    learner.activityDe = 'Schaut sich um';
                    // Move to wander target, pick new one when reached
                    if (learner.distTo(learner.targetX, learner.targetY) < 10) {
                        let wtx2 = Math.max(40, Math.min(WORLD_W - 40, learner.x + randFloat(-80, 80)));
                        let wty2 = Math.max(40, Math.min(WORLD_H - 40, learner.y + randFloat(-60, 60)));
                        setTargetWithPath(learner, wtx2, wty2);
                    }
                    learner.moveToward(learner.targetX, learner.targetY, dt);
                }
                break;
            }

            case 'moving':
                if (learner.moveToward(learner.targetX, learner.targetY, dt)) {
                    if (learner.currentAction && learner.currentAction._isCommand) {
                        // Player-issued command: use dedicated handler
                        handleLearnerCommandArrival(learner);
                    } else if (learner.currentAction) {
                        learner.state = 'acting';
                        learner.actionTimer = learner.currentAction.duration / (0.5 + learner.geschick * 0.08);
                        learner.activityDe = learner.currentAction.activityDe;
                        sfxForAction(learner.currentAction.id);
                    } else {
                        learner.state = 'idle';
                    }
                }
                break;

            case 'acting':
                learner.actionTimer -= dt;
                if (learner.actionTimer <= 0) {
                    if (learner.currentAction && learner.currentAction.effects) {
                        if (learner.currentAction.effects.hunger) learner.hunger = Math.min(100, learner.hunger + learner.currentAction.effects.hunger);
                        if (learner.currentAction.effects.thirst) learner.thirst = Math.min(100, learner.thirst + learner.currentAction.effects.thirst);
                        if (learner.currentAction.effects.energy) learner.energy = Math.min(100, learner.energy + learner.currentAction.effects.energy);
                    }
                    learner.state = 'idle';
                    learner.currentAction = null;
                    // After need action, return to speaker
                    learner.followMode = 'returning';
                }
                break;
        }
    }

    function findClosestObjectFrom(person, type) {
        let best = null, bestDist = Infinity;
        for (const obj of worldObjects) {
            if (obj.type === type) {
                const d = person.distTo(obj.x, obj.y);
                if (d < bestDist) { bestDist = d; best = obj; }
            }
        }
        return best;
    }

    function renderVocabPanel() {
        const learner = persons[1];
        const total = Object.keys(vocab).length;
        const known = learner.knownWords.size;
        const pct = total > 0 ? Math.round(known / total * 100) : 0;

        document.getElementById('vocab-progress').textContent = `${known} / ${total} Wörter gelernt (${pct}%)`;
        document.getElementById('vocab-bar').style.width = pct + '%';

        // Sparkline — words learned per game-day
        let sparkCanvas = document.getElementById('vocab-sparkline');
        if (!sparkCanvas) {
            sparkCanvas = document.createElement('canvas');
            sparkCanvas.id = 'vocab-sparkline';
            sparkCanvas.width = 260;
            sparkCanvas.height = 28;
            sparkCanvas.style.cssText = 'width:100%;height:28px;margin:4px 0 2px;display:block;';
            const barBg = document.querySelector('#vocab-panel .progress-bar-bg');
            if (barBg) barBg.parentNode.insertBefore(sparkCanvas, barBg.nextSibling);
        }
        if (vocabHistory.length > 1) {
            const sCtx = sparkCanvas.getContext('2d');
            const sw = sparkCanvas.width, sh = sparkCanvas.height;
            sCtx.clearRect(0, 0, sw, sh);
            // Aggregate by game day
            const dayCounts = {};
            for (const h of vocabHistory) dayCounts[h.day] = (dayCounts[h.day] || 0) + 1;
            const days = Object.keys(dayCounts).map(Number).sort((a, b) => a - b);
            if (days.length >= 2) {
                const maxC = Math.max(...days.map(d => dayCounts[d]), 1);
                const pad = 4;
                sCtx.strokeStyle = '#6a8a5a';
                sCtx.lineWidth = 1.5;
                sCtx.beginPath();
                for (let i = 0; i < days.length; i++) {
                    const px = pad + (i / (days.length - 1)) * (sw - pad * 2);
                    const py = sh - pad - ((dayCounts[days[i]] / maxC) * (sh - pad * 2));
                    if (i === 0) sCtx.moveTo(px, py); else sCtx.lineTo(px, py);
                }
                sCtx.stroke();
                // Fill under curve
                sCtx.lineTo(pad + (sw - pad * 2), sh - pad);
                sCtx.lineTo(pad, sh - pad);
                sCtx.closePath();
                sCtx.fillStyle = 'rgba(106,138,90,0.15)';
                sCtx.fill();
            }
        }

        const listEl = document.getElementById('vocab-list');
        const searchEl = document.getElementById('vocab-search');
        const query = (searchEl ? searchEl.value : '').toLowerCase().trim();
        let html = '';
        for (const cid of learner.wordHistory) {
            const v = vocab[cid];
            if (!v) continue;
            if (query) {
                const matchKana = v.kana.includes(query) || (v.romaji || '').toLowerCase().includes(query);
                const matchDe = v.de.toLowerCase().includes(query);
                const matchKanji = v.kanji.includes(query);
                if (!matchKana && !matchDe && !matchKanji) continue;
            }
            html += `<div class="vocab-word" data-cid="${cid}" style="cursor:pointer;" title="Klicken für Kalligraphie"><span class="pseudo">${v.kanji}</span><span class="kana">${v.kana}</span><span class="meaning">${v.de}</span></div>`;
        }
        if (known === 0) {
            html = '<div style="color:#5a5a4a;font-style:italic;">Noch keine Woerter gelernt</div>';
        } else if (query && !html) {
            html = '<div style="color:#5a5a4a;font-style:italic;">Keine Treffer</div>';
        }
        listEl.innerHTML = html;
    }
