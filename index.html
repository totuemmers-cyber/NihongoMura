    // Helper: get the romaji ending key for a godan verb
    function _godanRomajiEnding(romaji) {
        if (romaji.endsWith('tsu')) return 'tsu';
        if (romaji.endsWith('su')) return 'su';
        if (romaji.endsWith('ku')) return 'ku';
        if (romaji.endsWith('gu')) return 'gu';
        if (romaji.endsWith('nu')) return 'nu';
        if (romaji.endsWith('bu')) return 'bu';
        if (romaji.endsWith('mu')) return 'mu';
        if (romaji.endsWith('ru')) return 'ru';
        if (romaji.endsWith('u')) return 'u';
        return 'u'; // fallback
    }

    // Helper: length of romaji ending to strip
    function _godanRomajiStripLen(ending) {
        return ending.length; // 'tsu' → 3, 'ku' → 2, 'u' → 1, etc.
    }

    function conjugateIchidan(verbEntry, form) {
        // Ichidan: drop final る (kana), last char (kanji), 'ru' (romaji), then add suffix
        const kanjiStem = verbEntry.kanji.slice(0, -1);
        const kanaStem = verbEntry.kana.slice(0, -1); // drop る
        const romajiStem = verbEntry.romaji.endsWith('ru') ? verbEntry.romaji.slice(0, -2) : verbEntry.romaji;

        const suffixes = {
            masu:           { kanji: 'ます',         kana: 'ます',         romaji: 'masu' },
            masen:          { kanji: 'ません',       kana: 'ません',       romaji: 'masen' },
            te:             { kanji: 'て',           kana: 'て',           romaji: 'te' },
            ta:             { kanji: 'た',           kana: 'た',           romaji: 'ta' },
            nai:            { kanji: 'ない',         kana: 'ない',         romaji: 'nai' },
            mashita:        { kanji: 'ました',       kana: 'ました',       romaji: 'mashita' },
            masendeshita:   { kanji: 'ませんでした', kana: 'ませんでした', romaji: 'masendeshita' },
            potential:      { kanji: 'られる',       kana: 'られる',       romaji: 'rareru' },
            volitional:     { kanji: 'よう',         kana: 'よう',         romaji: 'you' },
        };

        const suf = suffixes[form];
        if (!suf) return { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };

        return {
            kanji:  kanjiStem + suf.kanji,
            kana:   kanaStem + suf.kana,
            romaji: romajiStem + suf.romaji,
        };
    }

    function conjugateGodan(verbEntry, form) {
        // Godan: final kana determines conjugation row
        const lastKana = verbEntry.kana.slice(-1);
        const row = GODAN_MAP[lastKana];
        if (!row) return { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };

        const kanjiStem = verbEntry.kanji.slice(0, -1);
        const kanaStem = verbEntry.kana.slice(0, -1);

        // Romaji stem
        const rEnding = _godanRomajiEnding(verbEntry.romaji);
        const rMap = GODAN_ROMAJI_MAP[rEnding];
        const romajiStem = verbEntry.romaji.slice(0, -_godanRomajiStripLen(rEnding));

        // Special case: 行く (iku) → 行って (itte), not 行いて
        const isIku = (verbEntry.kana === 'いく' || verbEntry.kana === 'ゆく');

        switch (form) {
            case 'masu':
                return { kanji: kanjiStem + row.i + 'ます', kana: kanaStem + row.i + 'ます', romaji: romajiStem + rMap.i + 'masu' };
            case 'masen':
                return { kanji: kanjiStem + row.i + 'ません', kana: kanaStem + row.i + 'ません', romaji: romajiStem + rMap.i + 'masen' };
            case 'mashita':
                return { kanji: kanjiStem + row.i + 'ました', kana: kanaStem + row.i + 'ました', romaji: romajiStem + rMap.i + 'mashita' };
            case 'masendeshita':
                return { kanji: kanjiStem + row.i + 'ませんでした', kana: kanaStem + row.i + 'ませんでした', romaji: romajiStem + rMap.i + 'masendeshita' };
            case 'te':
                if (isIku) return { kanji: kanjiStem + 'って', kana: 'いって', romaji: 'itte' };
                return { kanji: kanjiStem + row.te, kana: kanaStem + row.te, romaji: romajiStem + rMap.te };
            case 'ta':
                if (isIku) return { kanji: kanjiStem + 'った', kana: 'いった', romaji: 'itta' };
                return { kanji: kanjiStem + row.ta, kana: kanaStem + row.ta, romaji: romajiStem + rMap.ta };
            case 'nai':
                return { kanji: kanjiStem + row.a + 'ない', kana: kanaStem + row.a + 'ない', romaji: romajiStem + rMap.a + 'nai' };
            case 'potential':
                return { kanji: kanjiStem + row.pot, kana: kanaStem + row.pot, romaji: romajiStem + rMap.pot };
            case 'volitional':
                return { kanji: kanjiStem + row.vol, kana: kanaStem + row.vol, romaji: romajiStem + rMap.vol };
            default:
                return { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };
        }
    }

    function conjugateIrregular(verbEntry, form) {
        const isSuru = (verbEntry.kana === 'する' || verbEntry.kana.endsWith('する'));
        const isKuru = (verbEntry.kana === 'くる' || verbEntry.kana === 'きます');

        if (isSuru) {
            // Handle compound する verbs (e.g. 勉強する benkyou suru)
            const isCompound = verbEntry.kana.length > 2 && verbEntry.kana.endsWith('する');
            const kanjiPrefix = isCompound ? verbEntry.kanji.slice(0, -2) : '';
            const kanaPrefix = isCompound ? verbEntry.kana.slice(0, -2) : '';
            const romajiPrefix = isCompound ? verbEntry.romaji.replace(/suru$/, '') : '';

            const forms = {
                masu:           { kanji: kanjiPrefix + 'します',         kana: kanaPrefix + 'します',         romaji: romajiPrefix + 'shimasu' },
                masen:          { kanji: kanjiPrefix + 'しません',       kana: kanaPrefix + 'しません',       romaji: romajiPrefix + 'shimasen' },
                te:             { kanji: kanjiPrefix + 'して',           kana: kanaPrefix + 'して',           romaji: romajiPrefix + 'shite' },
                ta:             { kanji: kanjiPrefix + 'した',           kana: kanaPrefix + 'した',           romaji: romajiPrefix + 'shita' },
                nai:            { kanji: kanjiPrefix + 'しない',         kana: kanaPrefix + 'しない',         romaji: romajiPrefix + 'shinai' },
                mashita:        { kanji: kanjiPrefix + 'しました',       kana: kanaPrefix + 'しました',       romaji: romajiPrefix + 'shimashita' },
                masendeshita:   { kanji: kanjiPrefix + 'しませんでした', kana: kanaPrefix + 'しませんでした', romaji: romajiPrefix + 'shimasendeshita' },
                potential:      { kanji: kanjiPrefix + 'できる',         kana: kanaPrefix + 'できる',         romaji: romajiPrefix + 'dekiru' },
                volitional:     { kanji: kanjiPrefix + 'しよう',         kana: kanaPrefix + 'しよう',         romaji: romajiPrefix + 'shiyou' },
            };
            return forms[form] || { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };
        }

        if (isKuru) {
            const forms = {
                masu:           { kanji: '来ます',         kana: 'きます',         romaji: 'kimasu' },
                masen:          { kanji: '来ません',       kana: 'きません',       romaji: 'kimasen' },
                te:             { kanji: '来て',           kana: 'きて',           romaji: 'kite' },
                ta:             { kanji: '来た',           kana: 'きた',           romaji: 'kita' },
                nai:            { kanji: '来ない',         kana: 'こない',         romaji: 'konai' },
                mashita:        { kanji: '来ました',       kana: 'きました',       romaji: 'kimashita' },
                masendeshita:   { kanji: '来ませんでした', kana: 'きませんでした', romaji: 'kimasendeshita' },
                potential:      { kanji: '来られる',       kana: 'こられる',       romaji: 'korareru' },
                volitional:     { kanji: '来よう',         kana: 'こよう',         romaji: 'koyou' },
            };
            return forms[form] || { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };
        }

        // Unknown irregular — return dictionary form
        return { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };
    }

    function conjugateVerb(verbEntry, form) {
        // verbEntry: { kanji, kana, romaji, vclass }
        // form: 'dict', 'masu', 'masen', 'te', 'ta', 'nai', 'mashita', 'masendeshita', 'potential', 'volitional'
        // Returns: { kanji, kana, romaji }
        const vc = verbEntry.vclass;
        if (!vc) return { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };
        if (form === 'dict') return { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };

        if (vc === 'ichidan') return conjugateIchidan(verbEntry, form);
        if (vc === 'godan') return conjugateGodan(verbEntry, form);
        if (vc === 'irregular') return conjugateIrregular(verbEntry, form);
        return { kanji: verbEntry.kanji, kana: verbEntry.kana, romaji: verbEntry.romaji };
    }

    // Time-word IDs (placed before topic in Japanese, or sentence-initially)
    const TIME_WORD_IDS = new Set([
        'now', 'today', 'tomorrow', 'yesterday', 'morning', 'night'
    ]);

    // Time words — Japanese equivalents
    const TIME_WORDS = {
        now:       { kanji: '今',   kana: 'いま',   romaji: 'ima' },
        today:     { kanji: '今日', kana: 'きょう', romaji: 'kyou' },
        tomorrow:  { kanji: '明日', kana: 'あした', romaji: 'ashita' },
        yesterday: { kanji: '昨日', kana: 'きのう', romaji: 'kinou' },
        morning:   { kanji: '朝',   kana: 'あさ',   romaji: 'asa' },
        night:     { kanji: '夜',   kana: 'よる',   romaji: 'yoru' },
    };

    // Location mapping — action target → vocab concept for で/に+place
    const TARGET_LOCATION_MAP = {
        kitchen: 'kitchen', teahouse: 'teahouse', workshop: 'workshop',
        house: 'home', market: 'market', well: 'well2',
        bridge: 'bridge', garden: 'garden', fish_pond: 'fish_pond',
        shrine: 'shrine', stable: 'stable', river: 'river',
    };

    // Helper: create a particle grammar word (not from vocab)
    function _makeParticle(kanji, kana, romaji, de) {
        return { conceptId: '_p_' + romaji, kanji: kanji, kana: kana, romaji: romaji, de: de || '', type: 'particle', role: 'particle' };
    }

    // Standard Japanese particles
    const P_WA    = () => _makeParticle('は', 'は', 'wa', '(Thema)');
    const P_WO    = () => _makeParticle('を', 'を', 'wo', '(Objekt)');
    const P_NI    = () => _makeParticle('に', 'に', 'ni', '(Richtung)');
    const P_DE    = () => _makeParticle('で', 'で', 'de', '(Mittel/Ort)');
    const P_NO    = () => _makeParticle('の', 'の', 'no', '(Genitiv)');
    const P_MO    = () => _makeParticle('も', 'も', 'mo', '(auch)');
    const P_GA    = () => _makeParticle('が', 'が', 'ga', '(Subjekt)');
    const P_TO    = () => _makeParticle('と', 'と', 'to', '(und/mit)');
    const P_YO    = () => _makeParticle('よ', 'よ', 'yo', '(Betonung)');
    const P_NE    = () => _makeParticle('ね', 'ね', 'ne', '(nicht wahr)');
    const P_KA    = () => _makeParticle('か', 'か', 'ka', '(Frage)');

    // ============================================================
    //  applyGrammar — Japanese SOV sentence construction
    // ============================================================
    function applyGrammar(words, tier, action) {
        if (tier <= 0 || words.length === 0) return words;
        let result = words.map(w => ({ ...w }));

        // --- Classify template words by role ---
        // Templates typically come as [pronoun/subject, verb, object/modifier]
        // or [noun, modifier, modifier] (no verb = adjectival predicate)
        let subject = null;
        let verb = null;
        let objects = [];
        let modifiers = [];
        let timeWord = null;
        let others = [];

        for (const w of result) {
            if (TIME_WORD_IDS.has(w.conceptId)) {
                timeWord = w;
            } else if (w.type === 'pronoun' && !subject) {
                subject = w;
            } else if (w.type === 'verb' && !verb) {
                verb = w;
            } else if (w.type === 'mod') {
                modifiers.push(w);
            } else if (w.type === 'noun') {
                if (!subject) {
                    // First noun without a pronoun subject becomes topic
                    subject = w;
                } else {
                    objects.push(w);
                }
            } else {
                others.push(w);
            }
        }

        // --- Determine verb conjugation form ---
        let verbForm = 'dict';
        let verbConjugated = null;
        if (verb) {
            const vEntry = vocab[verb.conceptId];
            if (vEntry && vEntry.vclass) {
                if (tier === 0) {
                    verbForm = 'dict';
                } else if (tier === 1) {
                    verbForm = 'masu';
                } else if (tier === 2) {
                    verbForm = Math.random() < 0.25 ? 'te' : 'masu';
                } else if (tier === 3) {
                    const r = Math.random();
                    if (r < 0.20) verbForm = 'mashita';
                    else if (r < 0.35) verbForm = 'te';
                    else verbForm = 'masu';
                } else {
                    // Tier 4: mix of plain and polite
                    const r = Math.random();
                    if (r < 0.20) verbForm = 'dict';
                    else if (r < 0.35) verbForm = 'ta';
                    else if (r < 0.45) verbForm = 'nai';
                    else if (r < 0.55) verbForm = 'te';
                    else if (r < 0.70) verbForm = 'mashita';
                    else verbForm = 'masu';
                }
                verbConjugated = conjugateVerb(vEntry, verbForm);
            }
        }

        // --- Build SOV sentence ---
        let sentence = [];

        // 1. Time word first (if present, tier 1+)
        if (timeWord && tier >= 1) {
            sentence.push(timeWord);
        }

        // 2. Subject/topic + particle
        if (subject) {
            sentence.push(subject);
            if (tier >= 1) {
                // は (topic marker) for pronouns, が for new-info subjects at tier 3+
                if (tier >= 3 && subject.type === 'noun' && Math.random() < 0.25) {
                    sentence.push(P_GA());
                } else {
                    sentence.push(P_WA());
                }
            }
        }

        // 3. Location with で (tier 3+)
        let locationInserted = false;
        if (tier >= 3 && action && action.target && Math.random() < 0.20) {
            const locId = TARGET_LOCATION_MAP[action.target];
            if (locId && vocab[locId]) {
                const locWord = {
                    conceptId: locId,
                    kanji: vocab[locId].kanji,
                    kana: vocab[locId].kana,
                    romaji: vocab[locId].romaji,
                    de: vocab[locId].de,
                    type: 'noun',
                    role: 'noun'
                };
                sentence.push(locWord);
                sentence.push(P_DE());
                locationInserted = true;
            }
        }

        // 4. Modifiers that apply to object nouns — place before the noun
        // In Japanese, adjectives precede the noun they modify
        // If there's a verb, modifiers before the object; if no verb, modifiers after subject
        if (verb) {
            // With verb: objects + を, then verb at end
            // Modifiers go before the noun they modify or before the verb as adverbs

            // も (also) — tier 1+, low chance
            let insertMo = false;
            if (tier >= 1 && Math.random() < 0.13) {
                insertMo = true;
            }

            // Counter insertion (tier 2+)
            let counterInserted = false;

            for (let i = 0; i < objects.length; i++) {
                const obj = objects[i];

                // Insert any modifiers that relate to this object before it
                // Simple heuristic: if modifier appears after object in template, it modifies that object
                // For Japanese, adj comes before noun: おいしい食べ物
                const relatedMods = modifiers.filter(m => {
                    // In templates like [me, eat, food, good] — 'good' modifies 'food'
                    return true; // For simplicity, attach all remaining modifiers to the first object
                });
                if (i === 0) {
                    for (const mod of relatedMods) {
                        sentence.push(mod);
                    }
                }

                sentence.push(obj);

                // Counter (tier 2+): 一杯のお茶 → counter + の before noun, or number+counter after noun
                // Simpler: insert 一 + counter + の before noun
                if (tier >= 2 && !counterInserted && COUNTERS[obj.conceptId] && Math.random() < 0.25) {
                    const ctr = COUNTERS[obj.conceptId];
                    const counterWord = {
                        conceptId: '_counter',
                        kanji: '一' + ctr.kanji,
                        kana: 'いち' + ctr.kana,
                        romaji: 'ichi' + ctr.romaji,
                        de: '',
                        type: 'particle',
                        role: 'particle'
                    };
                    // Insert counter before the object (we need to go back)
                    // Actually, insert 一杯の before the object we just pushed
                    const objPos = sentence.length - 1;
                    sentence.splice(objPos, 0, counterWord, P_NO());
                    counterInserted = true;
                }

                // Particle after object
                if (tier >= 1) {
                    if (insertMo && i === 0) {
                        sentence.push(P_MO()); // も replaces を
                        insertMo = false;
                    } else {
                        sentence.push(P_WO());
                    }
                }
            }

            // If there were no objects, modifiers become adverbial (before verb)
            if (objects.length === 0) {
                for (const mod of modifiers) {
                    sentence.push(mod);
                }
            }

            // Negation: insert before verb at tier 2+
            // In polite form, negation is handled by verb form (masen/masendeshita)
            // In plain form, nai-form handles it
            // For explicit negation concepts, we swap verb form
            if (tier >= 2 && Math.random() < 0.10 && verbConjugated) {
                const vEntry = vocab[verb.conceptId];
                if (vEntry && vEntry.vclass) {
                    if (verbForm === 'masu' || verbForm === 'mashita') {
                        verbForm = (verbForm === 'mashita') ? 'masendeshita' : 'masen';
                    } else {
                        verbForm = 'nai';
                    }
                    verbConjugated = conjugateVerb(vEntry, verbForm);
                }
            }

            // Verb at end (SOV)
            if (verbConjugated) {
                const conjugatedVerbWord = {
                    conceptId: verb.conceptId,
                    kanji: verbConjugated.kanji,
                    kana: verbConjugated.kana,
                    romaji: verbConjugated.romaji,
                    de: verb.de,
                    type: 'verb',
                    role: 'verb'
                };
                sentence.push(conjugatedVerbWord);
            } else {
                sentence.push(verb);
            }
        } else {
            // No verb — adjectival/nominal predicate
            // e.g. 茶は美味しい (Tea is delicious) — SOV with adjective as predicate

            // Objects (really secondary nouns in adjectival predicate)
            for (const obj of objects) {
                sentence.push(obj);
                if (tier >= 2) {
                    sentence.push(P_WA());
                }
            }

            // Modifiers come at end as predicate adjective
            // At tier 1+, add とても (totemo, very) before adjective occasionally
            if (tier >= 1 && modifiers.length > 0 && Math.random() < 0.30) {
                sentence.push(_makeParticle('とても', 'とても', 'totemo', 'sehr'));
            }

            for (const mod of modifiers) {
                sentence.push(mod);
            }

            // If tier 2+ and predicate is い-adjective, it stands alone
            // If predicate is な-adjective or noun, add です (desu) for politeness
            if (tier >= 1 && modifiers.length > 0) {
                // Add です for polite form
                if (Math.random() < 0.60) {
                    sentence.push(_makeParticle('です', 'です', 'desu', 'ist'));
                }
            }
        }

        // Add any remaining 'other' words
        for (const o of others) {
            // Insert before verb if verb is last, otherwise at end
            if (verb && sentence.length > 0 && sentence[sentence.length - 1].type === 'verb') {
                sentence.splice(sentence.length - 1, 0, o);
            } else {
                sentence.push(o);
            }
        }

        // =============================================
        //  SENTENCE-FINAL PARTICLES (tier 2+)
        // =============================================
        if (tier >= 2) {
            const last = sentence.length > 0 ? sentence[sentence.length - 1] : null;
            if (last && last.type !== 'particle') {
                const r = Math.random();
                if (r < 0.08) {
                    sentence.push(P_YO()); // よ — emphasis/assertion
                } else if (r < 0.16) {
                    sentence.push(P_NE()); // ね — seeking agreement
                }
            }
        }

        // Question か (tier 3+)
        if (tier >= 3 && Math.random() < 0.12) {
            // Remove any trailing よ/ね before adding か
            const last = sentence[sentence.length - 1];
            if (last && (last.conceptId === '_p_yo' || last.conceptId === '_p_ne')) {
                sentence.pop();
            }
            sentence.push(P_KA());
        }

        // =============================================
        //  TIER 4: Advanced structures
        // =============================================
        if (tier >= 4 && verb) {
            // の (possessive) — pronoun + の + noun: 私の本 (tier 2+, checked here for safety)
            // Already handled by P_NO in counter context; also add for possessive
            if (subject && subject.type === 'pronoun' && objects.length > 0 && Math.random() < 0.15) {
                // Find subject position and insert の after it (replacing は)
                const subIdx = sentence.findIndex(w => w.conceptId === subject.conceptId);
                if (subIdx >= 0 && subIdx + 1 < sentence.length && sentence[subIdx + 1].conceptId === '_p_wa') {
                    sentence[subIdx + 1] = P_NO();
                    // The sentence then becomes possessive, not topic-comment
                }
            }

            // Volitional form: ～よう/～ましょう for suggestions
            if (Math.random() < 0.10 && verbConjugated) {
                const vEntry = vocab[verb.conceptId];
                if (vEntry && vEntry.vclass) {
                    const volConj = conjugateVerb(vEntry, 'volitional');
                    // Find the verb in sentence and replace
                    const vIdx = sentence.findIndex(w => w.conceptId === verb.conceptId && w.type === 'verb');
                    if (vIdx >= 0) {
                        sentence[vIdx] = {
                            conceptId: verb.conceptId,
                            kanji: volConj.kanji,
                            kana: volConj.kana,
                            romaji: volConj.romaji,
                            de: verb.de,
                            type: 'verb',
                            role: 'verb'
                        };
                    }
                }
            }

            // Potential form: ～できる/～られる/～える
            if (Math.random() < 0.08 && verbConjugated) {
                const vEntry = vocab[verb.conceptId];
                if (vEntry && vEntry.vclass) {
                    const potConj = conjugateVerb(vEntry, 'potential');
                    const vIdx = sentence.findIndex(w => w.conceptId === verb.conceptId && w.type === 'verb');
                    if (vIdx >= 0) {
                        sentence[vIdx] = {
                            conceptId: verb.conceptId,
                            kanji: potConj.kanji,
                            kana: potConj.kana,
                            romaji: potConj.romaji,
                            de: verb.de,
                            type: 'verb',
                            role: 'verb'
                        };
                        // With potential, direct object particle changes from を to が
                        for (let i = 0; i < sentence.length; i++) {
                            if (sentence[i].conceptId === '_p_wo') {
                                sentence[i] = P_GA();
                                break;
                            }
                        }
                    }
                }
            }
        }

        return sentence;
    }

    // Shared helper: draw color-coded kanji characters with optional furigana
    function _drawColorCodedKanji(ctx, words, cx, cy, fontSize, lightBg) {
        if (!words || words.length === 0) return;
        const colors = lightBg ? ROLE_COLORS_LIGHT : ROLE_COLORS;
        ctx.font = `bold ${fontSize}px ${CJK_FONT_GRAMMAR}`;
        ctx.textBaseline = 'middle';
        // Measure total width
        let totalW = 0;
        const segs = words.map(w => {
            const kj = w.kanji || '';
            const width = ctx.measureText(kj).width;
            totalW += width;
            return { kanji: kj, kana: w.kana || '', width, color: colors[w.type] || colors.unknown };
        });
        // Draw left-to-right
        ctx.textAlign = 'left';
        let drawX = cx - totalW / 2;
        const tier = getGrammarTier();
        const furiganaSize = Math.round(fontSize * 0.45);
        for (const seg of segs) {
            ctx.fillStyle = seg.color;
            ctx.font = `bold ${fontSize}px ${CJK_FONT_GRAMMAR}`;
            ctx.fillText(seg.kanji, drawX, cy);
            // Render furigana (small kana above kanji) at tier 2+
            // Only show furigana if the kanji differs from the kana (i.e. contains actual kanji)
            if (tier >= 2 && seg.kana && seg.kanji !== seg.kana && /[\u4e00-\u9faf]/.test(seg.kanji)) {
                ctx.font = `${furiganaSize}px ${CJK_FONT_GRAMMAR}`;
                const furiganaY = cy - fontSize * 0.6;
                // Center furigana above the kanji
                const kanjiMidX = drawX + seg.width / 2;
                ctx.textAlign = 'center';
                ctx.fillText(seg.kana, kanjiMidX, furiganaY);
                ctx.textAlign = 'left';
            }
            drawX += seg.width;
        }
        ctx.textAlign = 'center'; // restore
    }

    // ============================================================
    //  SPEECH BUBBLE
    // ============================================================
    class SpeechBubble {
        constructor(person, text, conceptWords, isResponse) {
            this.person = person;
            this.text = text;
            this.kanjiText = text; // may be overridden
            this.kanaText = '';  // may be set
            this.conceptWords = conceptWords || [];
            this.isResponse = isResponse || false;
            this.life = 240;
            this.maxLife = 240;
            this.alpha = 0;
        }
        update(dt) {
            this.life -= dt * 0.5;
            if (this.life > this.maxLife - 30) {
                this.alpha = Math.min(1, this.alpha + 0.08 * dt);
            } else if (this.life < 40) {
                this.alpha = Math.max(0, this.life / 40);
            } else {
                this.alpha = 1;
            }
            return this.life > 0;
        }
        draw(ctx) {
            if (this.alpha <= 0) return;
            const x = this.person.x * canvasScale;
            const yOff = this.isResponse ? -60 : -48;
            const y = (this.person.y + yOff) * canvasScale;
            const CJK_FONT = "'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif";
            ctx.save();
            ctx.globalAlpha = this.alpha;

            // Measure widths for both lines
            const hasPinyin = this.kanaText && !this.isResponse;
            const kanjiFontSize = Math.round(13 * canvasScale);
            const kanaFontSize = Math.round(9 * canvasScale);
            const responseFontSize = Math.round(11 * canvasScale);

            let textW;
            if (this.isResponse) {
                // Measure with the actual font used for response rendering
                ctx.font = `bold ${responseFontSize}px 'Courier New',${CJK_FONT}`;
                textW = ctx.measureText(this.text).width;
            } else {
                ctx.font = `bold ${kanjiFontSize}px ${CJK_FONT}`;
                const kanjiW = ctx.measureText(this.kanjiText).width;
                let kanaW = 0;
                if (hasPinyin) {
                    ctx.font = `${kanaFontSize}px 'Courier New',${CJK_FONT}`;
                    kanaW = ctx.measureText(this.kanaText).width;
                }
                textW = Math.max(kanjiW, kanaW);
            }

            const pad = 8 * canvasScale;
            const bw = textW + pad * 2;
            const bh = (hasPinyin ? 34 : 22) * canvasScale;
            const bx = x - bw / 2;
            const by = y - bh;

            // Bubble bg
            ctx.fillStyle = this.isResponse ? '#2a2a1a' : '#f5f0e0';
            ctx.strokeStyle = this.isResponse ? '#6a8a5a' : '#c83030';
            ctx.lineWidth = canvasScale;
            roundRect(ctx, bx, by, bw, bh, 4 * canvasScale);
            ctx.fill();
            ctx.stroke();

            // Pointer
            ctx.beginPath();
            ctx.moveTo(x - 4 * canvasScale, by + bh);
            ctx.lineTo(x, by + bh + 6 * canvasScale);
            ctx.lineTo(x + 4 * canvasScale, by + bh);
            ctx.fillStyle = this.isResponse ? '#2a2a1a' : '#f5f0e0';
            ctx.fill();

            ctx.textAlign = 'center';
            if (hasPinyin) {
                // Color-coded kanji line (top, larger)
                if (this.conceptWords && this.conceptWords.length > 0) {
                    _drawColorCodedKanji(ctx, this.conceptWords, x, by + bh * 0.35, kanjiFontSize, true);
                } else {
                    ctx.font = `bold ${kanjiFontSize}px ${CJK_FONT}`;
                    ctx.fillStyle = '#2a2010';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.kanjiText, x, by + bh * 0.35);
                }
                // Pinyin line (bottom, smaller, grey)
                ctx.font = `${kanaFontSize}px 'Courier New',${CJK_FONT}`;
                ctx.fillStyle = '#8a7e6a';
                ctx.fillText(this.kanaText, x, by + bh * 0.72);
            } else {
                // Single line (response bubble or fallback)
                ctx.font = `bold ${Math.round(11 * canvasScale)}px 'Courier New',${CJK_FONT}`;
                ctx.fillStyle = this.isResponse ? '#a0c890' : '#2a2010';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, x, by + bh / 2);
            }
            ctx.restore();
        }
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ============================================================
    //  LEARN FLASH (visual feedback)
    // ============================================================
    class LearnFlash {
        constructor(x, y, word) {
            this.x = x;
            this.y = y;
            this.word = word;
            this.life = 90;
            this.vy = -0.5;
        }
        update(dt) {
            this.y += this.vy * dt;
            this.life -= dt;
            return this.life > 0;
        }
        draw(ctx) {
            const alpha = Math.min(1, this.life / 40);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = `bold ${Math.round(10 * canvasScale)}px 'Courier New','Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic',monospace`;
            ctx.fillStyle = '#4ade4a';
            ctx.textAlign = 'center';
            ctx.fillText('+ ' + this.word, this.x * canvasScale, this.y * canvasScale);
            ctx.restore();
        }
    }

    // ============================================================
    //  CALLIGRAPHY OVERLAY (书法 shūfǎ — brush stroke animation)
    // ============================================================
    const CJK_FONT = "'Noto Sans JP','Hiragino Kaku Gothic Pro','Yu Gothic','Noto Sans CJK JP',sans-serif";
    const INK_COLOR = '#1a0a00';
    const PARCHMENT_BG = '#f5e6c8';
    const PARCHMENT_BORDER = '#c4a46a';

    class CalligraphyOverlay {
        constructor(kanji, kana, german) {
            this.kanji = kanji;
            this.kana = kana;
            this.german = german;
            this.life = 300; // ~5 seconds at 60fps
            this.maxLife = 300;
            this.revealProgress = 0;
            this.inkDrops = [];
            // Position in world coords (flush right with small margin to panel)
            this.ww = 160;
            this.wh = 200;
            this.wx = WORLD_W - this.ww - 5;
            this.wy = 15;
            // Pre-render character to offscreen canvas
            this.offCanvas = document.createElement('canvas');
            this.offCanvas.width = 192;
            this.offCanvas.height = 192;
            this.offCtx = this.offCanvas.getContext('2d');
            this._renderCharacter();
            // Generate ink drops for decoration
            for (let i = 0; i < 6; i++) {
                this.inkDrops.push({
                    x: Math.random() * 0.8 + 0.1,
                    y: Math.random() * 0.8 + 0.1,
                    r: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.15 + 0.05,
                    delay: Math.random() * 0.6,
                });
            }
        }

        _renderCharacter() {
            const c = this.offCtx;
            const s = 192;
            c.clearRect(0, 0, s, s);
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            // Auto-scale font size based on character count
            const len = this.kanji.length;
            let fontSize = len <= 1 ? 130 : len === 2 ? 85 : len === 3 ? 65 : Math.max(38, Math.floor(160 / len));
            // Measure and shrink further if needed
            c.font = `bold ${fontSize}px ${CJK_FONT}`;
            const measured = c.measureText(this.kanji).width;
            if (measured > s * 0.9) {
                fontSize = Math.floor(fontSize * (s * 0.9) / measured);
                c.font = `bold ${fontSize}px ${CJK_FONT}`;
            }
            // Ink bleed: draw twice with offset
            c.fillStyle = INK_COLOR;
            c.globalAlpha = 0.25;
            c.fillText(this.kanji, s / 2 + 1, s / 2 + 1);
            c.globalAlpha = 1.0;
            c.fillText(this.kanji, s / 2, s / 2);
        }

        update(dt) {
            this.life -= dt;
            // Reveal: ramps 0→1 over first 60% of life
            const revealEnd = this.maxLife * 0.6;
            const elapsed = this.maxLife - this.life;
            this.revealProgress = Math.min(1, elapsed / revealEnd);
            return this.life > 0;
        }

        draw(ctx) {
            if (this.life <= 0) return;
            const s = canvasScale;
            // Fade in/out
            let alpha = 1;
            const elapsed = this.maxLife - this.life;
            if (elapsed < this.maxLife * 0.12) alpha = elapsed / (this.maxLife * 0.12);
            if (this.life < this.maxLife * 0.18) alpha = this.life / (this.maxLife * 0.18);

            ctx.save();
            ctx.globalAlpha = alpha * 0.95;

            // Use actual canvas width so overlay sits flush-right even on wide screens
            const cw = canvas.width / dpr;
            const w = this.ww * s;
            const h = this.wh * s;
            const x = cw - w - 10 * s;
            const y = this.wy * s;

            // Parchment/rice paper background
            ctx.fillStyle = PARCHMENT_BG;
            ctx.strokeStyle = PARCHMENT_BORDER;
            ctx.lineWidth = 1.5 * s;
            roundRect(ctx, x, y, w, h, 4 * s);
            ctx.fill();
            ctx.stroke();

            // Subtle paper texture
            ctx.globalAlpha = alpha * 0.06;
            for (let i = 0; i < 8; i++) {
                const tx = x + w * (0.1 + Math.sin(i * 2.7) * 0.4 + 0.4);
                const ty = y + h * (0.1 + Math.cos(i * 1.9) * 0.35 + 0.35);
                ctx.beginPath();
                ctx.arc(tx, ty, (3 + i * 1.5) * s, 0, Math.PI * 2);
                ctx.fillStyle = '#c8a060';
                ctx.fill();
            }
            ctx.globalAlpha = alpha * 0.95;

            // Red seal stamp decoration (top-left corner)
            const sealX = x + 8 * s;
            const sealY = y + 6 * s;
            const sealSz = 14 * s;
            ctx.fillStyle = 'rgba(180,30,20,0.15)';
            ctx.fillRect(sealX, sealY, sealSz, sealSz);
            ctx.strokeStyle = 'rgba(180,30,20,0.3)';
            ctx.lineWidth = 0.8 * s;
            ctx.strokeRect(sealX, sealY, sealSz, sealSz);

            // Character area (centered in upper portion of parchment)
            const charAreaX = x + (w - 100 * s) / 2;
            const charAreaY = y + 20 * s;
            const charAreaW = 100 * s;
            const charAreaH = 100 * s;

            // Progressive brush reveal with clipping
            ctx.save();
            ctx.beginPath();
            const rp = this.revealProgress;

            if (rp < 0.25) {
                // Phase 1: Top-left vertical stroke downward
                const ph = rp / 0.25;
                const clipW = charAreaW * 0.4;
                const clipH = charAreaH * ph;
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else if (rp < 0.55) {
                // Phase 2: Expand rightward
                const ph = (rp - 0.25) / 0.3;
                const clipW = charAreaW * (0.4 + 0.6 * ph);
                const clipH = charAreaH * (0.6 + 0.2 * ph);
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else if (rp < 0.8) {
                // Phase 3: Fill bottom
                const ph = (rp - 0.55) / 0.25;
                const clipW = charAreaW;
                const clipH = charAreaH * (0.8 + 0.2 * ph);
                this._brushClip(ctx, charAreaX, charAreaY, clipW, clipH, s);
            } else {
                // Phase 4: Full character
                ctx.rect(charAreaX - 2 * s, charAreaY - 2 * s, charAreaW + 4 * s, charAreaH + 4 * s);
            }
            ctx.clip();

            // Draw the pre-rendered character
            ctx.drawImage(this.offCanvas, charAreaX, charAreaY, charAreaW, charAreaH);

            // Ink drops that appear during reveal
            for (const drop of this.inkDrops) {
                if (rp > drop.delay) {
                    ctx.globalAlpha = alpha * drop.alpha * Math.min(1, (rp - drop.delay) * 3);
                    ctx.beginPath();
                    ctx.arc(
                        charAreaX + drop.x * charAreaW,
                        charAreaY + drop.y * charAreaH,
                        drop.r * s, 0, Math.PI * 2
                    );
                    ctx.fillStyle = INK_COLOR;
                    ctx.fill();
                }
            }
            ctx.restore();

            // Pinyin below character
            ctx.globalAlpha = alpha * 0.9;
            ctx.font = `${Math.round(11 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#4a3520';
            ctx.textAlign = 'center';
            ctx.fillText(this.kana, x + w / 2, y + 132 * s);

            // German translation
            ctx.font = `${Math.round(9 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#7a6a55';
            ctx.fillText(this.german, x + w / 2, y + 150 * s);

            // Decorative line
            ctx.beginPath();
            ctx.moveTo(x + 15 * s, y + 170 * s);
            ctx.lineTo(x + w - 15 * s, y + 170 * s);
            ctx.strokeStyle = 'rgba(180,140,80,0.3)';
            ctx.lineWidth = 0.5 * s;
            ctx.stroke();

            ctx.restore();
        }

        _brushClip(ctx, bx, by, bw, bh, s) {
            // Create ragged brush-edge clipping path using overlapping circles
            ctx.rect(bx, by, bw - 4 * s, bh - 4 * s);
            // Ragged right edge
            const steps = 8;
            for (let i = 0; i <= steps; i++) {
                const cy = by + (bh - 4 * s) * (i / steps);
                const cx = bx + bw - 4 * s + (Math.sin(i * 2.3 + bw * 0.1) * 3) * s;
                ctx.moveTo(cx + 4 * s, cy);
                ctx.arc(cx, cy, 4 * s, 0, Math.PI * 2);
            }
            // Ragged bottom edge
            for (let i = 0; i <= steps; i++) {
                const cx = bx + (bw - 4 * s) * (i / steps);
                const cy = by + bh - 4 * s + (Math.cos(i * 1.7 + bh * 0.1) * 3) * s;
                ctx.moveTo(cx + 4 * s, cy);
                ctx.arc(cx, cy, 4 * s, 0, Math.PI * 2);
            }
        }
    }

    // ============================================================
    //  PROVERB OVERLAY (ことわざ kotowaza — milestone calligraphy)
    // ============================================================
    class ProverbOverlay {
        constructor(proverb) {
            this.chars = [...proverb.chars]; // Array of individual characters
            this.kana = proverb.kana;
            this.german = proverb.german;
            this.milestone = proverb.words;
            this.charCount = this.chars.length;
            // Timing: ~0.8s per char reveal + 3s hold + 2s fade
            this.revealPerChar = 48; // frames per character reveal
            this.holdTime = 180; // frames to hold fully revealed
            this.fadeOutTime = 120; // frames to fade out
            this.totalLife = this.charCount * this.revealPerChar + this.holdTime + this.fadeOutTime;
            this.life = this.totalLife;
            this.maxLife = this.totalLife;
            // Pre-render each character
            this.offCanvases = this.chars.map(ch => {
                const oc = document.createElement('canvas');
                oc.width = 96;
                oc.height = 96;
                const octx = oc.getContext('2d');
                octx.textAlign = 'center';
                octx.textBaseline = 'middle';
                octx.font = `bold 72px ${CJK_FONT}`;
                octx.fillStyle = INK_COLOR;
                octx.globalAlpha = 0.2;
                octx.fillText(ch, 49, 49);
                octx.globalAlpha = 1.0;
                octx.fillText(ch, 48, 48);
                return oc;
            });
        }

        update(dt) {
            this.life -= dt;
            return this.life > 0;
        }

        draw(ctx) {
            if (this.life <= 0) return;
            const s = canvasScale;
            const elapsed = this.maxLife - this.life;

            // Overall alpha: fade in first 60 frames, fade out last fadeOutTime frames
            let alpha = 1;
            if (elapsed < 60) alpha = elapsed / 60;
            if (this.life < this.fadeOutTime) alpha = this.life / this.fadeOutTime;

            ctx.save();

            // Semi-transparent backdrop (full canvas, not just world area)
            const cw = canvas.width / dpr;
            const ch = canvas.height / dpr;
            ctx.globalAlpha = alpha * 0.55;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, cw, ch);

            ctx.globalAlpha = alpha;

            // Silk banner background (centered on full canvas)
            const charSize = 42 * s;
            const charGap = 6 * s;
            const totalCharsW = this.charCount * (charSize + charGap) - charGap;
            const bannerW = Math.min(totalCharsW + 60 * s, cw - 40 * s);
            const bannerH = 160 * s;
            const bannerX = (cw - bannerW) / 2;
            const bannerY = (ch - bannerH) / 2 - 20 * s;

            // Banner fill
            ctx.fillStyle = PARCHMENT_BG;
            ctx.strokeStyle = '#b8863a';
            ctx.lineWidth = 2 * s;
            roundRect(ctx, bannerX, bannerY, bannerW, bannerH, 6 * s);
            ctx.fill();
            ctx.stroke();

            // Inner border
            ctx.strokeStyle = 'rgba(180,100,40,0.25)';
            ctx.lineWidth = 0.8 * s;
            roundRect(ctx, bannerX + 6 * s, bannerY + 6 * s, bannerW - 12 * s, bannerH - 12 * s, 3 * s);
            ctx.stroke();

            // Paper texture on banner
            ctx.globalAlpha = alpha * 0.04;
            for (let i = 0; i < 12; i++) {
                const tx = bannerX + bannerW * (0.05 + Math.sin(i * 3.1) * 0.45 + 0.45);
                const ty = bannerY + bannerH * (0.1 + Math.cos(i * 2.3) * 0.4 + 0.4);
                ctx.beginPath();
                ctx.arc(tx, ty, (4 + i * 1.2) * s, 0, Math.PI * 2);
                ctx.fillStyle = '#c8a060';
                ctx.fill();
            }
            ctx.globalAlpha = alpha;

            // Milestone label
            ctx.font = `${Math.round(7 * s)}px ${CJK_FONT}`;
            ctx.fillStyle = '#b8863a';
            ctx.textAlign = 'center';
            ctx.fillText(`${this.milestone} Woerter gelernt`, cw / 2, bannerY + 18 * s);

            // Draw characters sequentially
            const charsStartX = (cw - totalCharsW) / 2;
            const charsY = bannerY + 32 * s;

            for (let i = 0; i < this.charCount; i++) {
                const charElapsed = elapsed - i * this.revealPerChar;
                if (charElapsed <= 0) continue; // Not yet revealed

                const charProgress = Math.min(1, charElapsed / this.revealPerChar);
                const cx = charsStartX + i * (charSize + charGap);

                ctx.save();

                // Clip for progressive reveal (top-to-bottom sweep)
                ctx.beginPath();
                const revealH = charSize * charProgress;
                ctx.rect(cx - 2 * s, charsY - 2 * s, charSize + 4 * s, revealH + 4 * s);
                // Ragged bottom edge
                for (let j = 0; j < 5; j++) {
                    const bx = cx + charSize * (j / 4);
                    const by = charsY + revealH + Math.sin(j * 2.1 + i) * 3 * s;
                    ctx.moveTo(bx + 3 * s, by);
                    ctx.arc(bx, by, 3 * s, 0, Math.PI * 2);
                }
                ctx.clip();

                // Draw pre-rendered character
                ctx.globalAlpha = alpha;
                ctx.drawImage(this.offCanvases[i], cx, charsY, charSize, charSize);

                ctx.restore();
            }

            // Kana (below characters, appears after all revealed)
            const allRevealed = elapsed > this.charCount * this.revealPerChar;
            if (allRevealed) {
                const textAlpha = Math.min(1, (elapsed - this.charCount * this.revealPerChar) / 40);
                ctx.globalAlpha = alpha * textAlpha;
                ctx.font = `${Math.round(9 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#5a4530';
                ctx.textAlign = 'center';
                ctx.fillText(this.kana, cw / 2, bannerY + 88 * s);

                // German translation
                ctx.font = `${Math.round(8 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#7a6a55';
                ctx.fillText(this.german, cw / 2, bannerY + 104 * s);

                // Decorative divider
                ctx.beginPath();
                ctx.moveTo(bannerX + 30 * s, bannerY + 118 * s);
                ctx.lineTo(bannerX + bannerW - 30 * s, bannerY + 118 * s);
                ctx.strokeStyle = 'rgba(180,140,80,0.3)';
                ctx.lineWidth = 0.5 * s;
                ctx.stroke();

                // Source attribution
                ctx.font = `italic ${Math.round(6.5 * s)}px ${CJK_FONT}`;
                ctx.fillStyle = '#a09080';
                ctx.fillText('— Japanisches Sprichwort', cw / 2, bannerY + 132 * s);
            }

            ctx.restore();
        }
    }

    // --- Calligraphy trigger functions ---
    function triggerCalligraphy(kanji, kana, german) {
        // Queue words for sequential display (one at a time)
        calligraphyQueue.push({ kanji, kana, german });
        // If nothing is currently showing, start immediately
        if (calligraphyOverlays.length === 0) {
            _advanceCalligraphyQueue();
        }
    }

    function _advanceCalligraphyQueue() {
        if (calligraphyQueue.length === 0) return;
        const next = calligraphyQueue.shift();
        calligraphyOverlays = [new CalligraphyOverlay(next.kanji, next.kana, next.german)];
    }

    function checkProverbMilestone(wordCount) {
        for (const p of PROVERBS) {
            if (p.words === wordCount && !proverbMilestonesHit.has(p.words)) {
                proverbMilestonesHit.add(p.words);
                proverbOverlay = new ProverbOverlay(p);
                addLog(`Meilenstein: ${p.chars} — ${p.german}`, 'learn');
                sfx('learn');
                break;
            }
        }
    }

    // --- Consolidated learn-word helper ---
    function learnWord(learner, w) {
        // Grammar particles are structural, not learnable content
        if (w.type === 'particle' || (vocab[w.conceptId] && vocab[w.conceptId].type === 'particle')) return;
        learner.knownWords.add(w.conceptId);
        learner.wordHistory.push(w.conceptId);
        vocabHistory.push({ day: gameDay, tick: gameTick });
        sfx('learn');
        learnFlashes.push(new LearnFlash(
            learner.x + randFloat(-10, 10), learner.y - 25,
            w.kanji + ' (' + w.kana + ')'
        ));
        addLog(`${learner.name} lernt: ${w.kanji} [${w.kana}] (${w.de})`, 'learn');
        triggerCalligraphy(w.kanji, w.kana, w.de);
        checkProverbMilestone(learner.knownWords.size);
    }

    // ============================================================
    //  RENDERING
    // ============================================================
    function drawTerrain(ctx) {
        const cw = canvas.width / dpr;
        const ch = canvas.height / dpr;
        const s = canvasScale;

        // Base green landscape with subtle gradient (darker at top/distance)
        const terrainGrad = ctx.createLinearGradient(0, 0, 0, ch);
        terrainGrad.addColorStop(0, '#3e6e28');
        terrainGrad.addColorStop(0.5, '#4a7a30');
        terrainGrad.addColorStop(1, '#508035');
        ctx.fillStyle = terrainGrad;
        ctx.fillRect(0, 0, cw, ch);

        // Ground texture variation — subtle tonal circles
        const groundSpots = [
            [60,90,'#467428'],[200,150,'#4e7e32'],[340,420,'#3e7228'],[480,100,'#508030'],
            [100,350,'#447228'],[550,480,'#3a6a24'],[720,550,'#4a7a2e'],[850,200,'#467428'],
            [300,530,'#508030'],[180,480,'#3e6e28'],[630,350,'#447228'],[800,100,'#467428'],
            [420,560,'#3a6a24'],[250,250,'#4e7e32'],[500,380,'#3e7228'],[150,60,'#447228'],
            [750,480,'#508030'],[900,400,'#3e6e28'],[380,80,'#467428'],[650,560,'#4a7a2e'],
        ];
        for (const [gx, gy, gc] of groundSpots) {
            ctx.beginPath();
            ctx.ellipse(gx * s, gy * s, (20 + gx % 15) * s, (12 + gy % 10) * s, (gx * 0.01), 0, Math.PI * 2);
            ctx.fillStyle = gc;
            ctx.fill();
        }

        // Distant mountain silhouettes (水墨画 ink wash style)
        ctx.save();
        // Far mountains — very faint, bluish-grey
        ctx.fillStyle = 'rgba(60,80,70,0.18)';
        ctx.beginPath();
        ctx.moveTo(0, 30 * s);
        ctx.quadraticCurveTo(60 * s, -20 * s, 150 * s, 25 * s);
        ctx.quadraticCurveTo(200 * s, -10 * s, 280 * s, 20 * s);
        ctx.quadraticCurveTo(350 * s, -30 * s, 420 * s, 15 * s);
        ctx.lineTo(420 * s, 50 * s);
        ctx.lineTo(0, 50 * s);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(50,70,60,0.15)';
        ctx.beginPath();
        ctx.moveTo(400 * s, 25 * s);
        ctx.quadraticCurveTo(500 * s, -25 * s, 600 * s, 18 * s);
        ctx.quadraticCurveTo(680 * s, -15 * s, 780 * s, 22 * s);
        ctx.quadraticCurveTo(880 * s, -20 * s, 1000 * s, 20 * s);
        ctx.lineTo(1000 * s, 55 * s);
        ctx.lineTo(400 * s, 55 * s);
        ctx.closePath();
        ctx.fill();
        // Mist between mountains and village
        const mistGrad = ctx.createLinearGradient(0, 20 * s, 0, 70 * s);
        mistGrad.addColorStop(0, 'rgba(200,200,190,0.08)');
        mistGrad.addColorStop(0.5, 'rgba(200,200,190,0.12)');
        mistGrad.addColorStop(1, 'rgba(200,200,190,0)');
        ctx.fillStyle = mistGrad;
        ctx.fillRect(0, 20 * s, cw, 50 * s);
        ctx.restore();

        // Rolling green hills in foreground
        const hills = [
            { x: 80, y: 60, rx: 140, ry: 50, c: '#3e6e28' },
            { x: 350, y: 40, rx: 180, ry: 60, c: '#447228' },
            { x: 650, y: 50, rx: 120, ry: 45, c: '#3a6a24' },
            { x: 200, y: 80, rx: 100, ry: 35, c: '#4a7a30' },
        ];
        for (const h of hills) {
            ctx.beginPath();
            ctx.ellipse(h.x * s, h.y * s, h.rx * s, h.ry * s, 0, Math.PI, 0);
            ctx.fillStyle = h.c;
            ctx.fill();
        }

        // Golden-tan courtyard area (center, slightly irregular ellipse)
        ctx.beginPath();
        ctx.ellipse(420 * s, 300 * s, 180 * s, 120 * s, -0.06, 0, Math.PI * 2);
        ctx.fillStyle = '#c8b080';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(418 * s, 302 * s, 160 * s, 105 * s, 0.04, 0, Math.PI * 2);
        ctx.fillStyle = '#baa870';
        ctx.fill();

        // Subtle dirt paths with soft edges
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const drawPath = (x1, y1, x2, y2, w, alpha) => {
            // Soft outer edge
            ctx.globalAlpha = alpha * 0.3;
            ctx.strokeStyle = '#9a8868';
            ctx.lineWidth = (w + 4) * s;
            ctx.beginPath();
            ctx.moveTo(x1 * s, y1 * s);
            ctx.lineTo(x2 * s, y2 * s);
            ctx.stroke();
            // Main path
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = '#a89878';
            ctx.lineWidth = w * s;
            ctx.beginPath();
            ctx.moveTo(x1 * s, y1 * s);
            ctx.lineTo(x2 * s, y2 * s);
            ctx.stroke();
        };
        // Main crossroads
        drawPath(200, 300, 640, 300, 14, 0.35);
        drawPath(420, 155, 420, 475, 12, 0.3);
        // Diagonal
        drawPath(285, 205, 555, 395, 10, 0.25);
        // Side path to river
        drawPath(580, 300, 700, 300, 8, 0.2);
        // Pebble dots along main path
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#8a7a60';
        const pebbles = [[230,298],[280,303],[330,297],[380,301],[450,299],[520,302],[570,297],[620,300],
                          [418,180],[422,220],[419,260],[421,340],[418,380],[420,420],[422,460]];
        for (const [px, py] of pebbles) {
            ctx.beginPath();
            ctx.arc(px * s, py * s, (1 + (px % 3) * 0.5) * s, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;
        ctx.lineCap = 'butt';

        // River on right side (gentle meander) — gradient fill
        const riverGrad = ctx.createLinearGradient(705 * s, 0, 800 * s, 0);
        riverGrad.addColorStop(0, '#2a5a78');
        riverGrad.addColorStop(0.3, '#3a7090');
        riverGrad.addColorStop(0.7, '#3a7090');
        riverGrad.addColorStop(1, '#2a5a78');
        ctx.fillStyle = riverGrad;
        ctx.beginPath();
        ctx.moveTo(725 * s, 0);
        ctx.bezierCurveTo(720 * s, 120 * s, 715 * s, 280 * s, 710 * s, 400 * s);
        ctx.bezierCurveTo(705 * s, 500 * s, 708 * s, 560 * s, 705 * s, ch);
        ctx.lineTo(800 * s, ch);
        ctx.bezierCurveTo(798 * s, 540 * s, 793 * s, 420 * s, 795 * s, 300 * s);
        ctx.bezierCurveTo(797 * s, 180 * s, 790 * s, 80 * s, 785 * s, 0);
        ctx.closePath();
        ctx.fill();
        // Shore highlight — left bank
        ctx.strokeStyle = 'rgba(90,120,70,0.35)';
        ctx.lineWidth = 2 * s;
        ctx.beginPath();
        ctx.moveTo(725 * s, 0);
        ctx.bezierCurveTo(720 * s, 120 * s, 715 * s, 280 * s, 710 * s, 400 * s);
        ctx.bezierCurveTo(705 * s, 500 * s, 708 * s, 560 * s, 705 * s, ch);
        ctx.stroke();
        // River ripples (flow downward, clipped to river)
        ctx.save();
        ctx.clip(); // clip to the river path drawn above
        ctx.strokeStyle = 'rgba(100,170,220,0.3)';
        ctx.lineWidth = 1 * s;
        for (let i = 0; i < 14; i++) {
            const ry = (i * 50 + (gameTick * 0.4) % 50) * s;
            ctx.beginPath();
            ctx.moveTo(715 * s, ry);
            ctx.quadraticCurveTo(750 * s, (ry + 8 * s), 785 * s, ry);
            ctx.stroke();
        }
        ctx.restore(); // end river clipping

        // Green grass patches (positioned to avoid buildings)
        const grassPatches = [
            { x: 80,  y: 400, r: 55, c: '#508030' },
            { x: 620, y: 100, r: 45, c: '#4a7a2e' },
            { x: 140, y: 140, r: 50, c: '#467428' },
            { x: 580, y: 530, r: 55, c: '#4e7e32' },
        ];
        for (const gp of grassPatches) {
            const depthScale = 0.8 + (gp.y / WORLD_H) * 0.4;
            ctx.beginPath();
            ctx.ellipse(gp.x * s, gp.y * s, gp.r * depthScale * s, gp.r * 0.6 * depthScale * s, 0, 0, Math.PI * 2);
            ctx.fillStyle = gp.c;
            ctx.fill();
        }

        // Bamboo shoots scattered (small green triangles)
        const bambooShoots = [
            [60, 180], [90, 420], [680, 100], [670, 480],
            [140, 520], [50, 350], [660, 250], [100, 100]
        ];
        ctx.fillStyle = '#3a8a3a';
        for (const [bx, by] of bambooShoots) {
            ctx.beginPath();
            ctx.moveTo(bx * s, by * s);
            ctx.lineTo((bx - 2) * s, (by + 10) * s);
            ctx.lineTo((bx + 2) * s, (by + 10) * s);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo((bx + 1) * s, (by + 3) * s);
            ctx.lineTo((bx + 5) * s, (by + 1) * s);
            ctx.lineTo((bx + 4) * s, (by + 4) * s);
            ctx.closePath();
            ctx.fill();
        }
    }

    function drawObject(ctx, obj) {
        const x = obj.x * canvasScale;
        const y = obj.y * canvasScale;
        const w = obj.w * canvasScale;
        const h = obj.h * canvasScale;

        // Soft shadow under object (skip ground-level types and bridge)
        if (!GROUND_TYPES.includes(obj.type) && obj.type !== 'bridge') {
            const vb = (VISUAL_BOTTOM[obj.type] || obj.h / 2) * canvasScale;
            const shadowW = w * 0.7;
            const shadowH = Math.max(h * 0.12, 3 * canvasScale);
            ctx.beginPath();
            ctx.ellipse(x, y + vb, shadowW / 2, shadowH / 2, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.10)';
            ctx.fill();
        }

        switch (obj.type) {
            case 'house': {
                // Japanese wooden house with shoji screens and gable roof
                // Wooden walls (light wood color)
                ctx.fillStyle = '#C4A56A';
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/4, w - 4*canvasScale, h/2 + 4*canvasScale);
                // Engawa (veranda) — wooden platform at base
                ctx.fillStyle = '#B09050';
                ctx.fillRect(x - w/2 - 3*canvasScale, y + h/4 + 1*canvasScale, w + 6*canvasScale, 4*canvasScale);
                // Shoji screens (白い障子 — white paper panels with grid)
                ctx.fillStyle = '#f0e8d8';
                const panelW = (w - 8*canvasScale) / 3;
                for (let i = 0; i < 3; i++) {
                    const px = x - w/2 + 4*canvasScale + i * (panelW + 1*canvasScale);
                    ctx.fillRect(px, y - h/4 + 4*canvasScale, panelW, h/2 - 2*canvasScale);
                    // Grid lines
                    ctx.strokeStyle = '#a09070';
                    ctx.lineWidth = canvasScale * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(px + panelW/2, y - h/4 + 4*canvasScale);
                    ctx.lineTo(px + panelW/2, y + h/4 + 2*canvasScale);
                    ctx.moveTo(px, y + 2*canvasScale);
                    ctx.lineTo(px + panelW, y + 2*canvasScale);
                    ctx.stroke();
                }
                // Gable roof (入母屋 irimoya — Japanese hip-and-gable, dark grey)
                ctx.fillStyle = '#3a3a3a';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 8*canvasScale, y - h/4 + 2*canvasScale);
                ctx.lineTo(x, y - h/2 - 8*canvasScale);
                ctx.lineTo(x + w/2 + 8*canvasScale, y - h/4 + 2*canvasScale);
                ctx.closePath();
                ctx.fill();
                // Roof ridge line
                ctx.strokeStyle = '#4a4a4a';
                ctx.lineWidth = canvasScale * 1.2;
                ctx.beginPath();
                ctx.moveTo(x - 12*canvasScale, y - h/2 - 3*canvasScale);
                ctx.lineTo(x + 12*canvasScale, y - h/2 - 3*canvasScale);
                ctx.stroke();
                // Chimney smoke (not during rain)
                if (currentWeather !== 'rain') {
                    ctx.save();
                    ctx.globalAlpha = 0.15;
                    ctx.fillStyle = '#b0a890';
                    const smokeT = gameTick * 0.02;
                    for (let si = 0; si < 3; si++) {
                        const sx = x + w/4 + Math.sin(smokeT + si * 2) * 3 * canvasScale;
                        const sy = y - h/2 - 10*canvasScale - si * 8 * canvasScale;
                        const sr = (2 + si * 1.5) * canvasScale;
                        ctx.globalAlpha = 0.15 - si * 0.04;
                        ctx.beginPath();
                        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
                break;
            }

            case 'teahouse': {
                // Japanese chaya (茶屋) with noren curtains and steam
                // Back wall (warm wood)
                ctx.fillStyle = '#B09050';
                ctx.fillRect(x - w/2, y - h/4, w, h/2 + 4*canvasScale);
                // Open front (darker interior with tatami hint)
                ctx.fillStyle = '#5a4a20';
                ctx.fillRect(x - w/2 + 2*canvasScale, y - h/4 + 2*canvasScale, w - 4*canvasScale, h/3);
                // Support posts (dark wood)
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x - w/2 + 1*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                ctx.fillRect(x + w/2 - 4*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                ctx.fillRect(x - 1.5*canvasScale, y - h/4, 3*canvasScale, h/2 + 4*canvasScale);
                // Noren curtains (暖簾) — hanging fabric strips, navy blue with white circle
                const norenSway = Math.sin(gameTick * 0.025) * 1.5 * canvasScale;
                const norenW = (w - 10*canvasScale) / 4;
                ctx.fillStyle = '#2a3a6a';
                for (let i = 0; i < 4; i++) {
                    const nx = x - w/2 + 4*canvasScale + i * (norenW + 1*canvasScale);
                    const sway = Math.sin(gameTick * 0.025 + i * 0.8) * 1.5 * canvasScale;
                    ctx.beginPath();
                    ctx.moveTo(nx, y - h/4 + 2*canvasScale);
                    ctx.lineTo(nx + norenW, y - h/4 + 2*canvasScale);
                    ctx.lineTo(nx + norenW + sway, y - h/4 + h/3 - 2*canvasScale);
                    ctx.lineTo(nx + sway, y - h/4 + h/3 - 2*canvasScale);
                    ctx.closePath();
                    ctx.fill();
                }
                // White circle on center noren (mon crest)
                ctx.fillStyle = 'rgba(240,235,220,0.7)';
                ctx.beginPath();
                ctx.arc(x, y - h/4 + h/6, 4*canvasScale, 0, Math.PI*2);
                ctx.fill();
                // Gable roof
                ctx.fillStyle = '#3a3a3a';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 6*canvasScale, y - h/4);
                ctx.lineTo(x, y - h/2 - 10*canvasScale);
                ctx.lineTo(x + w/2 + 6*canvasScale, y - h/4);
                ctx.closePath();
                ctx.fill();
                // Steam wisps rising from teahouse (animated)
                const st = gameTick * 0.03;
                for (let i = 0; i < 3; i++) {
                    const sx = x + (i - 1) * 5 * canvasScale;
                    const rise = (st + i * 2.5) % 6;
                    const fadeAlpha = rise < 1 ? rise * 0.25 : Math.max(0, 0.25 - (rise - 1) * 0.06);
                    if (fadeAlpha <= 0) continue;
                    ctx.globalAlpha = fadeAlpha;
                    ctx.fillStyle = '#e8e4e0';
                    const wy = y - h/3 - (6 + rise * 5) * canvasScale;
                    const wobble = Math.sin(st * 2 + i * 1.8) * 3 * canvasScale;
                    ctx.beginPath();
                    ctx.ellipse(sx + wobble, wy, (2.5 + rise * 0.4) * canvasScale, (1.5 + rise * 0.3) * canvasScale, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
                break;
            }

            case 'market': {
                // Market stalls with red awnings and items
                // Counter/table
                ctx.fillStyle = '#7a5a2a';
                ctx.fillRect(x - w/2, y, w, h/4);
                // Items on counter
                ctx.fillStyle = '#d0a040';
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.arc(x - w/3 + i * w/5, y - 2*canvasScale, 2.5*canvasScale, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = '#40a040';
                ctx.fillRect(x + w/5, y - 4*canvasScale, 6*canvasScale, 4*canvasScale);
                // Posts
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(x - w/2, y - h/2, 3*canvasScale, h/2);
                ctx.fillRect(x + w/2 - 3*canvasScale, y - h/2, 3*canvasScale, h/2);
                // Red awning
                ctx.fillStyle = '#c03020';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 4*canvasScale, y - h/3);
                ctx.lineTo(x - w/2 + 3*canvasScale, y - h/2 - 2*canvasScale);
                ctx.lineTo(x + w/2 - 3*canvasScale, y - h/2 - 2*canvasScale);
                ctx.lineTo(x + w/2 + 4*canvasScale, y - h/3);
                ctx.fill();
                // Awning scallops
                ctx.fillStyle = '#a02818';
                for (let i = 0; i < 3; i++) {
                    const sx = x - w/2 + 2*canvasScale + i * (w - 4*canvasScale)/2.5;
                    ctx.beginPath();
                    ctx.arc(sx + w/6, y - h/3 + 2*canvasScale, w/7, Math.PI, 0);
                    ctx.fill();
                }
                break;
            }

            case 'well': {
                // Stone well with wooden frame and rope
                // Stone base (circular)
                ctx.fillStyle = '#7a7a6a';
                ctx.beginPath();
                ctx.ellipse(x, y + 2*canvasScale, w/3, h/5, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#5a5a4a';
                ctx.lineWidth = 2*canvasScale;
                ctx.stroke();
                // Stone wall (cylinder effect)
                ctx.fillStyle = '#8a8a7a';
                ctx.fillRect(x - w/3, y - h/4, w*2/3, h/4 + 2*canvasScale);
                ctx.strokeStyle = '#6a6a5a';
                ctx.lineWidth = canvasScale;
                // Stone rows
                for (let i = 0; i < 3; i++) {
                    const sy = y - h/4 + i * h/10;
                    ctx.beginPath();
                    ctx.moveTo(x - w/3, sy);
                    ctx.lineTo(x + w/3, sy);
                    ctx.stroke();
                }
                // Top rim
                ctx.fillStyle = '#6a6a5a';
                ctx.beginPath();
                ctx.ellipse(x, y - h/4, w/3 + 2*canvasScale, h/7, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#5a5a4a';
                ctx.stroke();
                // Dark water inside
                ctx.fillStyle = '#1a3a5a';
                ctx.beginPath();
                ctx.ellipse(x, y - h/4, w/3 - 2*canvasScale, h/8, 0, 0, Math.PI*2);
                ctx.fill();
                // Wooden frame above
                ctx.fillStyle = '#6a4a2a';
                ctx.fillRect(x - w/3 - 2*canvasScale, y - h/2 - 10*canvasScale, 3*canvasScale, h/3 + 6*canvasScale);
                ctx.fillRect(x + w/3 - 1*canvasScale, y - h/2 - 10*canvasScale, 3*canvasScale, h/3 + 6*canvasScale);
                // Cross beam
                ctx.fillRect(x - w/3 - 2*canvasScale, y - h/2 - 10*canvasScale, w*2/3 + 4*canvasScale, 3*canvasScale);
                // Rope
                ctx.strokeStyle = '#8a7a5a';
                ctx.lineWidth = canvasScale;
                ctx.beginPath();
                ctx.moveTo(x, y - h/2 - 8*canvasScale);
                ctx.lineTo(x, y - h/4 - 2*canvasScale);
                ctx.stroke();
                // Bucket
                ctx.fillStyle = '#5a4a2a';
                ctx.fillRect(x - 3*canvasScale, y - h/4 - 6*canvasScale, 6*canvasScale, 5*canvasScale);
                break;
            }

            case 'bridge': {
                // Wooden bridge over river
                const bw = w, bh = h;
                const s2 = canvasScale;
                // Wooden deck (main surface, above water)
                ctx.fillStyle = '#8a6a3a';
                ctx.fillRect(x - bw/2, y - bh/3, bw, bh * 0.6);
                // Plank lines
                ctx.strokeStyle = '#6a4a2a';
                ctx.lineWidth = s2 * 0.5;
                const plankCount = 8;
                for (let i = 1; i < plankCount; i++) {
                    const px = x - bw/2 + i * bw / plankCount;
                    ctx.beginPath();
                    ctx.moveTo(px, y - bh/3);
                    ctx.lineTo(px, y - bh/3 + bh * 0.6);
                    ctx.stroke();
                }
                // Support posts (visible below deck)
                ctx.fillStyle = '#6a4a20';
                const postW = 4 * s2;
                ctx.fillRect(x - bw/3 - postW/2, y - bh/3 + bh*0.5, postW, bh * 0.45);
                ctx.fillRect(x + bw/3 - postW/2, y - bh/3 + bh*0.5, postW, bh * 0.45);
                ctx.fillRect(x - postW/2, y - bh/3 + bh*0.5, postW, bh * 0.45);
                // Railings
                ctx.strokeStyle = '#7a5a2a';
                ctx.lineWidth = 2 * s2;
                ctx.beginPath();
                ctx.moveTo(x - bw/2, y - bh/3 - 2*s2);
                ctx.lineTo(x + bw/2, y - bh/3 - 2*s2);
                ctx.stroke();
                ctx.moveTo(x - bw/2, y - bh/3 + bh*0.6 + 2*s2);
                ctx.lineTo(x + bw/2, y - bh/3 + bh*0.6 + 2*s2);
                ctx.stroke();
                // Railing posts
                ctx.lineWidth = 1.5 * s2;
                for (let i = 0; i <= 4; i++) {
                    const rpx = x - bw/2 + i * bw/4;
                    ctx.beginPath();
                    ctx.moveTo(rpx, y - bh/3 - 3*s2);
                    ctx.lineTo(rpx, y - bh/3);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(rpx, y - bh/3 + bh*0.6);
                    ctx.lineTo(rpx, y - bh/3 + bh*0.6 + 3*s2);
                    ctx.stroke();
                }
                break;
            }

            case 'pagoda': {
                // 3-tier pagoda with upturned edges
                // Base pillar
                ctx.fillStyle = '#7a5a2a';
                ctx.fillRect(x - w/4, y - h/6, w/2, h/3 + 6*canvasScale);
                // Door
                ctx.fillStyle = '#3a2a10';
                ctx.beginPath();
                ctx.moveTo(x - 4*canvasScale, y + h/6 + 4*canvasScale);
                ctx.lineTo(x - 4*canvasScale, y);
                ctx.arc(x, y, 4*canvasScale, Math.PI, 0);
                ctx.lineTo(x + 4*canvasScale, y + h/6 + 4*canvasScale);
                ctx.fill();
                // 3 stacked roofs (trapezoids with upturned tips)
                for (let tier = 0; tier < 3; tier++) {
                    const tw = w/2 - tier * w/7;
                    const ty = y - h/6 - tier * h/5;
                    ctx.fillStyle = tier % 2 === 0 ? '#3a3a3a' : '#4a4a4a';
                    ctx.beginPath();
                    ctx.moveTo(x - tw - 4*canvasScale, ty + 4*canvasScale);
                    // Upturned left edge
                    ctx.quadraticCurveTo(x - tw - 6*canvasScale, ty - 2*canvasScale, x - tw - 3*canvasScale, ty - 4*canvasScale);
                    ctx.lineTo(x, ty - 6*canvasScale - tier*2*canvasScale);
                    ctx.lineTo(x + tw + 3*canvasScale, ty - 4*canvasScale);
                    // Upturned right edge
                    ctx.quadraticCurveTo(x + tw + 6*canvasScale, ty - 2*canvasScale, x + tw + 4*canvasScale, ty + 4*canvasScale);
                    ctx.closePath();
                    ctx.fill();
                    // Tier body
                    ctx.fillStyle = '#8a6a30';
                    ctx.fillRect(x - tw + 2*canvasScale, ty + 4*canvasScale, tw*2 - 4*canvasScale, h/6);
                }
                // Spire
                ctx.fillStyle = '#c8a030';
                ctx.beginPath();
                ctx.moveTo(x, y - h/2 - h/4 - 4*canvasScale);
                ctx.lineTo(x - 3*canvasScale, y - h/6 - 2*h/5);
                ctx.lineTo(x + 3*canvasScale, y - h/6 - 2*h/5);
                ctx.closePath();
                ctx.fill();
                break;
            }

            case 'gate':
            case 'torii': {
                // Torii gate (鳥居) — vermillion red, two pillars + two crossbars
                const pillarW = 5 * canvasScale;
                const pillarH = h * 0.85;
                // Main pillars
                ctx.fillStyle = '#c83030';
                ctx.fillRect(x - w/2, y - h/3, pillarW, pillarH);
                ctx.fillRect(x + w/2 - pillarW, y - h/3, pillarW, pillarH);
                // Top crossbar (kasagi) — extends beyond pillars, slight upward curve at ends
                ctx.fillStyle = '#b82828';
                ctx.beginPath();
                ctx.moveTo(x - w/2 - 8*canvasScale, y - h/3 + 2*canvasScale);
                ctx.quadraticCurveTo(x - w/2 - 6*canvasScale, y - h/3 - 4*canvasScale, x - w/2, y - h/3 - 2*canvasScale);
                ctx.lineTo(x + w/2, y - h/3 - 2*canvasScale);
                ctx.quadraticCurveTo(x + w/2 + 6*canvasScale, y - h/3 - 4*canvasScale, x + w/2 + 8*canvasScale, y - h/3 + 2*canvasScale);
                ctx.lineTo(x + w/2 + 8*canvasScale, y - h/3 + 5*canvasScale);
                ctx.lineTo(x - w/2 - 8*canvasScale, y - h/3 + 5*canvasScale);
                ctx.closePath();
                ctx.fill();
                // Lower crossbar (nuki) — between pillars
                ctx.fillStyle = '#c83030';
                const nukiY = y - h/3 + h * 0.2;
                ctx.fillRect(x - w/2 + pillarW, nukiY, w - pillarW * 2, 3*canvasScale);
                // Pillar caps (daiwa)
                ctx.fillStyle = '#a02020';
                ctx.fillRect(x - w/2 - 2*canvasScale, y - h/3 - 2*canvasScale, pillarW + 4*canvasScale, 3*canvasScale);
                ctx.fillRect(x + w/2 - pillarW - 2*canvasScale, y - h/3 - 2*canvasScale, pillarW + 4*canvasScale, 3*canvasScale);
                break;
            }

            case 'bamboo': {
                // 2-3 tall green bamboo stems with leaves — wind responsive
                const windStr = currentWeather === 'wind' ? weatherIntensity : 0;
                const bamSway = Math.sin(gameTick * 0.02 + obj.x * 0.05) * (2 + windStr * 6) * canvasScale;
                const stems = [-5, 0, 5];
                for (let si = 0; si < stems.length; si++) {
                    const sx = x + stems[si] * canvasScale;
                    // Stem — with sway at top
                    ctx.strokeStyle = '#2a7a2a';
                    ctx.lineWidth = 3*canvasScale;
